        <div style="padding:20px">
          <div style="font-size:15px;font-weight:700;margin-bottom:16px">Sager (${relSager.length})</div>
          ${relSager.length > 0 ? relSager.map(s => {
            const mistaenkt = (s.mistaenkte||[]).find(m => m.personCpr === p.cpr || m.personId === p.id);
            const statusLabel = {aaben:"Åben",under_efterforskning:"Efterforskning",afventer_retten:"Afventer ret",lukket:"Lukket"}[s.status] || s.status;
            const statusColor = {aaben:"var(--success)",under_efterforskning:"var(--primary)",afventer_retten:"var(--warning)",lukket:"var(--destructive)"}[s.status] || "var(--muted-fg)";
            return `
            <div class="card" style="margin-bottom:10px;cursor:pointer;transition:border-color .15s;border-left:3px solid ${statusColor}" onclick="window._krSagExpanded=window._krSagExpanded==='${s.id}'?null:'${s.id}'; selectPerson('${p.id}')">

                <div style="display:flex;align-items:center;gap:8px">
                  <span style="font-size:11px;font-family:monospace;color:var(--muted-fg)">${escLocal(s.sagsnummer||"")}</span>
                  <span style="font-size:10px;padding:2px 8px;border-radius:99px;background:color-mix(in srgb, ${statusColor} 15%, transparent);color:${statusColor};font-weight:600">${statusLabel}</span>
                </div>
                <span style="font-size:10px;color:var(--muted-fg)">${s.oprettet ? new Date(s.oprettet).toLocaleDateString("da-DK") : ""}</span>
              </div>
              <div style="font-size:13px;font-weight:600;color:var(--fg)">${escLocal(s.titel||"Uden titel")}</div>

                <div style="display:flex;gap:12px;margin-top:6px;font-size:10px;color:var(--muted-fg)">

                  ${mistaenkt.totalFaengsel > 0 ? `<span style="font-family:monospace;font-weight:600">${mistaenkt.totalFaengsel} mdr fængsel</span>` : ""}
                  <span style="font-weight:600;color:${mistaenkt.erkender===true?"var(--success)":mistaenkt.erkender===false?"var(--destructive)":"var(--muted-fg)"}">${mistaenkt.erkender===true?"Erkender":mistaenkt.erkender===false?"Nægter":"Uafklaret"}</span>
                  ${mistaenkt.fratagKoerekort ? `<span style="color:var(--destructive)">Kørekort frataget</span>` : ""}
                </div>
              ` : ""}

              ${window._krSagExpanded === s.id ? `
                <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:14px">
                  <!-- Rapport -->
                  <div style="margin-bottom:14px">
                    <div style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-fg);font-weight:700;margin-bottom:6px">Rapport${s.rapport && s.rapport.skabelonType ? ` · ${escLocal(s.rapport.skabelonType)}` : ""}</div>
                    ${s.rapport && s.rapport.haendelsesforloeb ? `
                      <div style="font-size:12px;color:var(--fg);line-height:1.6;white-space:pre-wrap;background:rgba(255,255,255,.02);padding:12px;border-radius:8px;border:1px solid var(--border)">${escLocal(s.rapport.haendelsesforloeb)}</div>
                    ` : `<div style="font-size:12px;color:var(--muted-fg);font-style:italic">Intet hændelsesforløb registreret</div>`}
                  </div>

                  ${s.rapport && s.rapport.konfiskeredeGenstande && s.rapport.konfiskeredeGenstande.length > 0 ? `
                    <div style="margin-bottom:14px">
                      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-fg);font-weight:700;margin-bottom:6px">Konfiskerede genstande</div>
                      <div style="display:flex;flex-wrap:wrap;gap:4px">${s.rapport.konfiskeredeGenstande.map(g => `<span style="font-size:10px;padding:2px 8px;border-radius:99px;border:1px solid var(--border);color:var(--fg)">${escLocal(g)}</span>`).join("")}</div>
                    </div>
                  ` : ""}

                  ${s.rapport && s.rapport.magtanvendelse && s.rapport.magtanvendelse.length > 0 ? `
                    <div style="margin-bottom:14px">
                      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-fg);font-weight:700;margin-bottom:6px">Magtanvendelse</div>
                      <div style="display:flex;flex-wrap:wrap;gap:4px">${s.rapport.magtanvendelse.map(m => `<span style="font-size:10px;padding:2px 8px;border-radius:99px;border:1px solid rgba(234,179,8,.3);color:var(--warning)">${escLocal(m)}</span>`).join("")}</div>
                    </div>
                  ` : ""}

                  ${s.rapport && s.rapport.skabelonSvar && Object.keys(s.rapport.skabelonSvar).length > 0 ? `
                    <div style="margin-bottom:14px">
                      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-fg);font-weight:700;margin-bottom:6px">Skabelon-svar</div>
                      ${Object.entries(s.rapport.skabelonSvar).map(([q,a]) => `
                        <div style="margin-bottom:8px">
                          <div style="font-size:11px;color:var(--muted-fg);font-weight:600">${escLocal(q)}</div>
                          <div style="font-size:12px;color:var(--fg)">${escLocal(String(a))}</div>
                        </div>
                      `).join("")}
                    </div>
                  ` : ""}

                  <!-- Involverede betjente -->
                  ${s.involveretBetjente && s.involveretBetjente.length > 0 ? `
                    <div style="margin-bottom:14px">
                      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-fg);font-weight:700;margin-bottom:6px">Involverede betjente</div>
                      <div style="font-size:12px;color:var(--fg)">${s.involveretBetjente.map(b => escLocal(b)).join(", ")}</div>
                    </div>
                  ` : ""}

                  <!-- Oprettet af -->
                  <div style="font-size:10px;color:var(--muted-fg);margin-top:8px">Oprettet af: ${escLocal(s.oprettetAf||"Ukendt")}</div>

                  <!-- Åbn i sagsarkiv -->
                  <div style="margin-top:12px">
                    <button style="font-size:11px;padding:6px 14px;border-radius:6px;border:1px solid var(--primary);background:transparent;color:var(--primary);cursor:pointer;font-weight:600" onclick="event.stopPropagation(); openTab('sag',{sagId:'${s.id}',label:'${escLocal(s.titel||s.sagsnummer)}'})">Åbn i sagsarkiv</button>
                  </div>
                </div>
              ` : `
                <div style="font-size:10px;color:var(--muted-fg);margin-top:6px;opacity:.6">Klik for at se rapport →</div>
              `}
            </div>`;
          }).join("") : `
            <div class="card" style="text-align:center;padding:32px">
              <div style="font-size:13px;color:var(--muted-fg)">Ingen sager registreret for denne person</div>
            </div>
          `}
        </div>
        ` : `
        <div class="card">
          <div style="font-size:14px;font-weight:700;margin-bottom:10px">${topTabs.find(t=>t.id===activeTab)?.label || ""}</div>
          <div style="font-size:12px;color:var(--muted-fg)">Denne fane kan udbygges videre i samme stil.</div>
        </div>
      `}
    `}
    `;
  };

  

window.savePersonProfileLocal = async function(personId, patch) {
  try {
    const all = await personerApi.getAll();
    const existing = all.find(x => String(x.id) === String(personId));
    if (!existing) throw new Error("Person ikke fundet");

    const updated = { ...existing, ...patch };

    // Try normal API first
    try {
      await personerApi.update(personId, updated);
      return true;
    } catch (err) {
      console.warn("personerApi.update fejlede, bruger lokal fallback", err);
    }

    // Offline/local fallback
    const key = typeof offlineKey === "function" ? offlineKey("personer") : "copaid_offline_personer";
    let rows = [];
    try { rows = JSON.parse(localStorage.getItem(key) || "[]"); } catch {}
    if (!Array.isArray(rows) || rows.length === 0) {
      rows = all.map(r => ({ ...r }));
    }
    const idx = rows.findIndex(r => String(r.id) === String(personId));
    if (idx === -1) throw new Error("Person ikke fundet i lokal fallback");
    rows[idx] = { ...rows[idx], ...updated };
    localStorage.setItem(key, JSON.stringify(rows));
    return true;
  } catch (e) {
    console.error("savePersonProfileLocal fejl", e);
    return false;
  }
};

<script>
/* ==== Final person save override v4 ==== */
(function () {
  function escLocal(v) {
    return String(v ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function personInitialsLocal(p) {
    return `${(p?.fornavn?.[0] || "U")}${(p?.efternavn?.[0] || "B")}`.toUpperCase();
  }

  function getCurrentPersonsSource() {
    if (Array.isArray(window._krPersoner) && window._krPersoner.length) return [...window._krPersoner];
    try {
      const raw = localStorage.getItem("copaid_offline_personer");
      if (raw) {
        const rows = JSON.parse(raw);
        if (Array.isArray(rows)) return rows;
      }
    } catch {}
    return [];
  }

  async function getPersonsReliable() {
    const current = getCurrentPersonsSource();
    if (current.length) return current;

    try {
      const rows = await personerApi.getAll();
      if (Array.isArray(rows) && rows.length) {
        localStorage.setItem("copaid_offline_personer", JSON.stringify(rows));
        return rows;
      }
    } catch {}
    return [];
  }

  function persistPersonsReliable(rows) {
    localStorage.setItem("copaid_offline_personer", JSON.stringify(rows));
    window._krPersoner = rows;
  }

  function syncSelectedPersonHighlight(id) {
    document.querySelectorAll(".pr-item[data-person-id]").forEach(el => {
      el.classList.toggle("active", el.getAttribute("data-person-id") === String(id));
    });
  }

  // Patch selectPerson so chosen person is visibly marked every time
  const oldSelectPerson = window.selectPerson;
  window.selectPerson = async function(id) {
    window._krSelectedId = id;
    syncSelectedPersonHighlight(id);
    if (typeof oldSelectPerson === "function") {
      return oldSelectPerson(id);
    }
  };

  window.editPerson = async function(id) {
    const personer = await getPersonsReliable();
    const p = personer.find(x => String(x.id) === String(id));
    if (!p) {
      if (typeof showToast === "function") showToast("Person ikke fundet");
      return;
    }

    const currentImage = p.mugshotUrl || p.mugshot || p.billede || "";

    const overlay = document.createElement("div");
    overlay.className = "dialog-overlay";
    overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
    overlay.innerHTML = `
      <div class="dialog" style="max-width:900px">
        <div class="dialog-title">Rediger personlig information</div>
        <div class="grid grid-2" style="gap:18px;align-items:start">
          <div>
            <div class="label">Forhåndsvisning</div>
            <div class="person-edit-preview" id="person-image-preview">
              ${currentImage ? `<img src="${escLocal(currentImage)}" alt="Profilbillede">` : personInitialsLocal(p)}
            </div>
          </div>
          <div class="pr-modal-grid">
            <div class="label">Hårfarve</div><input class="input" id="edit-haarfarve" value="${escLocal(p.haarfarve || p.hårfarve || "Ingen Data/Ukendt")}">
            <div class="label">Øjenfarve</div><input class="input" id="edit-oejenfarve" value="${escLocal(p.oejenfarve || p.øjenfarve || "Ingen Data/Ukendt")}">
            <div class="label">Mugshot URL</div><input class="input" id="edit-mugshot" value="${escLocal(currentImage)}" placeholder="https://...">
            <div class="label">Tags</div><input class="input" id="edit-tags" value="${escLocal(p.tags || "")}">
            <div class="label">Særlige kendetegn</div><textarea class="textarea" id="edit-kendetegn" rows="4">${escLocal(p.saerligeKendetegn || p["særligeKendetegn"] || "Ingen Data/Ukendt")}</textarea>
            <div class="label">Kommentar</div><textarea class="textarea" id="edit-kommentar" rows="4">${escLocal(p.kommentar || "Ingen Data/Ukendt")}</textarea>
          </div>
        </div>
        <div class="flex items-center justify-end gap-2" style="margin-top:18px">
          <button class="btn btn-primary" id="person-save-btn-final">Gem ændringer</button>
          <button class="btn btn-outline" onclick="this.closest('.dialog-overlay').remove()">Luk</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    const mugshotInput = document.getElementById("edit-mugshot");
    const preview = document.getElementById("person-image-preview");

    function refreshPreview() {
      const url = mugshotInput?.value.trim() || "";
      if (!preview) return;
      if (url) {
        const initials = personInitialsLocal(p);
        preview.innerHTML = `<img src="${escLocal(url)}" alt="Profilbillede" onerror="this.parentElement.textContent='${initials}'">`;
      } else {
        preview.textContent = personInitialsLocal(p);
      }
    }
    mugshotInput?.addEventListener("input", refreshPreview);

    document.getElementById("person-save-btn-final").addEventListener("click", async () => {
      try {
        const all = await getPersonsReliable();
        const idx = all.findIndex(x => String(x.id) === String(id));
        if (idx === -1) throw new Error("Person ikke fundet ved gemning");

        const updated = {
          ...all[idx],
          haarfarve: document.getElementById("edit-haarfarve").value.trim(),
          "hårfarve": document.getElementById("edit-haarfarve").value.trim(),
          oejenfarve: document.getElementById("edit-oejenfarve").value.trim(),
          "øjenfarve": document.getElementById("edit-oejenfarve").value.trim(),
          mugshotUrl: document.getElementById("edit-mugshot").value.trim(),
          mugshot: document.getElementById("edit-mugshot").value.trim(),
          billede: document.getElementById("edit-mugshot").value.trim(),
          tags: document.getElementById("edit-tags").value.trim(),
          saerligeKendetegn: document.getElementById("edit-kendetegn").value.trim(),
          "særligeKendetegn": document.getElementById("edit-kendetegn").value.trim(),
          kommentar: document.getElementById("edit-kommentar").value.trim()
        };

        all[idx] = updated;
        persistPersonsReliable(all);

        overlay.remove();

        const content = document.getElementById("content-area");
        if (content && typeof window.renderPersonregister === "function") {
          await window.renderPersonregister(content);
        }
        if (typeof oldSelectPerson === "function") {
          await oldSelectPerson(id);
          syncSelectedPersonHighlight(id);
        }

        if (typeof showToast === "function") showToast("Personprofil opdateret");
      } catch (err) {
        console.error("Final person save override v4 fejl", err);
        if (typeof showToast === "function") showToast("Kunne ikke gemme ændringer");
      }
    });
  };
})();
</script>

                sagHtml += '<div style="display:flex;align-items:center;gap:8px;min-width:0">';
                sagHtml += '<span style="font-size:11px;font-family:monospace;color:var(--muted-fg);white-space:nowrap">' + escLocal(s.sagsnummer||"") + '</span>';
                sagHtml += '<span style="font-size:10px;padding:2px 8px;border-radius:999px;background:color-mix(in srgb, ' + sColor + ' 15%, transparent);color:' + sColor + ';font-weight:600;white-space:nowrap">' + escLocal(sLabel) + '</span>';
                sagHtml += '</div>';
                sagHtml += '<span style="font-size:10px;color:var(--muted-fg);white-space:nowrap">' + escLocal(dato) + '</span>';
                sagHtml += '</div>';
                sagHtml += '<div style="font-size:13px;font-weight:700;color:var(--fg)">' + escLocal(s.titel||"Uden titel") + '</div>';
                if (mistaenkt && Array.isArray(mistaenkt.sigtelser) && mistaenkt.sigtelser.length > 0) {
                  sagHtml += '<div style="font-size:11px;color:var(--muted-fg);margin-top:4px">' + mistaenkt.sigtelser.map(function(b) { return escLocal(b.beskrivelse||""); }).join(", ") + '</div>';
                }
                if (mistaenkt) {
                  sagHtml += '<div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:6px;font-size:10px;color:var(--muted-fg)">';
                  if (Number(mistaenkt.totalBoede||0) > 0) sagHtml += '<span style="font-family:monospace;color:var(--warning);font-weight:700">' + Number(mistaenkt.totalBoede||0).toLocaleString("da-DK") + ' kr</span>';
                  if (Number(mistaenkt.totalFaengsel||0) > 0) sagHtml += '<span style="font-family:monospace;font-weight:600">' + Number(mistaenkt.totalFaengsel||0) + ' mdr fængsel</span>';
                  var erkColor = mistaenkt.erkender===true?"var(--success)":mistaenkt.erkender===false?"var(--destructive)":"var(--muted-fg)";
                  var erkText = mistaenkt.erkender===true?"Erkender":mistaenkt.erkender===false?"Nægter":"Uafklaret";
                  sagHtml += '<span style="font-weight:600;color:' + erkColor + '">' + erkText + '</span>';
                  if (mistaenkt.fratagKoerekort) sagHtml += '<span style="color:var(--destructive)">Kørekort frataget</span>';
                  sagHtml += '</div>';
                }
                if (!isExp) {
                  sagHtml += '<div style="font-size:10px;color:var(--muted-fg);margin-top:8px;opacity:.7">Klik for at læse rapporten</div>';
                } else {
                  sagHtml += '<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:14px" onclick="event.stopPropagation()">';
                  var skabelonLabel = s.rapport && s.rapport.skabelonType ? " · " + escLocal(s.rapport.skabelonType) : "";
                  sagHtml += '<div style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-fg);font-weight:700;margin-bottom:6px">Rapport' + skabelonLabel + '</div>';
                  if (s.rapport && s.rapport.haendelsesforloeb) {
                    sagHtml += '<div style="font-size:12px;color:var(--fg);line-height:1.6;white-space:pre-wrap;background:rgba(255,255,255,.02);padding:12px;border-radius:8px;border:1px solid var(--border)">' + escLocal(s.rapport.haendelsesforloeb) + '</div>';
                  } else {
                    sagHtml += '<div style="font-size:12px;color:var(--muted-fg);font-style:italic">Ingen rapport skrevet endnu</div>';
                  }
                  if (s.rapport && Array.isArray(s.rapport.konfiskeredeGenstande) && s.rapport.konfiskeredeGenstande.length > 0) {
                    sagHtml += '<div style="margin-top:12px"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-fg);font-weight:700;margin-bottom:6px">Konfiskerede genstande</div><div style="display:flex;flex-wrap:wrap;gap:4px">';
                    s.rapport.konfiskeredeGenstande.forEach(function(g) { sagHtml += '<span style="font-size:10px;padding:2px 8px;border-radius:999px;border:1px solid var(--border);color:var(--fg)">' + escLocal(g) + '</span>'; });
                    sagHtml += '</div></div>';
                  }
                  if (s.rapport && Array.isArray(s.rapport.magtanvendelse) && s.rapport.magtanvendelse.length > 0) {
                    sagHtml += '<div style="margin-top:12px"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-fg);font-weight:700;margin-bottom:6px">Magtanvendelse</div><div style="display:flex;flex-wrap:wrap;gap:4px">';
                    s.rapport.magtanvendelse.forEach(function(m) { sagHtml += '<span style="font-size:10px;padding:2px 8px;border-radius:999px;border:1px solid rgba(234,179,8,.3);color:var(--warning)">' + escLocal(m) + '</span>'; });
                    sagHtml += '</div></div>';
                  }
                  if (s.rapport && s.rapport.skabelonSvar && Object.keys(s.rapport.skabelonSvar).length > 0) {
                    sagHtml += '<div style="margin-top:12px"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-fg);font-weight:700;margin-bottom:6px">Skabelon-svar</div>';
                    Object.entries(s.rapport.skabelonSvar).forEach(function(entry) { sagHtml += '<div style="margin-bottom:8px"><div style="font-size:11px;color:var(--muted-fg);font-weight:600">' + escLocal(entry[0]) + '</div><div style="font-size:12px;color:var(--fg)">' + escLocal(String(entry[1])) + '</div></div>'; });
                    sagHtml += '</div>';
                  }
                  if (Array.isArray(s.involveretBetjente) && s.involveretBetjente.length > 0) {
                    sagHtml += '<div style="margin-top:12px"><div style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-fg);font-weight:700;margin-bottom:6px">Involverede betjente</div><div style="font-size:12px;color:var(--fg)">' + s.involveretBetjente.map(function(b) { return escLocal(b); }).join(", ") + '</div></div>';
                  }
                  sagHtml += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px">';
                  sagHtml += '<button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); openTab(\'sag\',{sagId:\'' + s.id + '\',label:\'' + escLocal(s.titel||s.sagsnummer) + '\'})">Åbn i sagsarkiv</button>';
                  sagHtml += '</div></div>';
                }
                sagHtml += '</div>';
              });
            } else {
              sagHtml += '<div class="pr-empty-state" style="min-height:200px"><div class="pr-empty-card"><div class="pr-empty-title">Ingen sager</div><div class="pr-empty-text">Der er endnu ikke registreret sager på denne person.</div></div></div>';
            }
            sagHtml += '</div>';
            return sagHtml;
          })() + `
          ` : activeTab === "tilhoersforhold" ? `
            <div style="padding:20px">
              <div style="font-size:15px;font-weight:700;margin-bottom:16px">Tilhørsforhold (${relTilhoersforhold.length})</div>
              ${relTilhoersforhold.length > 0 ? relTilhoersforhold.map(t => `
                <div style="padding:12px 16px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;border-left:3px solid var(--destructive);background:rgba(239,68,68,0.03)">
                  <div class="flex items-center justify-between">
                    <div>
                      <span style="font-size:14px;font-weight:600">${escLocal(t.bande)}</span>
                      <span class="badge badge-muted" style="margin-left:8px">${escLocal(t.rolle||"Medlem")}</span>
                      <span class="badge ${t.status==="aktiv"?"badge-success":"badge-muted"}" style="margin-left:4px">${escLocal(t.status||"aktiv")}</span>
                    </div>
                    <div style="font-size:10px;color:var(--muted-fg)">${escLocal(t.oprettetDato||"")}</div>
                  </div>
                  ${t.noter ? `<div style="font-size:11px;color:var(--muted-fg);margin-top:6px">${escLocal(t.noter)}</div>` : ""}
                  <div style="font-size:10px;color:var(--muted-fg);margin-top:4px">Registreret af: ${escLocal(t.oprettetAf||"Ukendt")}</div>
                </div>
              `).join("") : `
                <div class="pr-empty-state" style="min-height:200px">
                  <div class="pr-empty-card">
                    <div style="font-size:13px;color:var(--muted-fg)">Ingen tilhørsforhold registreret</div>
                    <div style="font-size:11px;color:var(--muted-fg);margin-top:4px">Tilhørsforhold tilføjes via NSK → Bander</div>
                  </div>
                </div>
              `}
            </div>
          ` : `
            <div class="pr-empty-state" style="min-height:360px">
              <div class="pr-empty-card">
                <div class="pr-empty-title">${topTabs.find(t=>t.id===activeTab)?.label || ""}</div>
                <div class="pr-empty-text">Denne fane kan udbygges videre i samme stil.</div>
              </div>
            </div>
          `}
        </div>
      </div>
    `}
    `;
  };

  window.editPerson = async function(id) {
    const personer = getPersonStore();
    const p = personer.find(x => String(x.id) === String(id));
    if (!p) {
      if (typeof showToast === "function") showToast("Person ikke fundet");
      return;
    }

    const currentImage = p.mugshotUrl || p.mugshot || p.billede || "";

    const overlay = document.createElement("div");
    overlay.className = "dialog-overlay";
    overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
    overlay.innerHTML = `
      <div class="dialog" style="max-width:900px">
        <div class="dialog-title">Rediger personlig information</div>
        <div class="grid grid-2" style="gap:18px;align-items:start">
          <div>
            <div class="label">Forhåndsvisning</div>
            <div class="person-edit-preview" id="person-image-preview">
              ${currentImage ? `<img src="${escLocal(currentImage)}" alt="Profilbillede">` : personInitials(p)}
            </div>
          </div>
          <div class="pr-modal-grid">
            <div class="label">Hårfarve</div><input class="input" id="edit-haarfarve" value="${escLocal(p.haarfarve || p["hårfarve"] || "Ingen Data/Ukendt")}">
            <div class="label">Øjenfarve</div><input class="input" id="edit-oejenfarve" value="${escLocal(p.oejenfarve || p["øjenfarve"] || "Ingen Data/Ukendt")}">
            <div class="label">Mugshot URL</div><input class="input" id="edit-mugshot" value="${escLocal(currentImage)}" placeholder="https://...">
            <div class="label">Tags</div><input class="input" id="edit-tags" value="${escLocal(p.tags || "")}">
            <div class="label">Særlige kendetegn</div><textarea class="textarea" id="edit-kendetegn" rows="4">${escLocal(p.saerligeKendetegn || p["særligeKendetegn"] || "Ingen Data/Ukendt")}</textarea>
            <div class="label">Kommentar</div><textarea class="textarea" id="edit-kommentar" rows="4">${escLocal(p.kommentar || "Ingen Data/Ukendt")}</textarea>
          </div>
        </div>
        <div class="flex items-center justify-end gap-2" style="margin-top:18px">
          <button class="btn btn-primary" id="person-save-btn-final">Gem ændringer</button>
          <button class="btn btn-outline" onclick="this.closest('.dialog-overlay').remove()">Luk</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    const mugshotInput = document.getElementById("edit-mugshot");
    const preview = document.getElementById("person-image-preview");
    function refreshPreview() {
      const url = mugshotInput?.value.trim() || "";
      if (!preview) return;
      if (url) preview.innerHTML = `<img src="${escLocal(url)}" alt="Profilbillede" onerror="this.parentElement.textContent='${personInitials(p)}'">`;
      else preview.textContent = personInitials(p);
    }
    mugshotInput?.addEventListener("input", refreshPreview);

    document.getElementById("person-save-btn-final").addEventListener("click", async () => {
      try {
        const all = getPersonStore();
        const idx = all.findIndex(x => String(x.id) === String(id));
        if (idx === -1) throw new Error("Person ikke fundet ved gemning");

        all[idx] = {
          ...all[idx],
          haarfarve: document.getElementById("edit-haarfarve").value.trim(),
          "hårfarve": document.getElementById("edit-haarfarve").value.trim(),
          oejenfarve: document.getElementById("edit-oejenfarve").value.trim(),
          "øjenfarve": document.getElementById("edit-oejenfarve").value.trim(),
          mugshotUrl: document.getElementById("edit-mugshot").value.trim(),
          mugshot: document.getElementById("edit-mugshot").value.trim(),
          billede: document.getElementById("edit-mugshot").value.trim(),
          tags: document.getElementById("edit-tags").value.trim(),
          saerligeKendetegn: document.getElementById("edit-kendetegn").value.trim(),
          "særligeKendetegn": document.getElementById("edit-kendetegn").value.trim(),
          kommentar: document.getElementById("edit-kommentar").value.trim()
        };

        setPersonStore(all);
        overlay.remove();

        const content = document.getElementById("content-area");
        if (content) {
          await window.renderPersonregister(content);
          await window.selectPerson(id);
        }

        if (typeof showToast === "function") showToast("Personprofil opdateret");
      } catch (err) {
        console.error("Person save v7 fejl", err);
        if (typeof showToast === "function") showToast("Kunne ikke gemme ændringer");
      }
    });
  };
})();
</script>


<script>
/* ==== Vehicle register redesign ==== */
(function () {
  function escVehicle(v) {
    return String(v ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function getVehicleStore() {
    try {
      const raw = localStorage.getItem("copaid_offline_koeretoejer");
      if (raw) {
        const rows = JSON.parse(raw);
        if (Array.isArray(rows)) return rows;
      }
    } catch {}
    return [];
  }

  function setVehicleStore(rows) {
    localStorage.setItem("copaid_offline_koeretoejer", JSON.stringify(rows));
  }

  async function ensureVehicleStore() {
    let rows = getVehicleStore();
    if (!rows.length) {
      try {
        const apiRows = await koeretoejerApi.getAll();
        if (Array.isArray(apiRows)) {
          rows = apiRows;
          setVehicleStore(apiRows);
        }
      } catch {}
    }
    return rows;
  }

  function vehicleDisplayName(v) {
    return [v.maerke || v.brand || "", v.model || ""].join(" ").trim() || "Ukendt køretøj";
  }

  function vehicleIcon(v) {
    const kind = `${v.type || ""} ${v.kategori || ""} ${v.model || ""}`.toLowerCase();
    if (kind.includes("motor")) return "🏍️";
    return "🚘";
  }

  function renderVehicleEmpty(container, rows) {
    const q = String(window._vrSearch || "").toLowerCase();
    const filtered = rows.filter(v => {
      const hay = `${v.nummerplade||v.plate||""} ${vehicleDisplayName(v)} ${v.ejer||v.owner||""}`.toLowerCase();
      return !q || hay.includes(q);
    });

    container.innerHTML = `
      <div class="vr-shell">
        <div class="vr-search-page">
          <div class="vr-search-hero">
            <div class="vr-search-title">Køretøjsregister</div>
            <div class="vr-search-text">Søg efter et køretøj for at åbne samlet profil med oplysninger, ejerforhold og status.</div>
            <div class="vr-search-row">
              <input class="input" id="vr-search-big" placeholder="Søg nummerplade, ejer eller model..." value="${escVehicle(window._vrSearch || "")}">
              <button class="btn btn-primary" onclick="showToast('Tilføj køretøj kan kobles på data senere')">+</button>
            </div>
          </div>

          <div class="vr-search-results">
            ${filtered.length ? filtered.map(v => `
              <div class="vr-search-result" onclick="selectVehicle('${v.id}')">
                <div class="vr-search-result-title">${escVehicle(vehicleDisplayName(v))}</div>
                <div class="vr-search-result-sub">${escVehicle(v.nummerplade || v.plate || "Ingen nummerplade")} · Ejer: ${escVehicle(v.ejer || v.owner || "Ukendt")}</div>
              </div>
            `).join("") : `<div class="vr-empty-card" style="max-width:980px;margin:0 auto"><div class="vr-empty-title">Ingen køretøjer fundet</div><div class="vr-empty-text">Prøv en anden søgning eller indsæt data senere.</div></div>`}
          </div>
        </div>
      </div>
    `;

    document.getElementById("vr-search-big")?.addEventListener("input", e => {
      window._vrSearch = e.target.value;
      renderVehicleEmpty(container, rows);
    });
  }

  window.renderKoeretoejsregister = async function(container) {
    const rows = await ensureVehicleStore();
    window._vrVehicles = rows;

    if (!window._vrSelectedId || !rows.some(v => String(v.id) === String(window._vrSelectedId))) {
      window._vrSelectedId = null;
      renderVehicleEmpty(container, rows);
      return;
    }

    await window.selectVehicle(window._vrSelectedId);
  };

  window.selectVehicle = async function(id) {
    window._vrSelectedId = id;
    const rows = window._vrVehicles || getVehicleStore();
    const v = rows.find(x => String(x.id) === String(id));
    const container = document.getElementById("content-area");
    if (!v || !container) return;

    let personer = [];
    try { personer = JSON.parse(localStorage.getItem("copaid_offline_personer") || "[]"); } catch {}
    const ownerName = v.ejer || v.owner || "Ukendt";
    const owner = Array.isArray(personer) ? personer.find(p => `${p.fornavn || ""} ${p.efternavn || ""}`.trim().toLowerCase() === String(ownerName).toLowerCase()) : null;

    const topTabs = [
      {id:"oversigt", label:"Køretøjsinformation"},
      {id:"ejer", label:"Ejer"},
      {id:"historik", label:"Historik"},
      {id:"frakendelser", label:"Frakendelser (0)"}
    ];
    const activeTab = window._vrDetailTab || "oversigt";

    container.innerHTML = `
      <div class="vr-shell">
        <div class="vr-back-row">
          <button class="btn btn-outline" onclick="window._vrSelectedId=null; renderKoeretoejsregister(document.getElementById('content-area'))">← Tilbage til søgning</button>
        </div>

        <div class="pr-main vr-main">
          <div class="vr-top-tabs">
            ${topTabs.map(tab => `<div class="vr-tab ${activeTab===tab.id ? "active" : ""}" onclick="window._vrDetailTab='${tab.id}'; selectVehicle('${v.id}')">${tab.label}</div>`).join("")}
          </div>

          ${activeTab === "oversigt" ? `
            <div class="vr-layout">
              <div class="vr-side-stack">
                <div class="vr-vehicle-card">
                  <div class="vr-vehicle-art">${vehicleIcon(v)}</div>
                </div>
                <div class="vr-side-card">
                  <div class="vr-side-title">Efterlysningsstatus</div>
                  <div class="vr-side-text">${escVehicle(v.efterlyst ? "Efterlyst" : "Ikke efterlyst")}</div>
                </div>
                <div class="vr-side-card">
                  <div class="vr-side-title">Ejer</div>
                  <div class="vr-side-text">${escVehicle(ownerName)}</div>
                </div>
                <div class="vr-side-card">
                  <div class="vr-side-title">Noter</div>
                  <div class="vr-side-text">${escVehicle(v.noter || "Ingen noter registreret")}</div>
                </div>
              </div>

              <div>
                <div class="vr-main-top">
                  <div class="vr-name">${escVehicle(vehicleDisplayName(v))}</div>
                  <div class="vr-actions">
                    <button class="btn btn-outline btn-sm" onclick="showVehicleEdit('${v.id}')">✎ Rediger</button>
                    <button class="btn btn-outline btn-sm" onclick="toggleVehicleWanted('${v.id}')">△ ${v.efterlyst ? "Fjern efterlysning" : "Efterlys"}</button>
                  </div>
                </div>

                <div class="vr-info-grid">
                  <div class="vr-info"><div class="vr-info-label">Nummerplade</div><div class="vr-info-value">${escVehicle(v.nummerplade || v.plate || "Ukendt")}</div></div>
                  <div class="vr-info"><div class="vr-info-label">Mærke</div><div class="vr-info-value">${escVehicle(v.maerke || v.brand || "Ukendt")}</div></div>
                  <div class="vr-info"><div class="vr-info-label">Model</div><div class="vr-info-value">${escVehicle(v.model || "Ukendt")}</div></div>

                  <div class="vr-info"><div class="vr-info-label">Ejer</div><div class="vr-info-value">${escVehicle(ownerName)}</div></div>
                  <div class="vr-info"><div class="vr-info-label">Garage</div><div class="vr-info-value">${escVehicle(v.garage || "Ukendt")}</div></div>
                  <div class="vr-info"><div class="vr-info-label">Status</div><div class="vr-info-value">${escVehicle(v.status || (v.stored ? "Opbevaret" : "Ude"))}</div></div>

                  <div class="vr-info"><div class="vr-info-label">Farve</div><div class="vr-info-value">${escVehicle(v.farve || "Ukendt")}</div></div>
                  <div class="vr-info"><div class="vr-info-label">Type</div><div class="vr-info-value">${escVehicle(v.type || "Ukendt")}</div></div>
                  <div class="vr-info"><div class="vr-info-label">Forsikring</div><div class="vr-info-value">${escVehicle(v.forsikring || "Ingen Data/Ukendt")}</div></div>
                </div>
              </div>
            </div>

            <div class="vr-stats">
              <div class="vr-stat-card"><div class="vr-stat-label">Bøder</div><div class="vr-stat-value">${escVehicle(v.boederCount || 0)}</div></div>
              <div class="vr-stat-card"><div class="vr-stat-label">Sager</div><div class="vr-stat-value">${escVehicle(v.sagerCount || 0)}</div></div>
              <div class="vr-stat-card"><div class="vr-stat-label">Beslaglagt</div><div class="vr-stat-value">${escVehicle(v.beslaglagt ? 1 : 0)}</div></div>
            </div>

            <div class="vr-notes-card">
              <div class="vr-notes-title">Systemnoter</div>
              <div class="vr-notes-text">${escVehicle(v.systemnote || "Ingen synlige noter fundet..")}</div>
            </div>
          ` : activeTab === "ejer" ? `
            <div class="vr-empty-state" style="min-height:360px">
              <div class="vr-empty-card">
                <div class="vr-empty-title">${escVehicle(ownerName)}</div>
                <div class="vr-empty-text">
                  ${owner ? `Denne person findes i personregistret og kan åbnes derfra.` : "Ejeroplysninger kan udbygges videre når du sender rigtig data."}
                </div>
                ${owner ? `<div style="margin-top:14px"><button class="btn btn-primary" onclick="openTab('kr'); setTimeout(()=>selectPerson('${owner.id}'), 80)">Åbn ejer i personregister</button></div>` : ``}
              </div>
            </div>
          ` : `
            <div class="vr-empty-state" style="min-height:360px">
              <div class="vr-empty-card">
                <div class="vr-empty-title">${topTabs.find(t=>t.id===activeTab)?.label || ""}</div>
                <div class="vr-empty-text">Denne fane kan udbygges videre i samme stil.</div>
              </div>
            </div>
          `}
        </div>
      </div>
    `;
  };

  window.toggleVehicleWanted = async function(id) {
    const rows = getVehicleStore();
    const idx = rows.findIndex(v => String(v.id) === String(id));
    if (idx === -1) return;
    rows[idx] = { ...rows[idx], efterlyst: !rows[idx].efterlyst };
    setVehicleStore(rows);
    window._vrVehicles = rows;
    await window.selectVehicle(id);
    if (typeof showToast === "function") showToast(rows[idx].efterlyst ? "Køretøj efterlyst" : "Efterlysning fjernet");
  };

  window.showVehicleEdit = async function(id) {
    const rows = getVehicleStore();
    const v = rows.find(x => String(x.id) === String(id));
    if (!v) return;

    const overlay = document.createElement("div");
    overlay.className = "dialog-overlay";
    overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
    overlay.innerHTML = `
      <div class="dialog" style="max-width:760px">
        <div class="dialog-title">Rediger køretøj</div>
        <div class="grid grid-2" style="gap:14px">
          <div><div class="label">Nummerplade</div><input class="input" id="veh-plate" value="${escVehicle(v.nummerplade || v.plate || "")}"></div>
          <div><div class="label">Ejer</div><input class="input" id="veh-owner" value="${escVehicle(v.ejer || v.owner || "")}"></div>
          <div><div class="label">Mærke</div><input class="input" id="veh-brand" value="${escVehicle(v.maerke || v.brand || "")}"></div>
          <div><div class="label">Model</div><input class="input" id="veh-model" value="${escVehicle(v.model || "")}"></div>
          <div><div class="label">Farve</div><input class="input" id="veh-color" value="${escVehicle(v.farve || "")}"></div>
          <div><div class="label">Garage</div><input class="input" id="veh-garage" value="${escVehicle(v.garage || "")}"></div>
        </div>
        <div class="label" style="margin-top:12px">Noter</div>
        <textarea class="textarea" id="veh-notes" rows="4">${escVehicle(v.noter || "")}</textarea>
        <div class="flex items-center justify-end gap-2" style="margin-top:18px">
          <button class="btn btn-primary" id="veh-save-btn">Gem ændringer</button>
          <button class="btn btn-outline" onclick="this.closest('.dialog-overlay').remove()">Luk</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    document.getElementById("veh-save-btn").addEventListener("click", async () => {
      const all = getVehicleStore();
      const idx = all.findIndex(x => String(x.id) === String(id));
      if (idx === -1) return;
      all[idx] = {
        ...all[idx],
        nummerplade: document.getElementById("veh-plate").value.trim(),
        plate: document.getElementById("veh-plate").value.trim(),
        ejer: document.getElementById("veh-owner").value.trim(),
        owner: document.getElementById("veh-owner").value.trim(),
        maerke: document.getElementById("veh-brand").value.trim(),
        brand: document.getElementById("veh-brand").value.trim(),
        model: document.getElementById("veh-model").value.trim(),
        farve: document.getElementById("veh-color").value.trim(),
        garage: document.getElementById("veh-garage").value.trim(),
        noter: document.getElementById("veh-notes").value.trim()
      };
      setVehicleStore(all);
      window._vrVehicles = all;
      overlay.remove();
      await window.selectVehicle(id);
      if (typeof showToast === "function") showToast("Køretøj opdateret");
    });
  };
})();
</script>


<script>
/* ==== Property register redesign ==== */
(function () {
  function escProperty(v) {
    return String(v ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function getPropertyStore() {
    try {
      const raw = localStorage.getItem("copaid_offline_ejendomme");
      if (raw) {
        const rows = JSON.parse(raw);
        if (Array.isArray(rows)) return rows;
      }
    } catch {}
    return [];
  }

  function setPropertyStore(rows) {
    localStorage.setItem("copaid_offline_ejendomme", JSON.stringify(rows));
  }

  async function ensurePropertyStore() {
    let rows = getPropertyStore();
    if (!rows.length) {
      try {
        const apiRows = await ejendommeApi.getAll();
        if (Array.isArray(apiRows)) {
          rows = apiRows;
          setPropertyStore(apiRows);
        }
      } catch {}
    }
    return rows;
  }

  function propertyIdOf(p) {
    return p.husId || p.idCode || p.propertyId || p.lagerId || p.id || "Ukendt ID";
  }

  function propertyNameOf(p) {
    return p.adresse || p.label || p.navn || p.name || `Ejendom ${propertyIdOf(p)}`;
  }

  function propertyOwnerOf(p) {
    return p.ejer || p.owner || p.ownerName || "Ukendt";
  }

  function propertyCoordsOf(p) {
    const x = p.x ?? p.coordsX ?? p.coordX ?? p.positionX;
    const y = p.y ?? p.coordsY ?? p.coordY ?? p.positionY;
    const z = p.z ?? p.coordsZ ?? p.coordZ ?? p.positionZ;
    if ([x, y, z].every(v => v !== undefined && v !== null && v !== "")) {
      return `${Number(x).toFixed(2)}, ${Number(y).toFixed(2)}, ${Number(z).toFixed(2)}`;
    }
    return "Ingen koordinater registreret";
  }

  function renderPropertyEmpty(container, rows) {
    const q = String(window._erSearch || "").toLowerCase();
    const filtered = rows.filter(p => {
      const hay = `${propertyIdOf(p)} ${propertyNameOf(p)} ${propertyOwnerOf(p)}`.toLowerCase();
      return !q || hay.includes(q);
    });

    container.innerHTML = `
      <div class="er-shell">
        <div class="er-search-page">
          <div class="er-search-hero">
            <div class="er-search-title">Ejendomsregister</div>
            <div class="er-search-text">Søg et hus-ID eller lager-ID op for at se ejeroplysninger, placering og status.</div>
            <div class="er-search-row">
              <input class="input" id="er-search-big" placeholder="Søg hus-ID, adresse eller ejer..." value="${escProperty(window._erSearch || "")}">
              <button class="btn btn-primary" onclick="showToast('Tilføj ejendom kan kobles på data senere')">+</button>
            </div>
          </div>

          <div class="er-search-results">
            ${filtered.length ? filtered.map(p => `
              <div class="er-search-result" onclick="selectProperty('${p.id}')">
                <div class="er-search-result-title">${escProperty(propertyNameOf(p))}</div>
                <div class="er-search-result-sub">ID: ${escProperty(propertyIdOf(p))} · Ejer: ${escProperty(propertyOwnerOf(p))}</div>
              </div>
            `).join("") : `<div class="er-empty-card" style="max-width:980px;margin:0 auto"><div class="er-empty-title">Ingen ejendomme fundet</div><div class="er-empty-text">Prøv en anden søgning eller indsæt data senere.</div></div>`}
          </div>
        </div>
      </div>
    `;

    document.getElementById("er-search-big")?.addEventListener("input", e => {
      window._erSearch = e.target.value;
      renderPropertyEmpty(container, rows);
    });
  }

  window.renderEjendomsregister = async function(container) {
    const rows = await ensurePropertyStore();
    window._erProperties = rows;

    if (!window._erSelectedId || !rows.some(p => String(p.id) === String(window._erSelectedId))) {
      window._erSelectedId = null;
      renderPropertyEmpty(container, rows);
      return;
    }

    await window.selectProperty(window._erSelectedId);
  };

  window.selectProperty = async function(id) {
    window._erSelectedId = id;
    const rows = window._erProperties || getPropertyStore();
    const p = rows.find(x => String(x.id) === String(id));
    const container = document.getElementById("content-area");
    if (!p || !container) return;

    let personer = [];
    try { personer = JSON.parse(localStorage.getItem("copaid_offline_personer") || "[]"); } catch {}
    const ownerName = propertyOwnerOf(p);
    const owner = Array.isArray(personer) ? personer.find(pp => `${pp.fornavn || ""} ${pp.efternavn || ""}`.trim().toLowerCase() === String(ownerName).toLowerCase()) : null;

    const topTabs = [
      {id:"oversigt", label:"Ejendomsinformation"},
      {id:"ejer", label:"Ejer"},
      {id:"placering", label:"Placering"},
      {id:"historik", label:"Historik"}
    ];
    const activeTab = window._erDetailTab || "oversigt";

    container.innerHTML = `
      <div class="er-shell">
        <div class="er-back-row">
          <button class="btn btn-outline" onclick="window._erSelectedId=null; renderEjendomsregister(document.getElementById('content-area'))">← Tilbage til søgning</button>
        </div>

        <div class="pr-main er-main">
          <div class="er-top-tabs">
            ${topTabs.map(tab => `<div class="er-tab ${activeTab===tab.id ? "active" : ""}" onclick="window._erDetailTab='${tab.id}'; selectProperty('${p.id}')">${tab.label}</div>`).join("")}
          </div>

          ${activeTab === "oversigt" ? `
            <div class="er-layout">
              <div class="er-side-stack">
                <div class="er-property-card">
                  <div class="er-map-box">
                    <div class="er-map-pin">📍</div>
                    <div class="er-map-grid">
                      ${Array.from({length:15}).map(() => "<span></span>").join("")}
                    </div>
                  </div>
                </div>
                <div class="er-side-card">
                  <div class="er-side-title">Placering på kort</div>
                  <div class="er-side-text">${escProperty(propertyCoordsOf(p))}</div>
                </div>
                <div class="er-side-card">
                  <div class="er-side-title">Ejer</div>
                  <div class="er-side-text">${escProperty(ownerName)}</div>
                </div>
                <div class="er-side-card">
                  <div class="er-side-title">Noter</div>
                  <div class="er-side-text">${escProperty(p.noter || "Ingen noter registreret")}</div>
                </div>
              </div>

              <div>
                <div class="er-main-top">
                  <div class="er-name">${escProperty(propertyNameOf(p))}</div>
                  <div class="er-actions">
                    <button class="btn btn-outline btn-sm" onclick="showPropertyEdit('${p.id}')">✎ Rediger</button>
                    ${owner ? `<button class="btn btn-outline btn-sm" onclick="openTab('kr'); setTimeout(()=>selectPerson('${owner.id}'), 80)">👤 Åbn ejer</button>` : ``}
                  </div>
                </div>

                <div class="er-info-grid">
                  <div class="er-info"><div class="er-info-label">Hus/Lager ID</div><div class="er-info-value">${escProperty(propertyIdOf(p))}</div></div>
                  <div class="er-info"><div class="er-info-label">Adresse</div><div class="er-info-value">${escProperty(propertyNameOf(p))}</div></div>
                  <div class="er-info"><div class="er-info-label">Type</div><div class="er-info-value">${escProperty(p.type || p.kategori || "Ukendt")}</div></div>

                  <div class="er-info"><div class="er-info-label">Ejer</div><div class="er-info-value">${escProperty(ownerName)}</div></div>
                  <div class="er-info"><div class="er-info-label">Status</div><div class="er-info-value">${escProperty(p.status || "Aktiv")}</div></div>
                  <div class="er-info"><div class="er-info-label">Pris</div><div class="er-info-value">${escProperty(p.pris || "Ukendt")}</div></div>

                  <div class="er-info"><div class="er-info-label">Koordinater</div><div class="er-info-value">${escProperty(propertyCoordsOf(p))}</div></div>
                  <div class="er-info"><div class="er-info-label">Lagerplads</div><div class="er-info-value">${escProperty(p.lagerplads || p.storage || "Ukendt")}</div></div>
                  <div class="er-info"><div class="er-info-label">Skalsikring</div><div class="er-info-value">${escProperty(p.sikring || "Ingen Data/Ukendt")}</div></div>
                </div>
              </div>
            </div>

            <div class="er-stats">
              <div class="er-stat-card"><div class="er-stat-label">Antal ejere</div><div class="er-stat-value">1</div></div>
              <div class="er-stat-card"><div class="er-stat-label">Opbevaring</div><div class="er-stat-value">${escProperty(p.lagerCount || 0)}</div></div>
              <div class="er-stat-card"><div class="er-stat-label">Låst</div><div class="er-stat-value">${p.laast ? 1 : 0}</div></div>
            </div>

            <div class="er-notes-card">
              <div class="er-notes-title">Systemnoter</div>
              <div class="er-notes-text">${escProperty(p.systemnote || "Ingen synlige noter fundet..")}</div>
            </div>
          ` : activeTab === "ejer" ? `
            <div class="er-empty-state" style="min-height:360px">
              <div class="er-empty-card">
                <div class="er-empty-title">${escProperty(ownerName)}</div>
                <div class="er-empty-text">
                  ${owner ? `Denne person findes i personregistret og kan åbnes derfra.` : "Ejeroplysninger kan udbygges videre når du sender rigtig data."}
                </div>
                ${owner ? `<div style="margin-top:14px"><button class="btn btn-primary" onclick="openTab('kr'); setTimeout(()=>selectPerson('${owner.id}'), 80)">Åbn ejer i personregister</button></div>` : ``}
              </div>
            </div>
          ` : activeTab === "placering" ? `
            <div class="er-empty-state" style="min-height:360px">
              <div class="er-empty-card">
                <div class="er-empty-icon">📍</div>
                <div class="er-empty-title">Kortplacering</div>
                <div class="er-empty-text">Koordinater: ${escProperty(propertyCoordsOf(p))}</div>
              </div>
            </div>
          ` : `
            <div class="er-empty-state" style="min-height:360px">
              <div class="er-empty-card">
                <div class="er-empty-title">${topTabs.find(t=>t.id===activeTab)?.label || ""}</div>
                <div class="er-empty-text">Denne fane kan udbygges videre i samme stil.</div>
              </div>
            </div>
          `}
        </div>
      </div>
    `;
  };

  window.showPropertyEdit = async function(id) {
    const rows = getPropertyStore();
    const p = rows.find(x => String(x.id) === String(id));
    if (!p) return;

    const overlay = document.createElement("div");
    overlay.className = "dialog-overlay";
    overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
    overlay.innerHTML = `
      <div class="dialog" style="max-width:760px">
        <div class="dialog-title">Rediger ejendom</div>
        <div class="grid grid-2" style="gap:14px">
          <div><div class="label">Hus/Lager ID</div><input class="input" id="prop-id" value="${escProperty(propertyIdOf(p))}"></div>
          <div><div class="label">Ejer</div><input class="input" id="prop-owner" value="${escProperty(propertyOwnerOf(p))}"></div>
          <div><div class="label">Adresse</div><input class="input" id="prop-address" value="${escProperty(propertyNameOf(p))}"></div>
          <div><div class="label">Type</div><input class="input" id="prop-type" value="${escProperty(p.type || p.kategori || "")}"></div>
          <div><div class="label">X</div><input class="input" id="prop-x" value="${escProperty(p.x ?? p.coordsX ?? "")}"></div>
          <div><div class="label">Y</div><input class="input" id="prop-y" value="${escProperty(p.y ?? p.coordsY ?? "")}"></div>
          <div><div class="label">Z</div><input class="input" id="prop-z" value="${escProperty(p.z ?? p.coordsZ ?? "")}"></div>
          <div><div class="label">Status</div><input class="input" id="prop-status" value="${escProperty(p.status || "Aktiv")}"></div>
        </div>
        <div class="label" style="margin-top:12px">Noter</div>
        <textarea class="textarea" id="prop-notes" rows="4">${escProperty(p.noter || "")}</textarea>
        <div class="flex items-center justify-end gap-2" style="margin-top:18px">
          <button class="btn btn-primary" id="prop-save-btn">Gem ændringer</button>
          <button class="btn btn-outline" onclick="this.closest('.dialog-overlay').remove()">Luk</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    document.getElementById("prop-save-btn").addEventListener("click", async () => {
      const all = getPropertyStore();
      const idx = all.findIndex(x => String(x.id) === String(id));
      if (idx === -1) return;
      all[idx] = {
        ...all[idx],
        husId: document.getElementById("prop-id").value.trim(),
        propertyId: document.getElementById("prop-id").value.trim(),
        ejer: document.getElementById("prop-owner").value.trim(),
        owner: document.getElementById("prop-owner").value.trim(),
        adresse: document.getElementById("prop-address").value.trim(),
        label: document.getElementById("prop-address").value.trim(),
        type: document.getElementById("prop-type").value.trim(),
        x: document.getElementById("prop-x").value.trim(),
        y: document.getElementById("prop-y").value.trim(),
        z: document.getElementById("prop-z").value.trim(),
        status: document.getElementById("prop-status").value.trim(),
        noter: document.getElementById("prop-notes").value.trim()
      };
      setPropertyStore(all);
      window._erProperties = all;
      overlay.remove();
      await window.selectProperty(id);
      if (typeof showToast === "function") showToast("Ejendom opdateret");
    });
  };
})();
</script>


<script>
/* ==== Wanted register redesign ==== */
(function () {
  function escWanted(v) {
    return String(v ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function getPersonStoreWanted() {
    try { const raw = localStorage.getItem("copaid_offline_personer"); if (raw) { const rows = JSON.parse(raw); if (Array.isArray(rows)) return rows; } } catch {}
    return [];
  }
  function getVehicleStoreWanted() {
    try { const raw = localStorage.getItem("copaid_offline_koeretoejer"); if (raw) { const rows = JSON.parse(raw); if (Array.isArray(rows)) return rows; } } catch {}
    return [];
  }

  function personInitialsWanted(p) {
    return `${(p?.fornavn?.[0] || "U")}${(p?.efternavn?.[0] || "B")}`.toUpperCase();
  }
  function vehicleNameWanted(v) {
    return [v.maerke || v.brand || "", v.model || ""].join(" ").trim() || "Ukendt køretøj";
  }

  function buildWantedData() {
    const persons = getPersonStoreWanted()
      .filter(p => p.efterlyst || p.wanted || p.efterlysning)
      .map(p => ({
        kind: "person",
        id: `person-${p.id}`,
        sourceId: p.id,
        title: `${p.fornavn || ""} ${p.efternavn || ""}`.trim() || "Ukendt person",
        subtitle: p.cpr || "Ingen CPR",
        image: p.mugshotUrl || p.mugshot || p.billede || "",
        reason: p.efterlysningAarsag || p.wantedReason || p.reason || "Efterlyst person",
        level: p.efterlysningGrad || p.level || "Aktiv",
        phone: p.telefon || "",
        notes: p.kommentar || p.noter || ""
      }));

    const vehicles = getVehicleStoreWanted()
      .filter(v => v.efterlyst || v.wanted)
      .map(v => ({
        kind: "vehicle",
        id: `vehicle-${v.id}`,
        sourceId: v.id,
        title: vehicleNameWanted(v),
        subtitle: v.nummerplade || v.plate || "Ingen nummerplade",
        owner: v.ejer || v.owner || "Ukendt",
        reason: v.efterlysningAarsag || v.wantedReason || "Efterlyst køretøj",
        level: v.efterlysningGrad || v.level || "Aktiv",
        notes: v.noter || "",
        icon: "🚘"
      }));

    return { persons, vehicles };
  }

  function renderWantedSearch(container) {
    const q = String(window._wantedSearch || "").toLowerCase();
    const mode = window._wantedMode || "person";
    const data = buildWantedData();
    const rows = mode === "vehicle" ? data.vehicles : data.persons;
    const filtered = rows.filter(r => `${r.title} ${r.subtitle} ${r.owner || ""} ${r.reason || ""}`.toLowerCase().includes(q));

    container.innerHTML = `
      <div class="wr-shell">
        <div class="wr-search-page">
          <div class="wr-search-hero">
            <div class="wr-search-title">Efterlysninger</div>
            <div class="wr-search-text">Søg efter efterlyste personer eller køretøjer i ét simpelt og professionelt register.</div>
            <div class="wr-search-row">
              <input class="input" id="wanted-search-big" placeholder="${mode === "person" ? "Søg navn, CPR eller årsag..." : "Søg nummerplade, ejer eller model..."}" value="${escWanted(window._wantedSearch || "")}">
              <div class="wr-segment">
                <button class="wr-seg-btn ${mode==="person" ? "active" : ""}" id="wanted-person-btn">Personer</button>
                <button class="wr-seg-btn ${mode==="vehicle" ? "active" : ""}" id="wanted-vehicle-btn">Køretøjer</button>
              </div>
            </div>
          </div>

          <div class="wr-search-results">
            ${filtered.length ? filtered.map(r => `
              <div class="wr-result" onclick="selectWantedItem('${r.id}')">
                <div class="wr-result-title">${escWanted(r.title)}</div>
                <div class="wr-result-sub">${escWanted(r.subtitle)}${r.owner ? ` · Ejer: ${escWanted(r.owner)}` : ""} · ${escWanted(r.reason)}</div>
              </div>
            `).join("") : `<div class="wr-empty-card" style="max-width:980px;margin:0 auto"><div class="wr-empty-title">Ingen efterlysninger fundet</div><div class="wr-empty-text">Prøv en anden søgning eller skift mellem personer og køretøjer.</div></div>`}
          </div>
        </div>
      </div>
    `;

    document.getElementById("wanted-search-big")?.addEventListener("input", e => {
      window._wantedSearch = e.target.value;
      renderWantedSearch(container);
    });
    document.getElementById("wanted-person-btn")?.addEventListener("click", () => {
      window._wantedMode = "person";
      window._wantedSearch = "";
      renderWantedSearch(container);
    });
    document.getElementById("wanted-vehicle-btn")?.addEventListener("click", () => {
      window._wantedMode = "vehicle";
      window._wantedSearch = "";
      renderWantedSearch(container);
    });
  }

  window.renderEfterlysninger = async function(container) {
    const data = buildWantedData();
    const selected = window._wantedSelectedId;
    const exists = [...data.persons, ...data.vehicles].some(x => x.id === selected);
    if (!selected || !exists) {
      window._wantedSelectedId = null;
      renderWantedSearch(container);
      return;
    }
    await window.selectWantedItem(selected);
  };

  window.selectWantedItem = async function(id) {
    window._wantedSelectedId = id;
    const data = buildWantedData();
    const item = [...data.persons, ...data.vehicles].find(x => x.id === id);
    const container = document.getElementById("content-area");
    if (!item || !container) return;

    const topTabs = [
      {id:"oversigt", label:"Oversigt"},
      {id:"detaljer", label:"Detaljer"},
      {id:"noter", label:"Noter"}
    ];
    const activeTab = window._wantedDetailTab || "oversigt";

    container.innerHTML = `
      <div class="wr-shell">
        <div class="wr-back-row">
          <button class="btn btn-outline" onclick="window._wantedSelectedId=null; renderEfterlysninger(document.getElementById('content-area'))">← Tilbage til søgning</button>
        </div>

        <div class="pr-main wr-main">
          <div class="wr-top-tabs">
            ${topTabs.map(tab => `<div class="wr-tab ${activeTab===tab.id ? "active" : ""}" onclick="window._wantedDetailTab='${tab.id}'; selectWantedItem('${item.id}')">${tab.label}</div>`).join("")}
          </div>

          <div class="wr-layout">
            <div class="wr-side-stack">
              <div class="wr-card">
                <div class="wr-icon-box">
                  ${item.kind === "person" ? (item.image ? `<img src="${escWanted(item.image)}" style="width:100%;height:100%;object-fit:cover;border-radius:16px">` : personInitialsWanted({fornavn:item.title.split(" ")[0], efternavn:item.title.split(" ").slice(1).join(" ")})) : item.icon}

})();
</script>



<script>
/* ==== LegacyRP case system upgraded ==== */
(function () {
  function escCase(v){
    return String(v ?? "")
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }

  const DEFAULT_CHARGE_CATALOG = [
    { title: "Vold", boede: 6000, faengsel: 8 },
    { title: "Trusler", boede: 3000, faengsel: 4 },
    { title: "Ulovlig våbenbesiddelse", boede: 10000, faengsel: 12 },
    { title: "Røveri", boede: 15000, faengsel: 18 },
    { title: "Farlig kørsel", boede: 5000, faengsel: 6 },
    { title: "Narkobesiddelse", boede: 7000, faengsel: 10 },
    { title: "Flugt fra politiet", boede: 8000, faengsel: 10 }
  ];

  function getCaseStore() {
    try {
      const raw = localStorage.getItem("copaid_offline_rapporter");
      if (raw) {
        const rows = JSON.parse(raw);
        if (Array.isArray(rows)) return rows;
      }
    } catch {}
    return [];
  }

  function setCaseStore(rows) {
    localStorage.setItem("copaid_offline_rapporter", JSON.stringify(rows));
  }

  function getPersonsStore() {
    try { return JSON.parse(localStorage.getItem("copaid_offline_personer") || "[]"); } catch { return []; }
  }

  function getVehiclesStore() {
    try { return JSON.parse(localStorage.getItem("copaid_offline_koeretoejer") || "[]"); } catch { return []; }
  }

  async function ensureCaseStore() {
    let rows = getCaseStore();
    if (!rows.length) {
      rows = [{
        id: "case-demo-1",
        title: "Voldelig episode ved Legion Square",
        status: "Åben",
        prioritet: "Høj",
        ansvarlig: "A7400 Lasse Danner",
        oprettet: new Date().toISOString(),
        sted: "Legion Square",
        resume: "Patrulje ankom til tumult. Flere personer involveret. 1 mistænkt anholdt.",
        suspects: [{ navn: "Mikkel Jensen", cpr: "120398-1234", erkendt: false, behandlet: false }],
        officers: [{ navn: "A7400 Lasse Danner" }, { navn: "A2211 Daniel Holm" }],
        civilians: [{ navn: "Jonas Møller" }],
        charges: [{ title: "Vold", boede: 6000, faengsel: 8 }],
        evidence: [{ name: "Videooptagelse", type: "Digitalt bevis", locker: "A-12", registreretAf: "A7400", tidspunkt: new Date().toLocaleString("da-DK") }, { name: "Kniv", type: "Fysisk bevis", locker: "B-04", registreretAf: "A2211", tidspunkt: new Date().toLocaleString("da-DK") }],
        vehicles: [{ plate: "AB12345", model: "Sultan RS" }],
        notes: "Mistænkt nægter sig skyldig. Video sikret fra overvågning."
      }];
      setCaseStore(rows);
    }
    return rows;
  }

  function countCaseValue(arr){ return Array.isArray(arr) ? arr.length : 0; }

  function calcTotals(charges) {
    const rows = Array.isArray(charges) ? charges : [];
    return {
      boede: rows.reduce((s, c) => s + Number(c.boede || 0), 0),
      faengsel: rows.reduce((s, c) => s + Number(c.faengsel || 0), 0)
    };
  }

  function parseLines(value, mapper) {
    return String(value || "").split("\\n").map(l => l.trim()).filter(Boolean).map(mapper).filter(Boolean);
  }

  function renderCaseEmpty(container, rows) {
    const q = String(window._caseSearch || "").toLowerCase();
    const filtered = rows.filter(r => `${r.title || ""} ${r.status || ""} ${r.sted || ""} ${r.ansvarlig || ""}`.toLowerCase().includes(q));

    container.innerHTML = `
      <div class="case-shell">
        <div class="case-layout">
          <div class="case-sidebar">
            <div class="case-sidebar-head">
              <div>
                <div class="case-title">Rapporter</div>
                <div class="case-sub">Sager med suspects, sigtelser og beviser.</div>
              </div>
              <button class="btn btn-primary btn-sm" onclick="showCaseForm()">+ Ny rapport</button>
            </div>
            <input class="input" id="case-search" placeholder="Søg titel, sted eller ansvarlig..." value="${escCase(window._caseSearch || "")}">
            <div class="case-list">
              ${filtered.map(r => `
                <div class="case-card" onclick="selectCase('${r.id}')">
                  <div style="font-size:14px;font-weight:800">${escCase(r.title || "Uden titel")}</div>
                  <div style="font-size:11px;color:var(--muted-fg);margin-top:6px">${escCase(r.sted || "Ukendt sted")} · ${escCase(r.status || "Åben")}</div>
                  <div class="case-chip-row" style="margin-top:10px">
                    <span class="case-chip">${countCaseValue(r.suspects)} suspects</span>
                    <span class="case-chip">${countCaseValue(r.charges)} sigtelser</span>
                    <span class="case-chip">${countCaseValue(r.evidence)} beviser</span>
                  </div>
                </div>
              `).join("") || `<div class="case-empty-card"><div style="font-size:18px;font-weight:800;margin-bottom:8px">Ingen rapporter</div><div class="case-sub">Opret din første rapport for at komme i gang.</div></div>`}
            </div>
          </div>
          <div class="case-main">
            <div class="case-empty">
              <div class="case-empty-card">
                <div class="case-empty-icon">🗂</div>
                <div style="font-size:20px;font-weight:800;margin-bottom:8px">Vælg en rapport</div>
                <div class="case-sub">Tryk på en rapport til venstre for at åbne hele sagen med personer, sigtelser, beviser og noter.</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
    document.getElementById("case-search")?.addEventListener("input", e => {
      window._caseSearch = e.target.value;
      renderCaseEmpty(container, rows);
    });
  }

  window.renderRapporter = async function(container) {
    const rows = await ensureCaseStore();
    window._caseRows = rows;
    if (!window._caseSelectedId || !rows.some(r => String(r.id) === String(window._caseSelectedId))) {
      window._caseSelectedId = null;
      renderCaseEmpty(container, rows);
      return;
    }
    await window.selectCase(window._caseSelectedId);
  };

                const plate = v.nummerplade || v.plate || "";
                const model = [v.maerke || v.brand || "", v.model || ""].join(" ").trim();
                const checked = selectedVehicles.some(x => String(x.plate) === plate);

                  <input class="input charge-boede" data-index="${i}" value="${escCase(c.boede || 0)}" placeholder="Bøde">

                  <div class="case-charge-row">
                    <input class="input ev-name" value="${escCase(e.name || "")}" placeholder="Bevisnavn">
                    <input class="input ev-type" value="${escCase(e.type || "")}" placeholder="Type">
                    <input class="input ev-locker" value="${escCase(e.locker || "")}" placeholder="Skab / locker">

                `).join("")}

                <button class="case-mini-btn" type="button" id="add-evidence-btn">Tilføj bevis</button>
