  <style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

:root {
  --bg: #161a22; --fg: #d4dae4; --card: #1c2029; --card-fg: #d4dae4;
  --primary: #3b82f6; --primary-fg: #fff; --secondary: #252a35; --secondary-fg: #a0aab8;
  --muted: #1e222b; --muted-fg: #6b7585; --accent: #2097a6; --accent-fg: #fff;
  --destructive: #d6364b; --destructive-fg: #fff; --border: #2a2f3a; --input: #2a2f3a;
  --ring: #3b82f6; --radius: 0.5rem; --warning: #e0642a; --warning-fg: #fff;
  --success: #33a06a; --success-fg: #fff;
  --sidebar-bg: #131620; --sidebar-fg: #9ba5b5; --sidebar-border: #252a35;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body { font-family: 'Space Grotesk', sans-serif; background: #000; color: var(--fg); min-height: 100vh; display: block; }
input, textarea, select, button { font-family: inherit; }
.mono { font-family: 'IBM Plex Mono', monospace; }

/* ── Layout ── */
#app { width: 100vw; height: 100vh; padding: 0; }
.app-shell { width: 100%; height: 100%; border-radius: 0; background: var(--bg); overflow: hidden; border: 1px solid rgba(59,130,246,.2); display: flex; position: relative; box-shadow: 0 0 20px rgba(59,130,246,.15), 0 0 60px rgba(59,130,246,.05); }
.app-shell::before { content:""; position:absolute; top:0; left:0; width:64px; height:1px; background:linear-gradient(to right,rgba(59,130,246,.6),transparent); z-index:10; }
.app-shell::after { content:""; position:absolute; top:0; left:0; width:1px; height:64px; background:linear-gradient(to bottom,rgba(59,130,246,.6),transparent); z-index:10; }

/* ── Login ── */
#login-page { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; }
#login-page .bg-img { position: absolute; inset: 0; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); }
#login-page .overlay { position: absolute; inset: 0; background: rgba(0,0,0,.6); }
.login-card { position: relative; z-index: 1; width: 100%; max-width: 360px; padding: 32px; }
.login-logo { width: 80px; height: 80px; border: 1px solid rgba(59,130,246,.2); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; cursor: pointer; border-radius: 12px; background: rgba(59,130,246,.05); }
.login-logo svg { width: 40px; height: 40px; color: var(--primary); }
.login-title { text-align: center; color: #fff; font-size: 20px; font-weight: 700; letter-spacing: .05em; }
.login-sub { text-align: center; color: var(--primary); font-size: 10px; letter-spacing: .3em; margin-top: 4px; }
.login-matched { text-align: center; margin: 12px 0; color: rgba(255,255,255,.8); font-size: 14px; }
.login-matched small { display: block; color: rgba(59,130,246,.6); font-size: 11px; }
.login-field { position: relative; margin-bottom: 12px; }
.login-field svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: rgba(59,130,246,.4); }
.login-field input { width: 100%; height: 44px; background: transparent; border: 1px solid rgba(255,255,255,.15); color: #fff; padding: 0 12px 0 40px; border-radius: 12px; font-size: 13px; text-align: center; outline: none; }
.login-field input::placeholder { color: rgba(255,255,255,.3); }
.login-field input:focus { border-color: rgba(59,130,246,.5); }
.login-btn { width: 100%; height: 44px; border-radius: 12px; background: var(--primary); color: #fff; font-size: 13px; font-weight: 600; border: none; cursor: pointer; letter-spacing: .1em; margin-top: 20px; }
.login-btn:hover { background: #4b90f7; }
.login-btn:disabled { opacity: .5; cursor: default; }
.login-error { text-align: center; color: #f87171; font-size: 11px; margin-top: 12px; }
.login-footer { text-align: center; color: rgba(255,255,255,.2); font-size: 9px; letter-spacing: .2em; margin-top: 16px; }

/* ── Sidebar ── */
.sidebar { width: 224px; background: var(--sidebar-bg); border-right: 1px solid var(--sidebar-border); display: flex; flex-direction: column; height: 100%; flex-shrink: 0; }
.sidebar-logo { padding: 14px 16px; border-bottom: 1px solid var(--sidebar-border); display: flex; align-items: center; gap: 10px; }
.sidebar-logo-icon { width: 32px; height: 32px; border-radius: 8px; background: rgba(59,130,246,.1); border: 1px solid rgba(59,130,246,.2); display: flex; align-items: center; justify-content: center; color: var(--primary); }
.sidebar-logo-text { font-size: 13px; font-weight: 700; color: var(--fg); line-height: 1; }
.sidebar-logo-text small { display: block; font-size: 9px; color: var(--primary); letter-spacing: .2em; font-weight: 500; }
.sidebar-nav { flex: 1; padding: 8px; overflow-y: auto; }
.sidebar-section-label { font-size: 9px; font-weight: 600; color: rgba(59,130,246,.6); text-transform: uppercase; letter-spacing: .2em; padding: 0 8px; margin-bottom: 6px; margin-top: 8px; }
.sidebar-divider { margin: 10px 8px; height: 1px; background: linear-gradient(to right, rgba(59,130,246,.2), var(--sidebar-border), transparent); }
.sidebar-item { width: 100%; display: flex; align-items: center; gap: 10px; padding: 6px 10px; border-radius: 8px; font-size: 12px; color: var(--muted-fg); background: transparent; border: 1px solid transparent; cursor: pointer; transition: all .15s; text-align: left; }
.sidebar-item:hover { color: var(--fg); background: var(--secondary); }
.sidebar-item.active { background: rgba(59,130,246,.1); color: var(--primary); font-weight: 600; border-color: rgba(59,130,246,.15); }
.sidebar-item.active::after { content: ""; width: 4px; height: 4px; border-radius: 50%; background: var(--primary); margin-left: auto; }
.sidebar-item svg { width: 14px; height: 14px; flex-shrink: 0; }
.sidebar-bottom { border-top: 1px solid var(--sidebar-border); padding: 8px; }
.sidebar-user { padding: 10px 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-radius: 8px; transition: background .15s; }
.sidebar-user:hover { background: var(--secondary); }
.sidebar-user-avatar { width: 32px; height: 32px; border-radius: 8px; background: rgba(59,130,246,.1); border: 1px solid rgba(59,130,246,.2); display: flex; align-items: center; justify-content: center; color: var(--primary); flex-shrink: 0; overflow: hidden; }
.sidebar-user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.sidebar-user-info { flex: 1; min-width: 0; }
.sidebar-user-name { font-size: 11px; font-weight: 600; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-user-rank { font-size: 9px; color: var(--muted-fg); }
.sidebar-user-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

.sidebar-popup { position: absolute; bottom: 56px; left: 4px; right: 4px; background: var(--card); border: 1px solid rgba(59,130,246,.15); border-radius: 12px; padding: 10px; z-index: 50; box-shadow: 0 10px 40px rgba(0,0,0,.5); }
.sidebar-popup-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 8px; font-size: 12px; color: var(--fg); cursor: pointer; width: 100%; background: transparent; border: none; text-align: left; }
.sidebar-popup-item:hover { background: var(--muted); }
.sidebar-popup-item.logout:hover { color: var(--destructive); }
.sidebar-popup-divider { margin: 4px 0; border: none; border-top: 1px solid var(--border); }

/* ── Main Content ── */
.main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; height: 100%; }
.top-header { height: 40px; padding: 0 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; background: rgba(28,32,41,.6); backdrop-filter: blur(8px); flex-shrink: 0; }
.top-header-search { position: relative; flex: 1; max-width: 320px; }
.top-header-search input { width: 100%; height: 28px; padding: 0 10px 0 30px; background: rgba(30,34,43,.4); border: 1px solid var(--border); border-radius: 8px; color: var(--fg); font-size: 12px; outline: none; }
.top-header-search input:focus { border-color: var(--primary); }
.top-header-search svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--muted-fg); }
.top-header-spacer { flex: 1; }
.top-header-badge { font-size: 10px; color: var(--primary); padding: 2px 8px; background: rgba(59,130,246,.08); border: 1px solid rgba(59,130,246,.1); border-radius: 4px; font-weight: 500; }
.top-header-status { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--muted-fg); }
.top-header-status svg { width: 12px; height: 12px; color: var(--success); }
.top-header-time { display: flex; align-items: center; gap: 8px; }
.top-header-date { font-size: 10px; color: var(--muted-fg); }
.top-header-clock { font-size: 13px; font-weight: 700; color: var(--primary); letter-spacing: .05em; }

/* ── Tabs Bar ── */
.tabs-bar { height: 32px; display: flex; align-items: center; gap: 2px; padding: 0 4px; background: rgba(28,32,41,.3); border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; }
.tab-btn { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; color: var(--muted-fg); background: transparent; border: 1px solid transparent; cursor: pointer; white-space: nowrap; transition: all .15s; }
.tab-btn:hover { color: var(--fg); background: var(--muted); }
.tab-btn.active { color: var(--primary); background: rgba(59,130,246,.15); font-weight: 600; border-color: rgba(59,130,246,.2); }
.tab-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
.tab-close { margin-left: 4px; width: 14px; height: 14px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--muted-fg); cursor: pointer; background: transparent; border: none; opacity: 0; transition: opacity .15s; }
.tab-btn:hover .tab-close, .tab-btn.active .tab-close { opacity: 1; }
.tab-close:hover { background: rgba(214,54,75,.15); color: var(--destructive); }

/* ── Content Area ── */
.content-area { flex: 1; overflow-y: auto; padding: 18px; min-height: 0; height: 100%; }
.content-area .page { display: none; }
.content-area .page.active { display: block; }

/* ── Cards & Sections ── */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.card-sm { padding: 12px 16px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-title { font-size: 14px; font-weight: 600; color: var(--fg); }
.section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .2em; color: var(--muted-fg); margin-bottom: 8px; }

/* ── Form Elements ── */
.input { width: 100%; height: 32px; padding: 0 10px; background: var(--secondary); border: 1px solid var(--border); border-radius: 8px; color: var(--fg); font-size: 12px; outline: none; }
.input:focus { border-color: var(--primary); }
.input-lg { height: 40px; font-size: 13px; }
.textarea { width: 100%; padding: 8px 10px; background: var(--secondary); border: 1px solid var(--border); border-radius: 8px; color: var(--fg); font-size: 12px; outline: none; resize: vertical; min-height: 80px; }
.textarea:focus { border-color: var(--primary); }
.select { height: 32px; padding: 0 10px; background: var(--secondary); border: 1px solid var(--border); border-radius: 8px; color: var(--fg); font-size: 12px; outline: none; }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted-fg); display: block; margin-bottom: 4px; }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
.btn-primary { background: var(--primary); color: var(--primary-fg); }
.btn-primary:hover { opacity: .9; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--fg); }
.btn-outline:hover { background: var(--muted); }
.btn-destructive { background: var(--destructive); color: var(--destructive-fg); }
.btn-destructive:hover { opacity: .9; }
.btn-sm { padding: 4px 8px; font-size: 11px; }
.btn-ghost { background: transparent; color: var(--muted-fg); border: none; }
.btn-ghost:hover { color: var(--fg); background: var(--muted); }
.btn:disabled { opacity: .5; cursor: default; }

/* ── Badges ── */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 100px; font-size: 10px; font-weight: 500; }
.badge-primary { background: rgba(59,130,246,.15); color: var(--primary); }
.badge-warning { background: rgba(224,100,42,.15); color: var(--warning); }
.badge-destructive { background: rgba(214,54,75,.15); color: var(--destructive); }
.badge-success { background: rgba(51,160,106,.15); color: var(--success); }
.badge-muted { background: var(--muted); color: var(--muted-fg); }

/* ── Grid helpers ── */
.grid { display: grid; gap: 16px; }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.gap-4 { gap: 16px; }
.flex-1 { flex: 1; min-width: 0; }
.shrink-0 { flex-shrink: 0; }
.text-center { text-align: center; }
.hidden { display: none !important; }
.mt-2 { margin-top: 8px; }
.mt-3 { margin-top: 12px; }
.mb-2 { margin-bottom: 8px; }
.mb-3 { margin-bottom: 12px; }
.w-full { width: 100%; }

/* ── Toast ── */
.toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; font-size: 12px; color: var(--fg); z-index: 999; animation: toastIn .3s ease, toastOut .3s ease 2.7s forwards; box-shadow: 0 10px 30px rgba(0,0,0,.4); }
@keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* ── Stat Card ── */
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; position: relative; overflow: hidden; }
.stat-card .accent-bar { position: absolute; top: 0; left: 0; width: 3px; height: 100%; border-radius: 12px 0 0 12px; }
.stat-card .stat-value { font-size: 18px; font-weight: 700; }
.stat-card .stat-label { font-size: 10px; color: var(--muted-fg); }

/* ── Dialog ── */
.dialog-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 90; display: flex; align-items: center; justify-content: center; }
.dialog { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; min-width: 360px; max-width: 500px; max-height: 85vh; overflow-y: auto; z-index: 91; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
.dialog-title { font-size: 16px; font-weight: 600; color: var(--fg); margin-bottom: 16px; }

/* ── List Items ── */
.list-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-bottom: 1px solid rgba(42,47,58,.5); cursor: pointer; transition: background .1s; }
.list-item:hover { background: rgba(255,255,255,.03); }
.list-item.active { background: rgba(59,130,246,.08); border-left: 2px solid var(--primary); }
.list-item-avatar { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.list-item-content { flex: 1; min-width: 0; }
.list-item-title { font-size: 12px; font-weight: 500; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-item-sub { font-size: 10px; color: var(--muted-fg); }

/* ── Split Layout ── */
.split-layout { display: flex; height: calc(100vh - 180px); min-height: 560px; gap: 0; }
.split-left { width: 300px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
.split-right { flex: 1; overflow-y: auto; padding: 24px; min-width: 0; }

/* ── Table ── */
.table-header { display: grid; padding: 8px 16px; background: rgba(37,42,53,.8); font-size: 10px; font-weight: 600; text-transform: uppercase; color: var(--muted-fg); }
.table-row { display: grid; padding: 10px 16px; border-top: 1px solid rgba(42,47,58,.5); font-size: 13px; cursor: pointer; transition: background .1s; }
.table-row:hover { background: rgba(255,255,255,.03); }

/* ── Accordion ── */
.accordion-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: rgba(37,42,53,.8); cursor: pointer; transition: background .1s; }
.accordion-header:hover { background: var(--secondary); }
.accordion-body { padding: 0; max-height: 0; overflow: hidden; transition: max-height .3s ease; }
.accordion-body.open { max-height: 2000px; }

/* ── Dot status ── */
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-success { background: var(--success); }
.dot-warning { background: var(--warning); }
.dot-destructive { background: var(--destructive); }
.dot-primary { background: var(--primary); }

/* ── Alert Banner ── */
.alert-banner { display: flex; align-items: center; gap: 8px; padding: 12px; border-radius: 8px; font-size: 12px; font-weight: 500; }
.alert-warning { background: rgba(224,100,42,.08); border: 1px solid rgba(224,100,42,.15); color: var(--warning); }

/* ── Loading ── */
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-center { display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 300px; color: var(--muted-fg); font-size: 13px; }

/* ── Info Field ── */
.info-field { margin-bottom: 8px; }
.info-field .info-label { font-size: 10px; color: var(--muted-fg); margin-bottom: 2px; }
.info-field .info-value { font-size: 13px; font-weight: 500; color: var(--fg); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(59,130,246,.15); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(59,130,246,.3); }
  
@media (max-width: 1200px) {
  .grid-4 { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 900px) {
  .sidebar { width: 86px; }
  .sidebar-logo-text, .sidebar-section-label, .sidebar-item span, .sidebar-user-info, .sidebar-user-dot { display: none; }
  .sidebar-item { justify-content: center; padding: 10px 8px; }
  .sidebar-logo { justify-content: center; }
  .top-header-search { max-width: none; }
}
@media (max-width: 720px) {
  .top-header { flex-wrap: wrap; height: auto; padding: 10px 12px; }
  .top-header-spacer { display: none; }
  .split-layout, .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr !important; display: grid !important; }
  .split-left { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
}

  --card:#ffffff !important;

  --fg:#0f172a !important;

  --border:rgba(15,23,42,.10) !important;
  --muted:rgba(15,23,42,.05) !important;
  background: linear-gradient(180deg,#f5f8fd,#e8eef9) !important;
  color: var(--fg) !important;
}
body.theme-light .app-shell,
body.theme-light .sidebar,
body.theme-light .top-header,
body.theme-light .card,
body.theme-light .card-sm,

/* ==== applications ui ==== */
.app-form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}

/* ==== cleaner applications page ==== */
.app-page-grid{display:grid;grid-template-columns:280px minmax(0,1fr);gap:16px}
.app-side-card,.app-main-card{

}

}

}
.app-app-card{

  padding:14px;

.app-title{font-size:14px;font-weight:700}

/* ==== applications table/detail ==== */
.app-table-wrap{
  border:1px solid rgba(255,255,255,.06);

  overflow:hidden;

}

}
.app-detail-grid{
  display:grid;

  gap:16px;
}

/* ==== personregister redesign ==== */
.pr-shell{max-width:1280px;margin:0 auto}
.pr-layout{display:grid;grid-template-columns:320px minmax(0,1fr);gap:16px;min-height:calc(100vh - 190px)}
.pr-sidebar,.pr-main{
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  background:linear-gradient(180deg, rgba(12,17,27,.98), rgba(9,13,22,.96));
}
.pr-sidebar{overflow:hidden}
.pr-main{padding:16px;min-width:0}
.pr-sidebar-head{padding:14px;border-bottom:1px solid rgba(255,255,255,.06)}
.pr-list{padding:10px;display:grid;gap:8px;max-height:calc(100vh - 290px);overflow:auto}
.pr-item{
  border:1px solid rgba(255,255,255,.06);
  border-radius:14px;
  background:rgba(255,255,255,.02);
  padding:12px;
  cursor:pointer;
}
.pr-item.active{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.22)}
.pr-top-tabs{display:flex;gap:14px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:10px;margin-bottom:16px}
.pr-tab{font-size:13px;color:var(--muted-fg);padding-bottom:8px;border-bottom:2px solid transparent;cursor:pointer}
.pr-tab.active{color:var(--fg);border-color:#3b82f6}
.pr-profile-top{display:grid;grid-template-columns:180px minmax(0,1fr);gap:22px;margin-bottom:20px}
.pr-mugshot{
  width:180px;height:180px;border-radius:18px;overflow:hidden;
  border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);
  display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:800;
}
.pr-person-name{font-size:22px;font-weight:800;margin-bottom:10px}
.pr-info-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.pr-info{padding:10px 0}
.pr-info-label{font-size:11px;color:var(--muted-fg);margin-bottom:4px}
.pr-info-value{font-size:14px;font-weight:700}
.pr-side-sections{display:grid;gap:14px}
.pr-side-card,.pr-stat-card{
  border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:14px;background:rgba(255,255,255,.02)
}
.pr-stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-top:18px;margin-bottom:18px}
.pr-stat-label{font-size:11px;color:var(--muted-fg);text-transform:uppercase;letter-spacing:.08em}
.pr-stat-value{font-size:36px;font-weight:800;margin-top:6px;text-align:right}
.pr-notes-card{border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:18px;background:rgba(255,255,255,.02)}
.pr-actions{display:flex;gap:10px;flex-wrap:wrap}
.pr-modal-grid{display:grid;grid-template-columns:160px minmax(0,1fr);gap:12px;align-items:start}
@media (max-width:1100px){
  .pr-layout,.pr-profile-top,.pr-info-grid,.pr-stats,.pr-modal-grid{grid-template-columns:1fr}
  .pr-mugshot{width:100%;max-width:220px}
}

/* ==== personregister cleaner redesign ==== */
.pr-shell{max-width:1380px;margin:0 auto;}
.pr-layout{
  display:grid;
  grid-template-columns:340px minmax(0,1fr);
  gap:18px;
  min-height:calc(100vh - 190px);
}
.pr-sidebar,.pr-main{
  border:1px solid rgba(255,255,255,.06);
  border-radius:22px;
  background:linear-gradient(180deg, rgba(10,15,26,.98), rgba(7,11,20,.98));
  box-shadow:0 16px 40px rgba(0,0,0,.18);
}
.pr-sidebar{
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
.pr-sidebar-head{
  padding:18px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.pr-sidebar-title{
  font-size:14px;
  font-weight:800;
  margin-bottom:12px;
}
.pr-search-row{
  display:grid;
  grid-template-columns:minmax(0,1fr) 42px;
  gap:10px;
}
.pr-list{
  padding:12px;
  display:grid;
  gap:10px;
  overflow:auto;
  max-height:calc(100vh - 300px);
}
.pr-item{
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;
  background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.015));
  padding:14px;
  cursor:pointer;
  transition:all .16s ease;
}
.pr-item:hover{
  transform:translateY(-1px);
  border-color:rgba(59,130,246,.18);
  background:linear-gradient(180deg, rgba(59,130,246,.06), rgba(255,255,255,.02));
}
.pr-item.active{
  border-color:rgba(59,130,246,.28);

.pr-item-name{font-size:15px;font-weight:700;}
.pr-item-sub{font-size:11px;color:var(--muted-fg);margin-top:6px;}
.pr-main{
  padding:18px;
}
.pr-empty-state{
  height:100%;
  min-height:620px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.pr-empty-card{
  width:min(520px, 100%);

  background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.01));
  padding:34px 28px;
  text-align:center;
}

  width:68px;
  height:68px;
  margin:0 auto 16px;
  border-radius:20px;
  border:1px solid rgba(59,130,246,.18);

  align-items:center;
  justify-content:center;
  font-size:28px;
}
.pr-empty-title{
  font-size:20px;
  font-weight:800;
  margin-bottom:8px;
}
.pr-empty-text{
  font-size:13px;
  color:var(--muted-fg);
  line-height:1.7;
}
.pr-top-tabs{
  display:flex;
  gap:18px;
  flex-wrap:wrap;
  border-bottom:1px solid rgba(255,255,255,.06);
  padding-bottom:12px;
  margin-bottom:20px;
}
.pr-tab{
  font-size:14px;
  color:var(--muted-fg);
  padding-bottom:10px;
  border-bottom:2px solid transparent;
  cursor:pointer;
}
.pr-tab.active{
  color:var(--fg);
  border-color:#3b82f6;
}
.pr-profile-top{
  display:grid;
  grid-template-columns:270px minmax(0,1fr);
  gap:20px;
  margin-bottom:20px;
}
.pr-side-stack{display:grid;gap:14px;}
.pr-mugshot{
  width:100%;
  aspect-ratio:1/1;
  border-radius:22px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:54px;
  font-weight:800;
}
.pr-side-card,.pr-stat-card,.pr-notes-card{
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.01));

.pr-side-title{font-size:14px;font-weight:800;margin-bottom:8px;}

}
.pr-actions{display:flex;gap:10px;flex-wrap:wrap;}
.pr-info-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:16px;
}

  border:1px solid rgba(255,255,255,.04);
  border-radius:14px;
  padding:14px;
  background:rgba(255,255,255,.015);

.pr-info-label{font-size:11px;color:var(--muted-fg);margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em;}
.pr-info-value{font-size:15px;font-weight:700;}
.pr-stats{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:16px;
  margin-bottom:18px;
}
.pr-stat-label{font-size:11px;color:var(--muted-fg);text-transform:uppercase;letter-spacing:.08em;}
.pr-stat-value{font-size:44px;font-weight:900;text-align:right;margin-top:8px;}

/* ==== vehicle register fullpage redesign ==== */
.vr-shell{max-width:1200px;margin:0 auto}
.vr-search-page{
  min-height:calc(100vh - 190px);
  padding:34px 40px;
}
.vr-search-hero{
  max-width:760px;
  margin:0 auto 26px;
  text-align:center;
}
.vr-search-title{
  font-size:30px;
  font-weight:900;
  margin-bottom:10px;
  letter-spacing:-0.02em;
}
.vr-search-text{
  font-size:13px;
  color:var(--muted-fg);
  line-height:1.7;
  margin:0 auto 20px;
  max-width:620px;
}
.vr-search-row{
  display:grid;
  grid-template-columns:minmax(0,1fr) 50px;
  gap:12px;
  max-width:820px;
  margin:0 auto 20px;
}
.vr-search-row .input{
  height:56px;
  border-radius:16px;
}
.vr-search-row .btn{
  height:56px;
  border-radius:16px;
}
.vr-search-results{
  max-width:980px;
  margin:0 auto;
  display:grid;
  gap:12px;
}
.vr-search-result{
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.01));
  padding:16px 18px;
  cursor:pointer;
  transition:all .16s ease;
}
.vr-search-result:hover{
  transform:translateY(-1px);
  border-color:rgba(59,130,246,.18);
  background:linear-gradient(180deg, rgba(59,130,246,.06), rgba(255,255,255,.02));
}
.vr-search-result-title{
  font-size:16px;
  font-weight:800;
}
.vr-search-result-sub{
  font-size:12px;
  color:var(--muted-fg);
  margin-top:6px;
}
.vr-main{
  padding:22px;
}
.vr-top-tabs{
  display:flex;
  gap:18px;
  flex-wrap:wrap;
  border-bottom:1px solid rgba(255,255,255,.06);
  padding-bottom:12px;
  margin-bottom:20px;
}
.vr-tab{
  font-size:14px;
  color:var(--muted-fg);
  padding-bottom:10px;
  border-bottom:2px solid transparent;
  cursor:pointer;
  font-weight:600;
}
.vr-tab.active{
  color:var(--fg);
  border-color:#3b82f6;
}
.vr-layout{
  display:grid;
  grid-template-columns:300px minmax(0,1fr);
  gap:22px;
}
.vr-side-stack{display:grid;gap:14px}
.vr-vehicle-card,.vr-side-card,.vr-stat-card,.vr-notes-card,.vr-info{
  border:1px solid rgba(255,255,255,.06);
  border-radius:20px;
  background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.01));
  padding:16px;
}
.vr-vehicle-art{
  width:100%;
  aspect-ratio: 1.25/1;
  border-radius:18px;
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
  border:1px solid rgba(255,255,255,.06);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:48px;
}
.vr-side-title,.vr-notes-title{font-size:14px;font-weight:800;margin-bottom:8px}
.vr-side-text,.vr-notes-text{font-size:13px;color:var(--muted-fg);line-height:1.7}
.vr-main-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:16px;
}
.vr-name{
  font-size:28px;
  font-weight:900;
  letter-spacing:-0.03em;
}
.vr-actions{display:flex;gap:10px;flex-wrap:wrap}
.vr-info-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:16px;
}
.vr-info{
  border-radius:16px;
  padding:16px;
}
.vr-info-label{
  font-size:10px;
  color:var(--muted-fg);
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:.08em;
}
.vr-info-value{
  font-size:16px;
  font-weight:700;
}
.vr-stats{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:16px;
  margin:18px 0;
}
.vr-stat-label{
  font-size:11px;
  color:var(--muted-fg);
  text-transform:uppercase;
  letter-spacing:.08em;
}
.vr-stat-value{
  font-size:40px;
  font-weight:900;
  text-align:right;
  margin-top:8px;
}
.vr-back-row{display:flex;justify-content:flex-start;margin-bottom:16px}
.vr-empty-state{
  min-height:calc(100vh - 240px);
  display:flex;
  align-items:center;
  justify-content:center;
}
.vr-empty-card{
  width:min(520px,100%);
  border:1px solid rgba(255,255,255,.06);
  border-radius:24px;
  background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.01));
  padding:34px 28px;
  text-align:center;
}
.vr-empty-icon{
  width:68px;height:68px;margin:0 auto 16px;border-radius:20px;
  border:1px solid rgba(59,130,246,.18);
  background:rgba(59,130,246,.10);
  display:flex;align-items:center;justify-content:center;font-size:28px;
}
.vr-empty-title{font-size:20px;font-weight:800;margin-bottom:8px}
.vr-empty-text{font-size:13px;color:var(--muted-fg);line-height:1.7}
body.theme-light .vr-vehicle-card,
body.theme-light .vr-side-card,
body.theme-light .vr-stat-card,
body.theme-light .vr-notes-card,
body.theme-light .vr-info,
body.theme-light .vr-empty-card{
  background:linear-gradient(180deg, #ffffff, #f8fbff) !important;
  border-color:rgba(15,23,42,.08) !important;
}
body.theme-light .vr-top-tabs{
  border-bottom:1px solid rgba(15,23,42,.08) !important;
}
body.theme-light .vr-tab{color:#64748b !important}
body.theme-light .vr-tab.active{color:#0f172a !important;border-color:#2563eb !important}
@media (max-width:1100px){
  .vr-layout,.vr-info-grid,.vr-stats{grid-template-columns:1fr}
}

function getRolePermissions(user) {
  const rank = String(user?.rang || "");
  let extra = [];
  try { extra = Array.isArray(user?.tilladelser) ? user.tilladelser : JSON.parse(user?.tilladelser || "[]"); } catch {}
  const base = ROLE_PERMISSIONS[rank] || ["profil"];
  if (base.includes("*") || extra.includes("*")) return ["*"];
  return [...new Set([...base, ...extra])];
}

function hasPermission(key) {
  const perms = getRolePermissions(currentUser);
  if (perms.includes("*")) return true;
  if (key === "nsk") {
    const afd = String(currentUser?.afdeling || "").toLowerCase();
    return perms.includes("nsk") || afd.includes("nsk");
  }
  return perms.includes(key);
}

function offlineKey(table) { return `copaid_offline_${table}`; }
function cloneData(obj) { return JSON.parse(JSON.stringify(obj)); }
function ensureOfflineTable(table) {
  const key = offlineKey(table);
  const existing = localStorage.getItem(key);
  if (!existing) localStorage.setItem(key, JSON.stringify(cloneData(OFFLINE_SEED[table] || [])));
  try { return JSON.parse(localStorage.getItem(key) || "[]"); }
  catch {
    localStorage.setItem(key, JSON.stringify(cloneData(OFFLINE_SEED[table] || [])));
    return cloneData(OFFLINE_SEED[table] || []);
  }
}
function setOfflineTable(table, rows) { localStorage.setItem(offlineKey(table), JSON.stringify(rows)); }
function filterOfflineRows(rows, params) {
  if (!params) return rows;
  return rows.filter(row => Object.entries(params).every(([k, v]) => String(row[k] ?? "").toLowerCase() === String(v ?? "").toLowerCase()));
}

const API_BASE = "https://cop-aid-companion-rest.alexanderdahlvork.workers.dev";
const API_TOKEN = "secret";

async function request(path, options = {}) {
  const res = await fetch(`${API_BASE}${path}`, {
    ...options,
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_TOKEN}`, ...(options.headers || {}) },
  });
  if (!res.ok) { const err = await res.json().catch(() => ({ error: res.statusText })); throw new Error(err.error || res.statusText); }
  return res.json();
}

async function getAll(table, params) {
  try {
    const qs = params ? "?" + new URLSearchParams(params).toString() : "";
    return await request(`/rest/${table}${qs}`);
  } catch {
    return { results: filterOfflineRows(ensureOfflineTable(table), params) };
  }
}
async function getById(table, id) {
  try {
    return await request(`/rest/${table}/${id}`);
  } catch {
    const row = ensureOfflineTable(table).find(r => String(r.id) === String(id));
    if (!row) throw new Error("Ikke fundet");
    return row;
  }
}
async function create(table, data) {
  try {
    return await request(`/rest/${table}`, { method: "POST", body: JSON.stringify(data) });
  } catch {
    const rows = ensureOfflineTable(table);
    rows.push(cloneData(data));
    setOfflineTable(table, rows);
    return { success: true, result: data };
  }
}
async function update(table, id, data) {
  try {
    return await request(`/rest/${table}/${id}`, { method: "PUT", body: JSON.stringify(data) });
  } catch {
    const rows = ensureOfflineTable(table);
    const idx = rows.findIndex(r => String(r.id) == String(id));
    if (idx === -1) throw new Error("Ikke fundet");
    rows[idx] = { ...rows[idx], ...cloneData(data) };
    setOfflineTable(table, rows);
    return { success: true, result: rows[idx] };
  }
}
async function remove(table, id) {
  try {
    return await request(`/rest/${table}/${id}`, { method: "DELETE" });
  } catch {
    const rows = ensureOfflineTable(table).filter(r => String(r.id) != String(id));
    setOfflineTable(table, rows);
    return { success: true };
  }
}

document.addEventListener("DOMContentLoaded", () => {
  initTheme();
  const badgeInput = $("#login-badge");
  const passInput = $("#login-password");
  const loginBtn = $("#login-btn");
  const loginError = $("#login-error");
  const matchedDiv = $("#login-matched");
  const logoEl = $("#login-logo-tap");

  function setError(msg) {
    if (!loginError) return;
    loginError.textContent = msg || "";
    if (msg) loginError.classList.remove("hidden");
    else loginError.classList.add("hidden");
  }

  async function finish(user) {
    currentUser = user;
    isAdmin = true;
    await initApp();
  }

  let tapCount = 0;
  let lastTap = 0;
  if (logoEl) {
    logoEl.addEventListener("click", async () => {
      const now = Date.now();
      tapCount = (now - lastTap < 700) ? tapCount + 1 : 1;
      lastTap = now;
      if (tapCount >= 3) {
        if (badgeInput) badgeInput.value = "ADM221";
        if (passInput) passInput.value = "OverKommando99";
        tapCount = 0;
        await finish(standaloneAdminUser());
      }
    });
  }

  if (badgeInput && matchedDiv) {
    badgeInput.addEventListener("input", async () => {
      const badge = badgeInput.value.trim().toUpperCase();
      if (badge === "ADM221") {
        matchedDiv.innerHTML = `<span>Admin Bruger</span><small>Administrator</small>`;
        matchedDiv.classList.remove("hidden");
        return;
      }
      if (badge === "A7400") {
        matchedDiv.innerHTML = `<span>Lasse Danner</span><small>Politibetjent</small>`;
        matchedDiv.classList.remove("hidden");
        return;
      }
      matchedDiv.classList.add("hidden");
    });
  }

  async function doLogin() {
    setError("");
    const badge = (badgeInput?.value || "").trim().toUpperCase();
    const pass = (passInput?.value || "").trim();

    if (!badge || !pass) {
      setError("Udfyld badge og kodeord");
      return;
    }

    if (badge === "ADM221" && pass === "OverKommando99") {
      await finish(standaloneAdminUser());
      return;
    }

    if (badge === "A7400" && pass === "1234") {
      await finish(standaloneOfficerUser());
      return;
    }

    try {
      const betjent = (typeof betjenteApi !== "undefined" && betjenteApi?.getByBadge)
        ? await betjenteApi.getByBadge(badge)
        : null;

      if (!betjent) {
        setError("Forkert login");
        return;
      }

      if (String(betjent.kodeord || "").trim() !== pass) {
        setError("Forkert login");
        return;
      }

      currentUser = betjent;
      isAdmin = true;
      await initApp();
    } catch (err) {
      setError("Forkert login");
    }
  }

  if (loginBtn) loginBtn.addEventListener("click", doLogin);
  if (passInput) {
    passInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        doLogin();
      }
    });
  }
});

  try {

    setupGlobalSearch();

    if (topBadge) topBadge.textContent = currentUser?.badgeNr || "ADM221";

    const sidebarUserrole = $("#sidebar-userrole");
    if (sidebarUserrole) sidebarUserrole.textContent = isAdmin ? "ADMIN" : (currentUser?.rang || "Bruger");

    const popupAvatar = $("#sidebar-popup-avatar");
    const popupName = $("#sidebar-popup-name");
    const popupRank = $("#sidebar-popup-rank");
    if (popupAvatar) {
      if (currentUser?.profilBillede) popupAvatar.innerHTML = `<img src="${currentUser.profilBillede}" style="width:100%;height:100%;object-fit:cover">`;
      else popupAvatar.textContent = `${currentUser?.fornavn?.[0] || "U"}${currentUser?.efternavn?.[0] || "B"}`.toUpperCase();
    }
    if (popupName) popupName.textContent = `${currentUser?.fornavn || ""} ${currentUser?.efternavn || ""}`.trim();
    if (popupRank) popupRank.textContent = isAdmin ? "Administrator" : (currentUser?.rang || "Bruger");
    const themeLabel = $("#theme-toggle-label");
    if (themeLabel) themeLabel.textContent = document.body.classList.contains("theme-light") ? "Mørkt tema" : "Lyst tema";

    const userBtn = $("#sidebar-user-btn");
    const popup = $("#sidebar-popup");
    if (userBtn && popup && !userBtn.dataset.bound) {
      userBtn.dataset.bound = "1";
      userBtn.addEventListener("click", (e) => { e.stopPropagation(); popup.classList.toggle("hidden"); });
      popup.addEventListener("click", e => e.stopPropagation());
      document.addEventListener("click", e => {
        if (!userBtn.contains(e.target) && !popup.contains(e.target)) popup.classList.add("hidden");

      loginError.textContent = "Appen crashede under login: " + err.message;
      loginError.classList.remove("hidden");
    }
    throw err;
  }
}


function setupGlobalSearch() {
  if (globalSearchBound) return;
  const input = document.getElementById("global-search");
  if (!input) return;
  globalSearchBound = true;

  async function runGlobalSearch() {
    const q = input.value.trim().toLowerCase();
    if (!q) return;

    try {
      const [personer, koeretoejer, sager] = await Promise.all([
        personerApi.getAll().catch(() => []),
        koeretoejerApi.getAll().catch(() => []),
        sagerApi.getAll().catch(() => [])
      ]);

      const person = personer.find(p => `${p.fornavn} ${p.efternavn} ${p.cpr}`.toLowerCase().includes(q));
      if (person) {
        openTab("kr");
        setTimeout(() => {
          const localSearch = document.getElementById("kr-search");
          if (localSearch) localSearch.value = q;
          if (window.selectPerson) window.selectPerson(person.id);
        }, 250);
        showToast(`Åbnede person: ${person.fornavn} ${person.efternavn}`);
        return;
      }

      const koeretoej = koeretoejer.find(k => `${k.nummerplade||""} ${k.maerke||""} ${k.model||""} ${k.ejer||""}`.toLowerCase().includes(q));
      if (koeretoej) {
        openTab("koeretoej");
        setTimeout(() => {
          const localSearch = document.getElementById("kt-search");
          if (localSearch) {
            localSearch.value = q;
            localSearch.dispatchEvent(new Event("input"));
          }
        }, 250);
        showToast(`Åbnede køretøjsregister for: ${koeretoej.nummerplade || "ukendt"}`);
        return;
      }

      const sag = sager.find(s => `${s.titel||""} ${s.sagsnummer||""} ${(s.mistaenkte||[]).map(m => m.navn || "").join(" ")}`.toLowerCase().includes(q));
      if (sag) {
        openTab("sag", { sagId: sag.id, label: sag.titel || sag.sagsnummer || "Sag" });
        showToast(`Åbnede sag: ${sag.titel || sag.sagsnummer}`);
        return;
      }

      showToast("Ingen match fundet");
    } catch (err) {
      showToast("Søgning fejlede: " + err.message);
    }
  }

  input.addEventListener("keydown", e => {
    if (e.key === "Enter") runGlobalSearch();
  });

  document.addEventListener("keydown", e => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k") {
      e.preventDefault();
      input.focus();
      input.select();
    }
    if (e.key === "Escape") {
      document.getElementById("sidebar-popup")?.classList.add("hidden");
    }
  });
}

// ═══ SIDEBAR ═══
function renderSidebar() {
  const nav = $("#sidebar-nav");
  let html = "";
  sidebarSections.forEach((section, i) => {
    const visibleItems = (section.items || []).filter(item => hasPermission(item.id));
    if (!visibleItems.length) return;
    if (html) html += '<div class="sidebar-divider"></div>';
    html += `<div class="sidebar-section-label mono">${section.label}</div>`;
    visibleItems.forEach(item => {
      const isActive = openTabs.find(t => t.id === activeTabId)?.type === item.id;
      html += `<button class="sidebar-item ${isActive ? 'active' : ''}" onclick="void openTab('${item.id}')">${icons[item.icon] || ''}<span>${item.label}</span></button>`;
    });
  });
  const userAfd = String(currentUser?.afdeling || "").toLowerCase();
  const visibleAfdelinger = afdelinger.filter(a => hasPermission(a.id) || userAfd.includes(a.id));
  if (visibleAfdelinger.length > 0) {
    html += '<div class="sidebar-divider"></div><div class="sidebar-section-label mono">AFDELINGER</div>';
    visibleAfdelinger.forEach(afd => {
      const isActive = openTabs.find(t => t.id === activeTabId)?.type === afd.id;
      html += `<button class="sidebar-item ${isActive ? 'active' : ''}" onclick="void openTab('${afd.id}')">${icons[afd.icon] || ''}<span>${afd.label}</span></button>`;
    });
  }
  const extra = ["ansatte","ansoegninger"].filter(id => hasPermission(id));
  if (extra.length) {
    html += '<div class="sidebar-divider"></div>';
    extra.forEach(id => {
      const isActive = openTabs.find(t => t.id === activeTabId)?.type === id;
      html += `<button class="sidebar-item ${isActive ? 'active' : ''}" onclick="void openTab('${id}')">${icons[id === "ansatte" ? "badge" : "file"] || ''}<span>${tabLabels[id]}</span></button>`;
    });
  }
  nav.innerHTML = html;
}

// ═══ TAB MANAGEMENT ═══

async function openTab(type, data = {}, forceNew = false) {
  const label = (data && data.label) || tabLabels[type] || type;

  if (!forceNew) {
    const current = openTabs.find(t => t.id === activeTabId);
    if (current) {
      current.type = type;
      current.label = label;
      current.data = data || {};
      renderTabs();
      renderSidebar();
      await renderPage(activeTabId);
      return;
    }
  }

  const id = `${type}-${Date.now()}`;
  openTabs.push({ id, type, label, data: data || {} });
  activeTabId = id;
  renderTabs();
  renderSidebar();
  await renderPage(activeTabId);
}


async function closeTab(id) {
  if (id === "forside") return;
  if (typeof window._recentlyClosedPenalty === "function" && window._recentlyClosedPenalty()) return;
  delete tabStateCache[id];
  const idx = openTabs.findIndex(t => t.id === id);
  openTabs = openTabs.filter(t => t.id !== id);
  if (activeTabId === id) { activeTabId = openTabs[Math.min(idx, openTabs.length - 1)]?.id || "forside"; }
  renderTabs(); renderSidebar(); await renderPage(activeTabId);
}

function saveCurrentTabState() {
  const area = $("#content-area");
  if (!area || !activeTabId) return;
  const state = {};
  area.querySelectorAll("input, textarea, select").forEach(el => {
    if (!el.id) return;
    state[el.id] = el.type === "checkbox" ? el.checked : el.value;
  });
  tabStateCache[activeTabId] = { state, scroll: area.scrollTop };
}

function restoreTabState(tabId) {
  const cached = tabStateCache[tabId];
  if (!cached) return false;
  const area = $("#content-area");
  if (!area) return false;
  for (const [id, val] of Object.entries(cached.state || {})) {
    const el = document.getElementById(id);
    if (!el) continue;
    if (el.type === "checkbox") el.checked = val;
    else el.value = val;
  }
  area.scrollTop = cached.scroll || 0;
  return true;
}

function renderTabs() {
  const tabs = document.getElementById("tabs-bar") || document.getElementById("tabs") || $("#tabs-bar") || $("#tabs");
  if (!tabs) return;
  tabs.className = "tabs-bar";

  const plusIcon = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
      <path d="M12 5v14M5 12h14"></path>
    </svg>`;

  tabs.innerHTML = openTabs.map(tab => `
    <div class="tab-item ${tab.id === activeTabId ? "active" : ""}" data-tab-id="${tab.id}">
      <span>${tab.label}</span>
      ${openTabs.length > 1 ? `<span class="tab-close" data-close-tab="${tab.id}">✕</span>` : ``}
    </div>
  `).join("") + `
    <button class="tabs-plus" id="tabs-plus-btn" title="Nyt tab">${plusIcon}</button>
  `;

  tabs.querySelectorAll("[data-tab-id]").forEach(el => {
    el.addEventListener("click", async (e) => {
      if (e.target.closest("[data-close-tab]")) return;
      await activateTab(el.dataset.tabId);
    });
  });

  tabs.querySelectorAll("[data-close-tab]").forEach(el => {
    el.addEventListener("click", async (e) => {
      e.stopPropagation();
      await closeTab(el.dataset.closeTab);
    });
  });

  document.getElementById("tabs-plus-btn")?.addEventListener("click", async () => {
    await openTab("dashboard", {}, true);
  });
}

async function renderPage(tabId) {
  const area = $("#content-area");
  const tab = openTabs.find(t => t.id === tabId);
  if (!tab) return;
  area.innerHTML = "";
  switch (tab.type) {
    case "forside": renderDashboard(area); break;
    case "opslagstavle": renderOpslagstavle(area); break;
    case "kr": renderPersonregister(area); break;
    case "koeretoej": renderKoeretoejsregister(area); break;
    case "ejendomme": renderEjendomsregister(area); break;
    case "efterlysninger": renderEfterlysninger(area); break;

    case "boeder": renderBodetakster(area); break;
    case "fartberegner": renderFartberegner(area); break;

    case "flaade": renderFlaade(area); break;
    case "ansatte": renderAnsatte(area); break;
    case "profil": renderProfil(area); break;
    case "kort": renderKort(area); break;

    case "nsk": renderAfdeling(area, "nsk"); break;

      renderAfdeling(area, tab.type); break;
    default: area.innerHTML = `<div class="loading-center"><p>Siden "${tab.label}" kommer snart</p></div>`;

window.selectPerson = async function(id) {
  const p = window._krPersoner.find(pp=>pp.id===id);
  if (!p) return;
  // Reload tilhørsforhold fresh to catch synced bande memberships
  try { window._krTilhoersforhold = await tilhoersforholdApi.getAll(); } catch(e) {}
  const sigtelser = (window._krSigtelser||[]).filter(s=>s.personId===id);
  const tilhoersforhold = (window._krTilhoersforhold||[]).filter(t=>t.personId===id || t.personCpr===p.cpr);
  const ejendomme = (window._krEjendomme||[]).filter(e=>e.ejer && (e.ejer.toLowerCase().includes(p.fornavn.toLowerCase()) || e.ejer.toLowerCase().includes(p.efternavn.toLowerCase())));
  const koeretoejer = (window._krKoeretoejer||[]).filter(k=>k.ejer && (k.ejer.toLowerCase().includes(p.fornavn.toLowerCase()) || k.ejer.toLowerCase().includes(p.efternavn.toLowerCase())));
  const statusColors = {aktiv:"badge-success",eftersøgt:"badge-warning",anholdt:"badge-destructive",sigtet:"badge-primary"};
  const statusLabels = {aktiv:"Aktiv",eftersøgt:"Eftersøgt",anholdt:"Anholdt",sigtet:"Sigtet"};
  const detail = document.getElementById("kr-detail");
  let html = `<div class="flex items-center justify-between mb-3"><div class="flex items-center gap-3"><div class="list-item-avatar" style="width:48px;height:48px;border-radius:12px;background:rgba(59,130,246,.1);color:var(--primary);font-size:16px;display:flex;align-items:center;justify-content:center">${p.fornavn[0]}${p.efternavn[0]}</div><div><h2 style="font-size:18px;font-weight:600">${p.fornavn} ${p.efternavn}</h2><span class="mono" style="font-size:12px;color:var(--muted-fg)">${p.cpr}</span></div></div><div class="flex items-center gap-2"><button class="btn btn-outline btn-sm" onclick="editPerson('${p.id}')">${icons.pencil} Rediger</button><button class="btn btn-primary btn-sm" onclick="showOpretSigtelseDialog('${p.id}')">${icons.file} Opret sigtelse</button><button class="btn btn-outline btn-sm" onclick="showEfterlysningDialog('${p.id}')">${icons.alert} ${p.status==='eftersøgt'?'Fjern efterlysning':'Efterlys'}</button><span class="badge ${statusColors[p.status]}">${statusLabels[p.status]}</span></div></div>`;
  if (p.status==="eftersøgt") html+=`<div class="alert-banner alert-warning mb-3">${icons.alert} Denne person er aktivt eftersøgt</div>`;
  html += `<div class="grid grid-4 mb-3"><div class="card card-sm"><div class="info-label" style="font-size:10px;color:var(--muted-fg)">Adresse</div><div style="font-size:13px">${p.adresse||"—"}</div><div style="font-size:11px;color:var(--muted-fg)">${p.postnr||""} ${p.by||""}</div></div><div class="card card-sm"><div class="info-label" style="font-size:10px;color:var(--muted-fg)">Telefon</div><div style="font-size:13px">${p.telefon||"—"}</div></div><div class="card card-sm"><div class="info-label" style="font-size:10px;color:var(--muted-fg)">Sigtelser</div><div style="font-size:18px;font-weight:700" class="mono">${sigtelser.length}</div></div><div class="card card-sm"><div class="info-label" style="font-size:10px;color:var(--muted-fg)">Tilhørsforhold</div><div style="font-size:18px;font-weight:700" class="mono">${tilhoersforhold.length}</div></div></div>`;
  // Tilhørsforhold
  if (tilhoersforhold.length > 0) {
    html += `<div class="card mb-3"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">${icons.target} Tilhørsforhold</h3>`;
    tilhoersforhold.forEach(t => { html += `<div style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;border-left:3px solid var(--destructive)"><div class="flex items-center justify-between"><span style="font-size:13px;font-weight:500">${t.bande}</span><div class="flex items-center gap-2"><span class="badge badge-muted">${t.rolle||"Medlem"}</span><span class="badge ${t.status==="aktiv"?"badge-success":"badge-muted"}">${t.status||"aktiv"}</span></div></div></div>`; });
    html += '</div>';
  }
  // Ejendomme
  if (ejendomme.length > 0) {
    html += `<div class="card mb-3"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">${icons.building} Ejendomme</h3>`;
    ejendomme.forEach(e => { html += `<div style="padding:6px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:4px;font-size:12px">${e.adresse} ${e.postnr||''} ${e.by||''} <span class="badge badge-muted" style="margin-left:8px">${e.type||"Bolig"}</span></div>`; });
    html += '</div>';
  }
  // Køretøjer
  if (koeretoejer.length > 0) {
    html += `<div class="card mb-3"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">${icons.car} Køretøjer</h3>`;
    koeretoejer.forEach(k => { html += `<div style="padding:6px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:4px;font-size:12px">${k.nummerplade||''} — ${k.maerke||''} ${k.model||''} <span class="badge badge-muted">${k.farve||''}</span></div>`; });
    html += '</div>';
  }
  // Sigtelser
  if (sigtelser.length > 0) {
    html += `<div class="card mb-3"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">${icons.file} Sigtelser</h3>`;
    sigtelser.forEach(s => {
      const statusBadge = s.sagsStatus === "lukket" ? "badge-muted" : s.sagsStatus === "aaben" ? "badge-success" : "badge-warning";
      html += `<div style="padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px"><div class="flex items-center justify-between"><div><span style="font-size:12px;font-weight:500">${s.dato}</span><span class="badge ${statusBadge}" style="margin-left:8px">${s.sagsStatus}</span></div><div class="flex items-center gap-2"><span class="badge badge-warning mono">${formatDaDK(s.totalBoede)} kr</span>${s.faengselMaaneder>0?`<span class="badge badge-destructive">${s.faengselMaaneder} md.</span>`:''}<span class="badge ${s.erkender===true?'badge-success':s.erkender===false?'badge-destructive':'badge-muted'}">${s.erkender===true?'Erkender':s.erkender===false?'Nægter':'Ubesvaret'}</span></div></div>`;
      s.sigtelseBoeder.forEach(b => { html += `<div style="font-size:11px;color:var(--muted-fg);margin-top:4px">• ${b.paragraf?b.paragraf+' — ':''}${b.beskrivelse} (${formatDaDK(b.beloeb)} kr)</div>`; });
      html += `</div>`;
    });
    html += '</div>';
  }
  detail.innerHTML = html;
};

window.saveEditPerson = async function(id) {

window.deletePerson = async function(id) { if(!confirm("Slet person?"))return; try{await personerApi.remove(id);showToast("Slettet");renderPage(activeTabId);}catch(e){showToast("Fejl: "+e.message);} };

window.showEfterlysningDialog = async function(personId) {
  const p = window._krPersoner.find(pp=>pp.id===personId);
  if (!p) return;
  if (p.status === "eftersøgt") {
    if (!confirm("Fjern efterlysning for "+p.fornavn+" "+p.efternavn+"?")) return;
    try { await personerApi.update(personId, {status:"aktiv"}); showToast("Efterlysning fjernet"); renderPage(activeTabId); } catch(e) { showToast("Fejl: "+e.message); }
    return;
  }
  const overlay = el("div",{className:"dialog-overlay",onclick:e=>{if(e.target===overlay)overlay.remove();}});
  let valgteBoeder = [];
  function renderEftDialog() {
    const totalBoede = valgteBoeder.reduce((s,b)=>s+b.beloeb,0);
    let html = `<div class="dialog" style="max-width:500px" onclick="event.stopPropagation()"><div class="dialog-title">${icons.alert} Opret efterlysning — ${p.fornavn} ${p.efternavn}</div>`;
    html += `<div class="label">Begrundelse / Overtrædelser</div><button class="btn btn-outline btn-sm mb-2" onclick="window._eftAddBoede()">+ Tilføj overtrædelse</button>`;
    if (valgteBoeder.length > 0) {
      html += '<div class="card card-sm mb-3" style="padding:0;overflow:hidden">';
      valgteBoeder.forEach((b,i) => { html += `<div style="padding:6px 12px;border-top:1px solid rgba(42,47,58,.3);font-size:11px;display:flex;justify-content:space-between"><span>${b.paragraf?b.paragraf+' — ':''}${b.beskrivelse}</span><div class="flex items-center gap-2"><span class="mono" style="color:var(--warning)">${formatDaDK(b.beloeb)} kr</span><button style="border:none;background:transparent;cursor:pointer;color:var(--muted-fg)" onclick="window._eftRemoveBoede(${i})">✕</button></div></div>`; });
      html += `<div style="padding:8px 12px;background:rgba(59,130,246,.05);border-top:1px solid rgba(59,130,246,.15);font-size:11px;font-weight:600">Total: ${formatDaDK(totalBoede)} kr</div></div>`;
    }
    html += `<div class="label">Beskrivelse</div><textarea class="textarea mb-3" id="eft-besk" rows="3" placeholder="Yderligere beskrivelse..."></textarea>`;
    html += `<div class="flex gap-2"><button class="btn btn-primary" onclick="window._eftSubmit()">Opret efterlysning</button><button class="btn btn-outline" onclick="this.closest('.dialog-overlay').remove()">Annuller</button></div></div>`;
    overlay.innerHTML = html;
  }
  window._eftAddBoede = function() {
    const keys = [...new Set(standardBoeder.map(b=>b.kategori))];
    const fo = el("div",{className:"dialog-overlay",style:{zIndex:100},onclick:e=>{if(e.target===fo)fo.remove();}});
    let html = `<div class="dialog" style="max-width:500px;max-height:80vh;overflow-y:auto"><div class="dialog-title">Vælg overtrædelse</div>`;
    keys.forEach(kat => {
      html += `<div style="margin-bottom:8px"><div style="padding:6px 8px;background:rgba(37,42,53,.8);font-size:11px;font-weight:600;border-radius:4px">${kat}</div>`;
      standardBoeder.filter(b=>b.kategori===kat).forEach(b => {
        html += `<div style="padding:4px 12px;border-top:1px solid rgba(42,47,58,.3);display:flex;align-items:center;justify-content:space-between;font-size:11px;cursor:pointer" onclick="window._eftPickBoede('${b.id}');this.closest('.dialog-overlay').remove()"><span>${b.paragraf?b.paragraf+' — ':''}${b.beskrivelse}</span><span class="mono" style="color:var(--warning)">${formatDaDK(b.beloeb)} kr</span></div>`;
      });
      html += '</div>';
    });
    html += `<button class="btn btn-outline mt-2" onclick="this.closest('.dialog-overlay').remove()">Luk</button></div>`;
    fo.innerHTML = html;
    document.body.appendChild(fo);
  };
  window._eftPickBoede = async function(id) { const b=standardBoeder.find(x=>x.id===id); if(b)valgteBoeder.push({boedeId:b.id,paragraf:b.paragraf,beskrivelse:b.beskrivelse,beloeb:b.beloeb,faengselMaaneder:b.faengselMaaneder||0}); renderEftDialog(); };
  window._eftRemoveBoede = async function(i) { valgteBoeder.splice(i,1); renderEftDialog(); };
  window._eftSubmit = async function() {
    const besk = document.getElementById("eft-besk")?.value || "";
    const eft = { id: Date.now().toString(), personId:p.id, personNavn:`${p.fornavn} ${p.efternavn}`, personCpr:p.cpr, begrundelse:besk, boeder:JSON.stringify(valgteBoeder), oprettetAf:`${currentUser.fornavn} ${currentUser.efternavn}`, oprettetDato:new Date().toISOString().split("T")[0], status:"aktiv" };
    try { await efterlysningerApi.create(eft); await personerApi.update(p.id,{status:"eftersøgt"}); showToast("Efterlysning oprettet"); overlay.remove(); renderPage(activeTabId); } catch(e) { showToast("Fejl: "+e.message); }
  };
  document.body.appendChild(overlay);
  renderEftDialog();
};

// ═══ KØRETØJSREGISTER ═══
async function renderKoeretoejsregister(container) {
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div><span>Indlæser køretøjer...</span></div>';
  try {
    const koeretoejer = await koeretoejerApi.getAll();
    let html = `<div class="flex items-center justify-between mb-3"><div class="flex items-center gap-3">${icons.car}<h1 style="font-size:18px;font-weight:700">Køretøjsregister</h1><span style="font-size:12px;color:var(--muted-fg)">${koeretoejer.length} køretøjer</span></div><button class="btn btn-primary btn-sm" onclick="showKoeretoejForm()">${icons.plus} Registrer</button></div>`;
    html += `<div style="margin-bottom:12px"><input class="input" id="kt-search" placeholder="Søg nummerplade, mærke, ejer..."></div>`;
    html += '<div id="kt-list">';
    koeretoejer.forEach(k => {
      html += `<div class="card card-sm mb-2 kt-item" style="cursor:pointer" onclick="showToast('Køretøj: ${(k.nummerplade||"—").replace(/'/g,"&#39;")} — ${(k.maerke||"").replace(/'/g,"&#39;")} ${(k.model||"").replace(/'/g,"&#39;")}')"><div class="flex items-center justify-between"><div class="flex items-center gap-3"><div style="width:36px;height:36px;border-radius:8px;background:rgba(59,130,246,.1);display:flex;align-items:center;justify-content:center">${icons.car}</div><div><div style="font-size:13px;font-weight:600">${k.nummerplade||"—"}</div><div style="font-size:11px;color:var(--muted-fg)">${k.maerke||""} ${k.model||""} ${k.aargang||""}</div></div></div><div class="flex items-center gap-2"><span class="badge badge-muted">${k.farve||"—"}</span><span style="font-size:11px;color:var(--muted-fg)">${k.ejer||"Ingen ejer"}</span></div></div></div>`;
    });
    if (koeretoejer.length === 0) html += '<div class="loading-center" style="min-height:200px"><p>Ingen køretøjer</p></div>';
    html += '</div>';
    container.innerHTML = html;
    document.getElementById("kt-search").addEventListener("input", e => {
      const q = e.target.value.toLowerCase();
      document.querySelectorAll(".kt-item").forEach((item, i) => { const k = koeretoejer[i]; item.style.display = `${k.nummerplade||""} ${k.maerke||""} ${k.model||""} ${k.ejer||""}`.toLowerCase().includes(q) ? "" : "none"; });
    });
  } catch (err) { container.innerHTML = `<p style="color:var(--destructive)">Fejl: ${err.message}</p>`; }
}

window.showKoeretoejForm = function() {
  const overlay = el("div",{className:"dialog-overlay",onclick:e=>{if(e.target===overlay)overlay.remove();}});
  overlay.innerHTML = `<div class="dialog"><div class="dialog-title">Registrer køretøj</div><div class="grid grid-2 gap-2 mb-2"><div><div class="label">Nummerplade</div><input class="input" id="nk-plade"></div><div><div class="label">Mærke</div><input class="input" id="nk-maerke"></div></div><div class="grid grid-2 gap-2 mb-2"><div><div class="label">Model</div><input class="input" id="nk-model"></div><div><div class="label">Årgang</div><input class="input" id="nk-aargang"></div></div><div class="grid grid-2 gap-2 mb-2"><div><div class="label">Farve</div><input class="input" id="nk-farve"></div><div><div class="label">Ejer</div><input class="input" id="nk-ejer"></div></div><div class="flex gap-2"><button class="btn btn-primary" id="nk-submit">Registrer</button><button class="btn btn-outline" onclick="this.closest('.dialog-overlay').remove()">Annuller</button></div></div>`;
  document.body.appendChild(overlay);
  document.getElementById("nk-submit").addEventListener("click", async ()=>{
    const k = {id:Date.now().toString(), nummerplade:document.getElementById("nk-plade").value, maerke:document.getElementById("nk-maerke").value, model:document.getElementById("nk-model").value, aargang:document.getElementById("nk-aargang").value, farve:document.getElementById("nk-farve").value, ejer:document.getElementById("nk-ejer").value};

};

// ═══ EFTERLYSNINGER ═══
async function renderEfterlysninger(container) {
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div><span>Indlæser...</span></div>';
  try {
    const [personer, efterlysninger] = await Promise.all([personerApi.getAll(), efterlysningerApi.getAll()]);
    const efterlyste = personer.filter(p=>p.status==="eftersøgt");
    let html = `<div class="flex items-center justify-between mb-3"><h1 style="font-size:18px;font-weight:700">Efterlysninger</h1><span class="badge badge-warning">${efterlyste.length} aktive</span></div>`;
    efterlyste.forEach(p => {
      const eft = efterlysninger.find(e=>e.personId===p.id);
      html += `<div class="card card-sm mb-2" style="border-left:3px solid var(--warning)"><div class="flex items-center justify-between"><div><span style="font-size:13px;font-weight:600">${p.fornavn} ${p.efternavn}</span> <span class="mono" style="font-size:10px;color:var(--muted-fg)">${p.cpr}</span>${eft?`<div style="font-size:11px;color:var(--muted-fg);margin-top:4px">${eft.oprettetAf||""} — ${eft.oprettetDato||""}</div>`:''}</div><div class="flex items-center gap-2"><span class="badge badge-warning">Eftersøgt</span><button class="btn btn-outline btn-sm" onclick="void openTab('kr');setTimeout(()=>selectPerson('${p.id}'),500)">Gå til person</button></div></div></div>`;
    });
    if (efterlyste.length===0) html+='<div class="loading-center" style="min-height:200px"><p>Ingen efterlyste personer</p></div>';
    container.innerHTML = html;
  } catch (err) { container.innerHTML = `<p style="color:var(--destructive)">Fejl: ${err.message}</p>`; }
}

// ═══ BØDETAKSTER ═══
function renderBodetakster(container) {
  const kategorier = [...new Set(standardBoeder.map(b=>b.kategori))];
  let html = `<div class="flex items-center gap-3 mb-3">${icons.folder}<h1 style="font-size:18px;font-weight:700">Bødetakster</h1></div>`;
  kategorier.forEach(kat => {
    const boeder = standardBoeder.filter(b=>b.kategori===kat);
    html += `<div class="card mb-2" style="padding:0;overflow:hidden"><div class="accordion-header" onclick="this.nextElementSibling.classList.toggle('open')"><span style="font-size:14px;font-weight:600">${kat}</span><span style="font-size:11px;color:var(--muted-fg)">${boeder.length} bøder ▼</span></div><div class="accordion-body">`;
    boeder.forEach(b => {

// ═══ FARTBEREGNER ═══
function beregnFartboede(hastighed, graense, vejtype, vejarbejde) {
  const overskridelse = hastighed - graense;
  if (overskridelse <= 0) return null;
  let boede = 0, klip = 0, frakendelse = "", faengsel = 0;
  if (overskridelse <= 20) { boede = overskridelse <= 10 ? 1000 : 1500; }
  else if (overskridelse <= 30) { boede = 2000; klip = 1; }
  else if (overskridelse <= 40) { boede = 3000; klip = 1; }
  else if (overskridelse <= 50) { boede = 4000; klip = 2; frakendelse = "Betinget"; }
  else if (overskridelse <= 60) { boede = 5000; klip = 3; frakendelse = "Betinget"; }
  else { boede = 6000 + (overskridelse - 60) * 100; klip = 3; frakendelse = "Ubetinget"; faengsel = Math.max(0, Math.floor((overskridelse - 100) / 10)); }
  if (vejarbejde) boede = Math.round(boede * 1.5);
  return { overskridelse, boede, klip, frakendelse, faengsel };
}

window.showOpretSigtelseDialog = function(personId) {
  const p = window._krPersoner.find(pp => pp.id === personId);
  if (!p) return;
  let valgteBoeder = [], erkender = null, fratagKoerekort = false, openKat = null, haendelse = "";
  const overlay = el("div", { className: "dialog-overlay", onclick: (e) => { if (e.target === overlay) overlay.remove(); } });

  function renderDialog() {
    const totalBoede = valgteBoeder.reduce((s, b) => s + b.beloeb, 0);
    const totalFaengsel = valgteBoeder.reduce((s, b) => s + b.faengselMaaneder, 0);
    const totalKlip = valgteBoeder.reduce((s, b) => s + (b.klip || 0), 0);
    let html = `<div class="dialog" style="max-width:560px;max-height:90vh;overflow-y:auto" onclick="event.stopPropagation()">`;

    html += `<div class="label">Erkender personen?</div><div class="flex gap-2 mb-3"><button class="btn btn-sm ${erkender===true?'btn-primary':'btn-outline'}" onclick="window._sigErkender(true)">Ja</button><button class="btn btn-sm ${erkender===false?'btn-primary':'btn-outline'}" onclick="window._sigErkender(false)">Nej</button></div>`;
    html += `<div class="flex items-center gap-2 mb-3"><input type="checkbox" id="sig-fratag" ${fratagKoerekort?'checked':''} onchange="window._sigFratag(this.checked)"><label for="sig-fratag" style="font-size:12px;color:var(--fg)">Fratag kørekort</label></div>`;
    html += `<div class="label">Sigtelser</div><button class="btn btn-outline btn-sm mb-2" onclick="window._sigTogglePanel()">${icons.plus} Tilføj sigtelse</button>`;

    if (openKat !== null) {
      const keys = [...new Set(standardBoeder.map(b => b.kategori))];
      html += `<div class="card card-sm mb-3" style="max-height:300px;overflow-y:auto"><input class="input mb-2" placeholder="Søg..." oninput="window._sigFilter(this.value)">`;
      keys.forEach(kat => {
        const boeder = standardBoeder.filter(b => b.kategori === kat);
        html += `<div class="sig-kat-group"><div style="padding:6px 8px;background:rgba(37,42,53,.8);font-size:11px;font-weight:600;cursor:pointer;border-radius:4px;margin-bottom:2px" onclick="window._sigKat('${kat}')">${kat} (${boeder.length}) ${openKat===kat?'▼':'▸'}</div>`;
        if (openKat === kat) {
          boeder.forEach(b => {
            html += `<div style="padding:4px 8px;border-top:1px solid rgba(42,47,58,.3);display:flex;align-items:center;justify-content:space-between;font-size:10px"><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.paragraf?b.paragraf+' — ':''}${b.beskrivelse}</span><div class="flex items-center gap-2 shrink-0"><span class="mono" style="color:var(--warning)">${formatDaDK(b.beloeb)} kr</span><button class="btn btn-primary" style="padding:2px 6px;font-size:9px" onclick="window._sigAdd('${b.id}')">+</button></div></div>`;
          });
        }
        html += '</div>';
      });
      html += '</div>';
    }

    html += `<button class="btn btn-outline btn-sm mt-2 mb-3" onclick="window._sigFart()">${icons.gauge} Fartbøde-beregner</button>`;
    if (valgteBoeder.length > 0) {
      html += `<div class="card mb-3" style="padding:0;overflow:hidden">`;
      const grouped = {};
      valgteBoeder.forEach(v => { if (!grouped[v.boedeId]) grouped[v.boedeId] = []; grouped[v.boedeId].push(v); });
      for (const [boedeId, items] of Object.entries(grouped)) {
        const b = items[0], count = items.length;
        html += `<div class="flex items-center justify-between" style="padding:6px 12px;border-top:1px solid rgba(42,47,58,.3);font-size:10px"><span style="flex:1">${count>1?`<span style="color:var(--primary);font-weight:600;margin-right:4px">${count}×</span>`:''}${b.paragraf?b.paragraf+' — ':''}${b.beskrivelse}</span><div class="flex items-center gap-2 shrink-0">${b.faengselMaaneder>0?`<span style="color:var(--destructive)">${b.faengselMaaneder*count}md</span>`:''}<span class="mono" style="color:var(--warning)">${formatDaDK(b.beloeb*count)} kr</span><button style="border:none;background:transparent;cursor:pointer;color:var(--muted-fg);font-size:10px" onclick="window._sigRemoveAll('${boedeId}')">✕</button></div></div>`;
      }
      html += `<div class="flex items-center justify-between" style="padding:8px 12px;background:rgba(59,130,246,.05);border-top:1px solid rgba(59,130,246,.15);font-size:10px"><span style="font-weight:600">Total</span><div class="flex items-center gap-3"><span class="mono" style="font-weight:700;color:var(--warning)">${formatDaDK(totalBoede)} kr</span>${totalFaengsel>0?`<span style="font-weight:700;color:var(--destructive)">${totalFaengsel} md.</span>`:''}${totalKlip>0?`<span class="badge badge-primary">${totalKlip} klip</span>`:''}</div></div></div>`;
    }
    html += `<div class="label">Hændelsesforløb</div><textarea class="textarea mb-3" id="sig-haendelse" rows="3" placeholder="Beskriv hændelsesforløbet...">${haendelse}</textarea>`;
    html += `<div class="flex gap-2"><button class="btn btn-primary flex-1" onclick="window._sigSubmit()">Opret sigtelse</button><button class="btn btn-outline" onclick="this.closest('.dialog-overlay').remove()">Annuller</button></div></div>`;
    overlay.innerHTML = html;
  }

  window._sigErkender = function(v) { erkender = v; renderDialog(); };
  window._sigFratag = function(v) { fratagKoerekort = v; };
  window._sigTogglePanel = function() { const keys = [...new Set(standardBoeder.map(b=>b.kategori))]; openKat = openKat ? null : keys[0]; renderDialog(); };
  window._sigKat = function(kat) { openKat = openKat===kat ? null : kat; renderDialog(); };
  window._sigAdd = function(boedeId) { const b = standardBoeder.find(x=>x.id===boedeId); if(b) valgteBoeder.push({boedeId:b.id,paragraf:b.paragraf,beskrivelse:b.beskrivelse,beloeb:b.beloeb,faengselMaaneder:b.faengselMaaneder||0,klip:b.klip||0}); renderDialog(); };
  window._sigRemoveAll = function(boedeId) { valgteBoeder = valgteBoeder.filter(v=>v.boedeId!==boedeId); renderDialog(); };
  window._sigFilter = function(q) { document.querySelectorAll(".sig-kat-group").forEach(g => { let vis=0; g.querySelectorAll("div[style*='border-top']").forEach(r => { const m=r.textContent.toLowerCase().includes(q.toLowerCase()); r.style.display=m?"":"none"; if(m)vis++; }); g.style.display=(q&&vis===0)?"none":""; }); };

  window._sigFart = function() {
    const fo = el("div",{className:"dialog-overlay",style:{zIndex:100},onclick:e=>{if(e.target===fo)fo.remove();}});
    const vtc = {by:{label:"Byzone",graenser:[30,40,50,60,70]},landevej:{label:"Landevej",graenser:[60,70,80,90]},motorvej:{label:"Motorvej",graenser:[80,90,100,110,120,130]}};
    let vt2="by",gr2=50;
    function rf(){
      let h=`<div class="dialog" style="max-width:420px"><div class="dialog-title">${icons.gauge} Fartbøde-beregner</div><div class="label">Vejtype</div><div class="grid grid-3 gap-2 mb-2">`;
      ["by","landevej","motorvej"].forEach(v=>{h+=`<button class="btn btn-sm ${vt2===v?'btn-primary':'btn-outline'}" id="fv-${v}">${vtc[v].label}</button>`;});
      h+=`</div><div class="label">Grænse</div><div class="flex gap-2 mb-2" style="flex-wrap:wrap">`;
      vtc[vt2].graenser.forEach(g=>{h+=`<button style="width:36px;height:36px;border-radius:50%;border:2px solid ${gr2===g?'var(--destructive)':'var(--border)'};background:${gr2===g?'rgba(214,54,75,.1)':'transparent'};color:${gr2===g?'var(--destructive)':'var(--muted-fg)'};font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center" id="fg-${g}">${g}</button>`;});
      h+=`</div><div class="label">Hastighed</div><div class="flex gap-2 mb-2"><input class="input flex-1" type="number" id="fv-inp"><button class="btn btn-primary btn-sm" id="fv-calc">Beregn</button></div><div id="fv-res"></div><button class="btn btn-outline mt-3" id="fv-close">Luk</button></div>`;
      fo.innerHTML=h;
      ["by","landevej","motorvej"].forEach(v=>document.getElementById("fv-"+v)?.addEventListener("click",()=>{vt2=v;gr2=vtc[v].graenser[Math.floor(vtc[v].graenser.length/2)];rf();}));
      vtc[vt2].graenser.forEach(g=>document.getElementById("fg-"+g)?.addEventListener("click",()=>{gr2=g;rf();}));
      document.getElementById("fv-close")?.addEventListener("click",()=>fo.remove());
      document.getElementById("fv-calc")?.addEventListener("click",()=>{
        const val=parseInt(document.getElementById("fv-inp")?.value);if(isNaN(val))return;
        const res=beregnFartboede(val,gr2,vt2,false);const rd=document.getElementById("fv-res");
        if(!res){rd.innerHTML=`<p style="text-align:center;color:var(--success);font-size:12px">Ingen overskridelse</p>`;return;}
        rd.innerHTML=`<div class="card card-sm"><div class="grid grid-2 gap-2" style="text-align:center"><div><p style="font-size:9px;color:var(--muted-fg)">Overskridelse</p><p style="font-size:16px;font-weight:700;color:var(--destructive)">+${res.overskridelse} km/t</p></div><div><p style="font-size:9px;color:var(--muted-fg)">Bøde</p><p style="font-size:16px;font-weight:700;color:var(--warning)" class="mono">${formatDaDK(res.boede)} kr</p></div></div><button class="btn btn-primary btn-sm w-full mt-2" id="fv-add">Tilføj til sigtelse</button></div>`;
        document.getElementById("fv-add")?.addEventListener("click",()=>{valgteBoeder.push({boedeId:`fart-${Date.now()}`,paragraf:"Fartoverskridelse",beskrivelse:`${val} km/t i ${gr2}-zone (${vtc[vt2].label})`,beloeb:res.boede,faengselMaaneder:0,klip:res.klip||0});fo.remove();renderDialog();});
      });
    }
    document.body.appendChild(fo);rf();
  };

  window._sigSubmit = async function() {
    haendelse = document.getElementById("sig-haendelse")?.value || "";
    if (erkender === null) { showToast("Angiv om personen erkender"); return; }
    if (valgteBoeder.length === 0) { showToast("Tilføj mindst én sigtelse"); return; }
    const totalBoede = valgteBoeder.reduce((s,b)=>s+b.beloeb,0);
    const totalFaengsel = valgteBoeder.reduce((s,b)=>s+b.faengselMaaneder,0);
    const sigtelse = { id:Date.now().toString(), personId:p.id, personNavn:`${p.fornavn} ${p.efternavn}`, personCpr:p.cpr, dato:new Date().toISOString().split("T")[0], sigtelseBoeder:valgteBoeder, totalBoede, faengselMaaneder:totalFaengsel, fratagKoerekort, erkender, involveretBetjente:[currentUser.id], rapport:{haendelsesforloeb:haendelse,konfiskeredeGenstande:"",magtanvendelse:""}, skabelonType:"", sagsStatus:"aaben" };
    try { await sigtelserApi.create(sigtelse); showToast("Sigtelse oprettet"); overlay.remove(); renderPage(activeTabId); } catch(e) { showToast("Fejl: "+e.message); }
  };

  document.body.appendChild(overlay);
  renderDialog();
};
