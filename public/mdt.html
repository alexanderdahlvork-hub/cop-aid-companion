function setupSagSearch(inputId, resultsId, items, nameGetter, subGetter, addFn) {
  const input = document.getElementById(inputId);
  if (!input) return;
  input.addEventListener("input", () => {
    const q = input.value.toLowerCase();
    const results = document.getElementById(resultsId);
    if (q.length < 2) { results.innerHTML = ""; return; }
    const matches = items.filter(i => `${nameGetter(i)} ${subGetter(i)}`.toLowerCase().includes(q)).slice(0, 8);
    results.innerHTML = matches.map(i => `<div class="list-item" style="padding:6px 8px;cursor:pointer" onclick="${addFn}('${i.id}')"><span style="font-size:12px">${nameGetter(i)}</span> <span class="mono" style="font-size:10px;color:var(--muted-fg)">${subGetter(i)}</span></div>`).join("");
  });
}

window.addMistaenkt = async function(personId) {
  const p = window._sagPersoner.find(pp => pp.id === personId);
  if (!p) return;
  const sag = window._currentSag;
  if (sag.mistaenkte.find(m => m.personId === personId)) { showToast("Allerede tilføjet"); return; }
  sag.mistaenkte.push({
    id: Date.now().toString(),
    personId: p.id,
    personNavn: `${p.fornavn} ${p.efternavn}`,
    personCpr: p.cpr,
    sigtelser: [],
    totalBoede: 0,
    totalFaengsel: 0,
    erkender: null,
    behandlet: false,
    tilkendegivelseAfgivet: false,
    fratagKoerekort: false
  });
  addAktivitetslog("Tilføjede mistænkt: " + p.fornavn + " " + p.efternavn);
  await renderPage(activeTabId);
};
window.removeMistaenkt = async function(i) { window._currentSag.mistaenkte.splice(i, 1); renderPage(activeTabId); };
window.setMistaenktField = async function(i, field, value) {
  const m = window._currentSag.mistaenkte[i];
  if (!m) return;
  if (value === "true") m[field] = true;
  else if (value === "false") m[field] = false;
  else m[field] = null;
};
window.setMistaenktNumber = async function(i, field, value) {
  const m = window._currentSag.mistaenkte[i];
  if (!m) return;
  m[field] = Number(value || 0);
};
window.addSigtelseToMistaenkt = async function(mistaenktIdx) {
  // Open penalty picker targeting specific suspect
  window._sigTargetMistaenkt = mistaenktIdx;
  if (typeof window.openPenaltyPickerForMistaenkt === "function") {
    window.openPenaltyPickerForMistaenkt(mistaenktIdx);
  } else if (typeof window.openPenaltyPicker === "function") {
    window.openPenaltyPicker();
  } else {
    showToast("Straffeliste ikke tilgængelig");
  }
};
window.removeSigtelseFromMistaenkt = async function(i, si) {
  const m = window._currentSag.mistaenkte[i];
  if (!m || !m.sigtelser?.[si]) return;
  const s = m.sigtelser[si];
  m.totalFaengsel = Math.max(0, Number(m.totalFaengsel || 0) - Number(s.faengsel || 0));
  m.totalBoede = Math.max(0, Number(m.totalBoede || 0) - Number(s.boede || 0));
  m.sigtelser.splice(si, 1);
  await renderPage(activeTabId);
};

window.addSagBetjent = async function(id) {
  const b = window._sagBetjente.find(bb => bb.id === id);
  if (!b || window._currentSag.involveretBetjente.find(x => x.id === id)) return;
  window._currentSag.involveretBetjente.push({ id: b.id, navn: `${b.fornavn} ${b.efternavn}`, badgeNr: b.badgeNr });
  addAktivitetslog("Tilføjede betjent: " + b.fornavn + " " + b.efternavn);
  await renderPage(activeTabId);
};

window.addSagBorger = async function(id) {

window._fleetCustomCats = window._fleetCustomCats || JSON.parse(localStorage.getItem("fleet_custom_cats") || "[]");
window._fleetShowCreate = window._fleetShowCreate || false;

function getAllFleetCategories() {
  return [...FLEET_CATEGORIES_DEFAULT, ...window._fleetCustomCats];
}

function getPatrolCategory(p) {
  const cats = getAllFleetCategories();
  const cat = cats.find(c =>
    p.kategori?.toLowerCase() === c.id ||
    p.kategori?.toLowerCase() === c.label.toLowerCase() ||
    p.navn?.startsWith(c.prefix)
  );
  return cat ? cat.id : "ukategoriseret";
}

// ---- Drag & Drop for fleet members ----
window._fleetDragData = null;

window._fleetDragStart = function(e, patrolId, badgeNr, navn) {
  window._fleetDragData = { fromPatrolId: patrolId, badgeNr, navn };
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', badgeNr);
  setTimeout(() => { if(e.target) e.target.style.opacity = '0.4'; }, 0);
  // Highlight all other patrol cards as drop targets
  document.querySelectorAll('.fleet-patrol-drop').forEach(z => {
    if (z.dataset.patrolId !== patrolId) {
      z.style.boxShadow = 'inset 0 0 0 2px var(--primary)';
      z.style.background = 'rgba(59,130,246,0.04)';
      z.style.borderRadius = '6px';
    }
  });
};

window._fleetDragOver = function(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const target = e.currentTarget;
  if (window._fleetDragData && target.dataset.patrolId !== window._fleetDragData.fromPatrolId) {
    target.style.background = 'rgba(59,130,246,0.12)';
    target.style.boxShadow = 'inset 0 0 0 2px var(--primary)';
  }
};

window._fleetDragLeave = function(e) {
  const target = e.currentTarget;
  if (window._fleetDragData && target.dataset.patrolId !== window._fleetDragData.fromPatrolId) {
    target.style.background = 'rgba(59,130,246,0.04)';
  } else {
    target.style.background = 'transparent';
    target.style.boxShadow = 'none';
  }
};

window._fleetDrop = async function(e, toPatrolId) {
  e.preventDefault();
  // Clean up all patrol card highlights
  document.querySelectorAll('.fleet-patrol-drop').forEach(z => {
    z.style.boxShadow = 'none';
    z.style.background = 'transparent';
  });
  const d = window._fleetDragData;
  if (!d || d.fromPatrolId === toPatrolId) { window._fleetDragData = null; return; }

  const patrols = window._fleetPatrols || [];
  const from = patrols.find(p => p.id === d.fromPatrolId);
  const to = patrols.find(p => p.id === toPatrolId);
  if (!from || !to) { window._fleetDragData = null; return; }
  if (to.medlemmer.length >= to.pladser) { showToast("Patruljen er fuld"); window._fleetDragData = null; return; }
  if (to.medlemmer.some(m => m.badgeNr === d.badgeNr)) { showToast("Allerede i patruljen"); window._fleetDragData = null; return; }

  // Move member
  const member = from.medlemmer.find(m => m.badgeNr === d.badgeNr);
  if (!member) { window._fleetDragData = null; return; }
  from.medlemmer = from.medlemmer.filter(m => m.badgeNr !== d.badgeNr);
  if (from.medlemmer.length === 0) from.status = "ledig";
  to.medlemmer.push(member);

  // Persist
  if (window._useRemoteFleet) {
    try {
      await fetch(window._fleetApiBase + '/' + from.id, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(patruljeToRow(from)) });
      await fetch(window._fleetApiBase + '/' + to.id, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(patruljeToRow(to)) });
    } catch(e) { console.error(e); }
  } else {
    localStorage.setItem("fleet_patruljer", JSON.stringify(patrols));
  }

  window._fleetDragData = null;
  showToast(`${member.navn} flyttet til ${to.navn}`);
  renderFlaade(document.getElementById("content-area"));
};

// Clean up drag highlights on dragend anywhere
document.addEventListener('dragend', () => {
  document.querySelectorAll('.fleet-drag-member').forEach(el => el.style.opacity = '1');

window._fleetSelectedMembers = window._fleetSelectedMembers || [];

async function setupFleetMemberPicker() {
  const catSelect = document.getElementById("fleet-create-cat");
  const picker = document.getElementById("fleet-member-picker");
  if (catSelect) {
    catSelect.addEventListener("change", () => {
      if (catSelect.value) {
        picker.style.display = "block";
      } else {
        picker.style.display = "none";
      }
    });
    if (catSelect.value) picker.style.display = "block";
  }

  try {
    window._fleetAllBetjente = await betjenteApi.getAll();
  } catch { window._fleetAllBetjente = []; }
  window._fleetSelectedMembers = [];
  renderFleetMemberDropdown();
}

function renderFleetMemberDropdown() {
  const dd = document.getElementById("fleet-member-dropdown");
  if (!dd) return;
  const betjente = window._fleetAllBetjente || [];
  const selected = window._fleetSelectedMembers || [];
  dd.innerHTML = betjente.map(b => {
    const isSelected = selected.some(s => s.badgeNr === b.badgeNr);
    return `<button onclick="toggleFleetMemberSelect('${b.badgeNr}','${b.fornavn} ${b.efternavn}')" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border:none;background:${isSelected ? 'rgba(59,130,246,0.1)' : 'none'};cursor:pointer;text-align:left;border-bottom:1px solid rgba(128,128,128,0.06)" onmouseover="this.style.background='rgba(128,128,128,0.08)'" onmouseout="this.style.background='${isSelected ? 'rgba(59,130,246,0.1)' : 'none'}'">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:24px;height:24px;border-radius:50%;background:rgba(59,130,246,0.12);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--primary)">${(b.fornavn||'')[0]}${(b.efternavn||'')[0]}</div>
        <span style="font-size:12px;color:var(--fg)">${b.fornavn} ${b.efternavn}</span>
      </div>
      <span style="font-size:10px;color:var(--primary);opacity:${isSelected?1:0.3}">${isSelected ? '✓' : '+'}</span>
    </button>`;
  }).join('');

  // Update label
  const label = document.getElementById("fleet-member-label");
  if (label) label.textContent = selected.length > 0 ? `${selected.length} betjent${selected.length>1?'e':''} valgt` : 'Vælg betjente';

  // Update chips
  const chips = document.getElementById("fleet-selected-members");
  if (chips) {
    chips.innerHTML = selected.map(s => `
      <span style="display:inline-flex;align-items:center;gap:4px;background:rgba(59,130,246,0.1);color:var(--primary);padding:3px 8px;border-radius:12px;font-size:10px;font-weight:600">
        ${s.navn} <button onclick="toggleFleetMemberSelect('${s.badgeNr}','${s.navn}')" style="background:none;border:none;cursor:pointer;color:var(--primary);font-size:10px;padding:0">✕</button>
      </span>
    `).join('');
  }
}

window.toggleFleetMemberDropdown = function() {
  const dd = document.getElementById("fleet-member-dropdown");
  if (dd) dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
};

window.toggleFleetMemberSelect = function(badgeNr, navn) {
  const idx = window._fleetSelectedMembers.findIndex(s => s.badgeNr === badgeNr);
  if (idx >= 0) window._fleetSelectedMembers.splice(idx, 1);
  else window._fleetSelectedMembers.push({ badgeNr, navn });
  renderFleetMemberDropdown();
};

window.createFleetFromForm = async function() {
  const catId = document.getElementById("fleet-create-cat")?.value;
  if (!catId) { showToast("Vælg en kategori"); return; }
  const cats = getAllFleetCategories();
  const cat = cats.find(c => c.id === catId);
  if (!cat) return;

  const vehicleId = document.getElementById("fleet-create-vehicle")?.value || '';
  const callsign = document.getElementById("fleet-create-callsign")?.value || '';
  const members = window._fleetSelectedMembers || [];

  const existing = (window._fleetPatrols || []).filter(p => getPatrolCategory(p) === catId);
  const num = existing.length + 1;
  const navn = callsign || `${cat.prefix} ${num}`;

  const p = {
    id: Date.now().toString(),
    navn,
    kategori: cat.id,
    pladser: cat.pladser,
    medlemmer: members,
    status: members.length > 0 ? "i_brug" : "ledig",
    koeretojsId: vehicleId,
    bemaerkning: ""
  };

  try {
    await patruljerApi.create(p);
    showToast(`${navn} oprettet`);
    window._fleetShowCreate = false;
    window._fleetSelectedMembers = [];
    renderFlaade(document.getElementById("content-area"));
  } catch (e) { showToast("Fejl: " + e.message); }
};

window.addFleetCategory = function() {
  const input = document.getElementById("fleet-new-cat");
  const name = input?.value?.trim();
  if (!name) { showToast("Skriv et kategorinavn"); return; }
  const id = name.toLowerCase().replace(/[^a-zæøå0-9]/g, '_');
  if (getAllFleetCategories().some(c => c.id === id)) { showToast("Kategori findes allerede"); return; }
  window._fleetCustomCats.push({ id, label: name, prefix: name, icon: "📁", pladser: 4 });
  localStorage.setItem("fleet_custom_cats", JSON.stringify(window._fleetCustomCats));
  showToast(`Kategori "${name}" tilføjet`);
  renderFlaade(document.getElementById("content-area"));
};

window.removeFleetCategory = function(catId) {
  window._fleetCustomCats = window._fleetCustomCats.filter(c => c.id !== catId);
  localStorage.setItem("fleet_custom_cats", JSON.stringify(window._fleetCustomCats));
  showToast("Kategori fjernet");
  renderFlaade(document.getElementById("content-area"));
};

window.showFleetPatrolMenu = function(patrolId, btn) {
  // Simple context menu for patrol actions
  const existing = document.getElementById("fleet-ctx-menu");
  if (existing) existing.remove();

  const p = (window._fleetPatrols || []).find(pp => pp.id === patrolId);
  const isMyPatrol = p?.medlemmer.some(m => m.badgeNr === currentUser?.badgeNr);

  const menu = document.createElement("div");
  menu.id = "fleet-ctx-menu";
  menu.style.cssText = "position:fixed;z-index:9999;background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.3);min-width:160px;padding:4px;overflow:hidden";

  const rect = btn.getBoundingClientRect();
  menu.style.top = (rect.bottom + 4) + "px";
  menu.style.right = (window.innerWidth - rect.right) + "px";

  let items = '';
  if (!isMyPatrol && p && p.medlemmer.length < p.pladser) {
    items += `<button onclick="joinFleet('${patrolId}');document.getElementById('fleet-ctx-menu')?.remove()" style="width:100%;padding:8px 12px;border:none;background:none;cursor:pointer;text-align:left;font-size:12px;color:var(--fg);border-radius:4px;display:flex;align-items:center;gap:8px" onmouseover="this.style.background='rgba(128,128,128,0.08)'" onmouseout="this.style.background='none'">👤 Tilmeld mig</button>`;
  }
  if (isMyPatrol) {
    items += `<button onclick="leaveFleet('${patrolId}');document.getElementById('fleet-ctx-menu')?.remove()" style="width:100%;padding:8px 12px;border:none;background:none;cursor:pointer;text-align:left;font-size:12px;color:var(--destructive);border-radius:4px;display:flex;align-items:center;gap:8px" onmouseover="this.style.background='rgba(128,128,128,0.08)'" onmouseout="this.style.background='none'">🚪 Forlad</button>`;
  }
  items += `<button onclick="showFleetAddMember('${patrolId}');document.getElementById('fleet-ctx-menu')?.remove()" style="width:100%;padding:8px 12px;border:none;background:none;cursor:pointer;text-align:left;font-size:12px;color:var(--fg);border-radius:4px;display:flex;align-items:center;gap:8px" onmouseover="this.style.background='rgba(128,128,128,0.08)'" onmouseout="this.style.background='none'">➕ Tilføj betjent</button>`;
  items += `<button onclick="openFleetNote('${patrolId}');document.getElementById('fleet-ctx-menu')?.remove()" style="width:100%;padding:8px 12px;border:none;background:none;cursor:pointer;text-align:left;font-size:12px;color:var(--fg);border-radius:4px;display:flex;align-items:center;gap:8px" onmouseover="this.style.background='rgba(128,128,128,0.08)'" onmouseout="this.style.background='none'">📝 Note</button>`;
  items += `<div style="height:1px;background:var(--border);margin:2px 0"></div>`;
  items += `<button onclick="deleteFleetPatrol('${patrolId}');document.getElementById('fleet-ctx-menu')?.remove()" style="width:100%;padding:8px 12px;border:none;background:none;cursor:pointer;text-align:left;font-size:12px;color:var(--destructive);border-radius:4px;display:flex;align-items:center;gap:8px" onmouseover="this.style.background='rgba(128,128,128,0.08)'" onmouseout="this.style.background='none'">🗑️ Slet patrulje</button>`;

  menu.innerHTML = items;
  document.body.appendChild(menu);
  setTimeout(() => document.addEventListener("click", function handler() { menu.remove(); document.removeEventListener("click", handler); }), 50);
};

window.showFleetAddMember = async function(patrolId) {
  const overlay = el("div", { className: "dialog-overlay", onclick: e => { if (e.target === overlay) overlay.remove(); } });
  const patrol = (window._fleetPatrols || []).find(p => p.id === patrolId);
  let betjente = [];
  try { betjente = await betjenteApi.getAll(); } catch {}
  betjente = betjente.filter(b => !patrol?.medlemmer.some(m => m.badgeNr === b.badgeNr));

  overlay.innerHTML = `<div class="dialog" style="max-width:380px">
    <div class="dialog-title">Tilføj til ${patrol?.navn || 'patrulje'}</div>
    <input class="input mb-2" id="fleet-member-search" placeholder="Søg betjent...">
    <div id="fleet-member-list" style="max-height:260px;overflow-y:auto"></div>
    <button class="btn btn-outline w-full" style="margin-top:8px" onclick="this.closest('.dialog-overlay').remove()">Luk</button>
  </div>`;
  document.body.appendChild(overlay);

  function renderList(q) {
    const f = betjente.filter(b => !q || `${b.badgeNr} ${b.fornavn} ${b.efternavn} ${b.rang}`.toLowerCase().includes(q.toLowerCase()));
    const listEl = document.getElementById("fleet-member-list");
    if (!listEl) return;
    listEl.innerHTML = f.length === 0 ? '<p style="font-size:12px;color:var(--muted-fg);text-align:center;padding:20px">Ingen fundet</p>' :
      f.map(b => `<button onclick="addFleetMember('${patrolId}','${b.badgeNr}','${b.fornavn} ${b.efternavn}')" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:8px;border:none;background:none;cursor:pointer;text-align:left" onmouseover="this.style.background='rgba(128,128,128,0.08)'" onmouseout="this.style.background='none'">
        <div style="display:flex;align-items:center;gap:8px"><div style="width:28px;height:28px;border-radius:50%;background:rgba(59,130,246,0.12);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--primary)">${(b.fornavn||'')[0]}${(b.efternavn||'')[0]}</div><div><div style="font-size:12px;font-weight:600">${b.fornavn} ${b.efternavn}</div><div style="font-size:10px;color:var(--muted-fg)">#${b.badgeNr} · ${b.rang}</div></div></div>
        <span style="font-size:14px;color:var(--primary)">+</span>
      </button>`).join('');
  }
  renderList("");
  document.getElementById("fleet-member-search")?.addEventListener("input", e => renderList(e.target.value));
};

window.addFleetMember = async function(patrolId, badgeNr, navn) {
  try {
    const patrols = await patruljerApi.getAll();
    const p = patrols.find(pp => pp.id === patrolId);
    if (!p) return;
    if (p.medlemmer.length >= p.pladser) { showToast("Patruljen er fuld"); return; }
    if (p.medlemmer.some(m => m.badgeNr === badgeNr)) { showToast("Allerede tilmeldt"); return; }
    p.medlemmer.push({ badgeNr, navn });
    p.status = "i_brug";
    await patruljerApi.update(patrolId, p);
    showToast(`${navn} tilmeldt`);
    document.querySelector(".dialog-overlay")?.remove();
    renderFlaade(document.getElementById("content-area"));
  } catch (e) { showToast("Fejl: " + e.message); }
};

window.removeFromFleet = async function(patrolId, badgeNr) {
  try {
    const patrols = await patruljerApi.getAll();
    const p = patrols.find(pp => pp.id === patrolId);
    if (!p) return;
    p.medlemmer = p.medlemmer.filter(m => m.badgeNr !== badgeNr);
    if (p.medlemmer.length === 0) p.status = "ledig";
    await patruljerApi.update(patrolId, p);
    showToast("Fjernet");
    renderFlaade(document.getElementById("content-area"));
  } catch (e) { showToast("Fejl: " + e.message); }
};

window.joinFleet = async function(id) {
  try {
    const patrols = await patruljerApi.getAll();
    const p = patrols.find(pp => pp.id === id);
    if (!p) return;
    if (p.medlemmer.find(m => m.badgeNr === currentUser.badgeNr)) { showToast("Allerede tilmeldt"); return; }
    if (p.medlemmer.length >= p.pladser) { showToast("Fuld"); return; }
    p.medlemmer.push({ badgeNr: currentUser.badgeNr, navn: `${currentUser.fornavn} ${currentUser.efternavn}` });
    p.status = "i_brug";
    await patruljerApi.update(id, p);
    showToast("Tilmeldt");
    renderFlaade(document.getElementById("content-area"));
  } catch (e) { showToast("Fejl: " + e.message); }
};

window.leaveFleet = async function(id) {
  try {
    const patrols = await patruljerApi.getAll();
    const p = patrols.find(pp => pp.id === id);
    if (!p) return;
    p.medlemmer = p.medlemmer.filter(m => m.badgeNr !== currentUser.badgeNr);
    if (p.medlemmer.length === 0) p.status = "ledig";
    await patruljerApi.update(id, p);
    showToast("Forladt");
    renderFlaade(document.getElementById("content-area"));
  } catch (e) { showToast("Fejl: " + e.message); }
};

window.updateFleetStatus = async function(id, status) {
  try {
    const patrols = await patruljerApi.getAll();
    const p = patrols.find(pp => pp.id === id);
    if (!p) return;
    p.status = status;
    await patruljerApi.update(id, p);
    showToast("Status opdateret");

window.setFleetStatus = async function(id, status) {
  const patrols = window._fleetPatrols || [];
  const p = patrols.find(x => x.id === id);
  if (!p) return;
  p.status = status;
  try { await patruljerApi.update(id, patruljeToRow({ status })); } catch(e) { console.error(e); }
  renderFlaade(document.getElementById("content-area"));
};

window.editFleetNote = function(id) {
  const patrols = window._fleetPatrols || [];
  const p = patrols.find(x => x.id === id);
  if (!p) return;
  const current = p.bemaerkning || p.bemærkning || '';
  showModal("Rediger note", `
    <textarea id="fleet-note-input" class="input" rows="3" style="width:100%;resize:vertical">${current.replace(/</g,'&lt;')}</textarea>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">
      <button class="btn btn-ghost" onclick="closeModal()">Annuller</button>
      <button class="btn btn-primary" onclick="window.saveFleetNote('${id}')">Gem</button>
    </div>
  `);
};

window.saveFleetNote = async function(id) {
  const note = document.getElementById('fleet-note-input')?.value || '';
  const patrols = window._fleetPatrols || [];
  const p = patrols.find(x => x.id === id);
  if (!p) return;
  p.bemaerkning = note;
  try { await patruljerApi.update(id, patruljeToRow({ bemaerkning: note })); } catch(e) { console.error(e); }
  closeModal();
  renderFlaade(document.getElementById("content-area"));
};

window.deleteFleetPatrol = async function(id) {
  try {
    await patruljerApi.remove(id);
    showToast("Patrulje slettet");
    renderFlaade(document.getElementById("content-area"));
  } catch (e) { showToast("Fejl: " + e.message); }
};

window.openFleetNote = function(patrolId) {
  const p = (window._fleetPatrols || []).find(pp => pp.id === patrolId);
  const overlay = el("div", { className: "dialog-overlay", onclick: e => { if (e.target === overlay) overlay.remove(); } });
  overlay.innerHTML = `<div class="dialog" style="max-width:380px">
    <div class="dialog-title">Note — ${p?.navn || ''}</div>
    <textarea class="textarea" id="fleet-note-input" rows="3" style="resize:none">${p?.bemærkning || p?.bemaerkning || ''}</textarea>
    <div class="flex gap-2" style="margin-top:8px"><button class="btn btn-primary" id="fleet-note-save">Gem</button><button class="btn btn-outline" onclick="this.closest('.dialog-overlay').remove()">Annuller</button></div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById("fleet-note-save")?.addEventListener("click", async () => {
    const note = document.getElementById("fleet-note-input")?.value || "";
    try {
      await patruljerApi.update(patrolId, { bemærkning: note, bemaerkning: note });
      showToast("Note gemt");
      overlay.remove();
      renderFlaade(document.getElementById("content-area"));
    } catch (e) { showToast("Fejl: " + e.message); }
  });
};

    const totalOfficers = memberPatrols.reduce((s, p) => s + p.medlemmer.length, 0);

    return `
    <div style="margin-bottom:10px;border:2px solid rgba(59,130,246,0.25);border-radius:12px;overflow:hidden;background:linear-gradient(180deg, rgba(59,130,246,0.06) 0%, transparent 100%)">

              <span style="font-size:10px;color:var(--muted-fg)">${g.patruljeIds.length} enheder · ${totalOfficers} betjente</span>
            </div>

window.createFleetGroup = function() {
  const navn = document.getElementById("grp-navn")?.value?.trim();
  const aktion = document.getElementById("grp-aktion")?.value;
  const radio = document.getElementById("grp-radio")?.value?.trim();
  const lederId = document.getElementById("grp-leder")?.value;
  const checkboxes = document.querySelectorAll(".grp-patrol-cb:checked");
  const patruljeIds = Array.from(checkboxes).map(cb => cb.value);

  if (!navn) { showToast("Angiv et gruppenavn"); return; }
  if (!aktion) { showToast("Vælg en aktion"); return; }
  if (!radio) { showToast("Angiv en radiokanal"); return; }

  const lederPatrol = (window._fleetPatrols || []).find(p => p.id === lederId);
  const group = {
    id: Date.now().toString(),
    navn,
    aktion,
    radioKanal: radio,
    lederId: lederId || '',
    lederNavn: lederPatrol ? lederPatrol.navn : '',
    patruljeIds: patruljeIds.length > 0 ? patruljeIds : (lederId ? [lederId] : [])
  };

  // Ensure leader is in patrol list
  if (lederId && !group.patruljeIds.includes(lederId)) {
    group.patruljeIds.unshift(lederId);
  }

  window._fleetGroups.push(group);
  saveFleetGroups();
  showToast(`Opgavegruppe "${navn}" oprettet`);
  document.querySelector(".dialog-overlay")?.remove();
  renderFlaade(document.getElementById("content-area"));
};

window.deleteFleetGroup = function(groupId) {
  window._fleetGroups = window._fleetGroups.filter(g => g.id !== groupId);
  saveFleetGroups();
  showToast("Gruppe slettet");
  renderFlaade(document.getElementById("content-area"));
};

window.showAddPatrolToGroup = function(groupId) {
  const group = window._fleetGroups.find(g => g.id === groupId);
  if (!group) return;
  const patrols = (window._fleetPatrols || []).filter(p => !group.patruljeIds.includes(p.id));

  const overlay = el("div", { className: "dialog-overlay", onclick: e => { if (e.target === overlay) overlay.remove(); } });
  overlay.innerHTML = `<div class="dialog" style="max-width:360px">
    <div class="dialog-title">Tilføj patrulje til ${group.navn}</div>
    <div style="max-height:300px;overflow-y:auto">
      ${patrols.length === 0 ? '<p style="font-size:12px;color:var(--muted-fg);text-align:center;padding:20px">Alle patruljer er allerede tilføjet</p>' : ''}
      ${patrols.map(p => `
        <button onclick="addPatrolToGroup('${p.id}','${groupId}')" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:none;background:none;cursor:pointer;text-align:left;border-bottom:1px solid rgba(128,128,128,0.06);border-radius:6px" onmouseover="this.style.background='rgba(128,128,128,0.06)'" onmouseout="this.style.background='none'">

          </div>

        </button>
      `).join('')}

    <button class="btn btn-outline w-full" style="margin-top:8px" onclick="this.closest('.dialog-overlay').remove()">Luk</button>
  </div>`;
  document.body.appendChild(overlay);

window.addPatrolToGroup = function(patrolId, groupId) {
  const group = window._fleetGroups.find(g => g.id === groupId);
  if (!group) return;
  if (!group.patruljeIds.includes(patrolId)) {
    group.patruljeIds.push(patrolId);
    saveFleetGroups();
    showToast("Patrulje tilføjet til gruppe");
    document.querySelector(".dialog-overlay")?.remove();
    renderFlaade(document.getElementById("content-area"));
  }
};

window.removePatrolFromGroup = function(patrolId, groupId) {
  const group = window._fleetGroups.find(g => g.id === groupId);
  if (!group) return;
  group.patruljeIds = group.patruljeIds.filter(id => id !== patrolId);
  if (group.lederId === patrolId) group.lederId = group.patruljeIds[0] || '';
  saveFleetGroups();
  showToast("Patrulje fjernet fra gruppe");
  renderFlaade(document.getElementById("content-area"));
};

window.movePatrolBetweenGroups = function(patrolId, fromGroupId) {
  const otherGroups = (window._fleetGroups || []).filter(g => g.id !== fromGroupId);
  if (otherGroups.length === 0) { showToast("Ingen andre grupper"); return; }

  if (otherGroups.length === 1) {
    // Auto-move to the only other group
    removePatrolFromGroup(patrolId, fromGroupId);
    addPatrolToGroup(patrolId, otherGroups[0].id);
    return;
  }

  const overlay = el("div", { className: "dialog-overlay", onclick: e => { if (e.target === overlay) overlay.remove(); } });
  overlay.innerHTML = `<div class="dialog" style="max-width:320px">
    <div class="dialog-title">Flyt til gruppe</div>
    ${otherGroups.map(g => `
      <button onclick="removePatrolFromGroup('${patrolId}','${fromGroupId}');addPatrolToGroup('${patrolId}','${g.id}');this.closest('.dialog-overlay')?.remove()" style="width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border:none;background:none;cursor:pointer;text-align:left;border-radius:8px;border-bottom:1px solid rgba(128,128,128,0.06)" onmouseover="this.style.background='rgba(128,128,128,0.06)'" onmouseout="this.style.background='none'">
        <span style="font-size:14px">👥</span>
        <div>
          <div style="font-size:12px;font-weight:600;color:var(--fg)">${g.navn}</div>
          <div style="font-size:10px;color:var(--muted-fg)">${g.aktion} · ${g.radioKanal}</div>
        </div>
      </button>
    `).join('')}
    <button class="btn btn-outline w-full" style="margin-top:8px" onclick="this.closest('.dialog-overlay').remove()">Annuller</button>
  </div>`;
  document.body.appendChild(overlay);
};

async function renderAnsatte(container) {
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div><span>Indlæser ansatte...</span></div>';
  try {
    const ansatte = await betjenteApi.getAll();
    const canCreate = isPoliceLeadership(currentUser);

    const q = String(window._staffSearch || "").toLowerCase();
    const rankFilter = window._staffRankFilter || "alle";

    const filtered = ansatte.filter(a => {
      const nameText = `${a.fornavn || ""} ${a.efternavn || ""} ${a.badgeNr || ""} ${a.rang || ""} ${a.afdeling || ""}`.toLowerCase();
      const matchQ = !q || nameText.includes(q);
      const matchRank = rankFilter === "alle" || String(a.rang || "") === rankFilter;
      const matchDept = deptFilter === "alle" || String(a.afdeling || "").split(",").map(s => s.trim()).includes(deptFilter);
      return matchQ && matchRank && matchDept;
    });

    const grouped = rangOrder.map(rang => ({
      rang,

          <div class="staff-admin-panel">
            <div class="staff-admin-title">Administrer ansatte</div>
            <div class="staff-admin-actions">
              <div class="staff-admin-action">
                <div class="staff-admin-icon blue">👤+</div>

                  <div style="font-size:13px;font-weight:700">Rediger ansvar</div>
                  <div class="staff-sub">Ændr afdelinger, adgang og ansvar</div>
                </div>
                <button class="btn btn-outline btn-sm" onclick="showToast('Vælg en medarbejder nedenfor')">Vælg</button>

            </div>
          </div>
        </div>

      <div class="staff-toolbar">
        <input class="input" style="max-width:260px" id="staff-search" placeholder="Søg navn, badge eller rang..." value="${window._staffSearch || ""}">
        <select class="select" style="max-width:220px" id="staff-rank-filter">

      html += `<div class="staff-card"><div class="staff-empty">Ingen ansatte matcher søgningen eller filtrene.</div></div>`;

      grouped.forEach((group, idx) => {
        const open = window._openStaffRanks?.includes(group.rang) || false;
        html += `
          <div class="staff-rank-group">
            <div class="staff-rank-head" onclick="toggleStaffRank('${group.rang.replace(/'/g, "\'")}')">

                        </td>

                </tbody>
              </table>
            </div>

        `;
      });
    }

    container.innerHTML = html;
    window._ansatte = ansatte;

    document.getElementById("staff-search")?.addEventListener("input", (e) => {
      window._staffSearch = e.target.value;
      renderAnsatte(document.getElementById("content-area"));
    });
    document.getElementById("staff-rank-filter")?.addEventListener("change", (e) => {
      window._staffRankFilter = e.target.value;
      renderAnsatte(document.getElementById("content-area"));
    });
    document.getElementById("staff-dept-filter")?.addEventListener("change", (e) => {
      window._staffDeptFilter = e.target.value;
      renderAnsatte(document.getElementById("content-area"));
    });
  } catch (err) {
    container.innerHTML = `<p style="color:var(--destructive)">Fejl: ${err.message}</p>`;
  }
}

// ═══ AFDELINGER (MED SUB-TABS) ═══
async function renderAfdeling(container, afdId) {
  const titler = {nsk:"NSK — Tilhørsforhold & Efterretning",lima:"Lima — Aktionsstyrken",faerdsel:"Færdsel — Færdselsafdelingen",efterforskning:"Efterforskning",sig:"SIG — Særlig Indsatsgruppe",remeo:"Remeo"};
  const isLeder = isAdmin || (currentUser.afdeling||"").toLowerCase().includes(afdId);
  
  // Load tabs from localStorage or use defaults
  const tabsKey = `afd_tabs_${afdId}`;
  let tabs = afdelingDefaultTabs[afdId] || [{id:"tavle",label:"Opslagstavle",removable:false}];
  const saved = localStorage.getItem(tabsKey);
  if (saved) {
    try {
      const savedTabs = JSON.parse(saved);
      const defaultIds = (afdelingDefaultTabs[afdId]||[]).map(t=>t.id);
      const customTabs = savedTabs.filter(t=>!defaultIds.includes(t.id));
      const mergedDefaults = (afdelingDefaultTabs[afdId]||[]).map(dt => { const s=savedTabs.find(st=>st.id===dt.id); return s?{...dt,label:s.label}:dt; });
      tabs = [...mergedDefaults, ...customTabs];
    } catch {}
  }
  
  if (!window._afdActiveTab) window._afdActiveTab = {};
  if (!window._afdActiveTab[afdId]) window._afdActiveTab[afdId] = tabs[0]?.id || "tavle";
  const activeSubTab = window._afdActiveTab[afdId];

  let html = `<div><div class="flex items-center justify-between mb-3"><div><h1 style="font-size:18px;font-weight:700">${titler[afdId]||afdId}</h1><p style="font-size:11px;color:var(--muted-fg)">Afdelingsleder: ${isLeder?"Ja":"Nej"}</p></div></div>`;
  
  // Sub-tab bar
  html += `<div class="flex items-center gap-1 mb-3" style="border-bottom:2px solid var(--border);padding-bottom:0">`;
  tabs.forEach(t => {
    html += `<button class="btn btn-sm" style="border-radius:8px 8px 0 0;border-bottom:2px solid ${activeSubTab===t.id?'var(--primary)':'transparent'};color:${activeSubTab===t.id?'var(--primary)':'var(--muted-fg)'};font-weight:${activeSubTab===t.id?'600':'400'};margin-bottom:-2px;position:relative" onclick="setAfdTab('${afdId}','${t.id}')">${t.label}${isLeder&&t.removable?`<span style="margin-left:6px;cursor:pointer;color:var(--destructive);font-size:9px" onclick="event.stopPropagation();removeAfdTab('${afdId}','${t.id}')">✕</span>`:''}</button>`;
  });
  if (isLeder) {
    html += `<button class="btn btn-ghost btn-sm" style="margin-bottom:-2px" onclick="addAfdTab('${afdId}')">${icons.plus}</button>`;
  }
  html += `</div>`;

  // NSK special tabs
  if (afdId === "nsk" && activeSubTab === "bander") {
    html += await renderNSKBander();
  } else if (afdId === "nsk" && activeSubTab === "tilhoersforhold") {
    html += await renderNSKContent();
  } else {
    // Generic tab content with CRUD
    html += `<div id="afd-tab-content"></div>`;
  }
  html += '</div>';
  container.innerHTML = html;

  // Load content for generic tabs
  if (!(afdId === "nsk" && (activeSubTab === "bander" || activeSubTab === "tilhoersforhold"))) {
    const contentId = `${afdId}_${activeSubTab}`;
    const contentDiv = document.getElementById("afd-tab-content");
    if (contentDiv) await renderAfdelingsIndhold(contentDiv, contentId, isLeder);
  }
}

            <span class="badge ${memberSigtelser.length > 0 ? 'badge-destructive' : 'badge-muted'}" style="font-size:9px">${memberSigtelser.length} sigtelser</span>
            <button style="background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:var(--primary);border-radius:6px;cursor:pointer;padding:3px 8px;font-size:10px;transition:all 0.15s" onmouseover="this.style.background='rgba(59,130,246,0.2)'" onmouseout="this.style.background='rgba(59,130,246,0.1)'" onclick="window._nskShowSigtelseDialog('${bande.id}',${i})">+ Sigtelse</button>

        html += `</div>`;
      }
      html += `</div>`;
    });
  }
  html += `</div>`;
  
  // Right: Stats panel
  html += `<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px">
    <span style="font-size:15px;font-weight:700;display:block;margin-bottom:16px;color:var(--fg)">Bande Statistik</span>
    <div style="font-size:13px;color:var(--fg);margin-bottom:16px"><strong>Samlet antal sigtelser:</strong> ${totalSigtelser}</div>
    <div style="font-size:13px;font-weight:700;margin-bottom:10px;color:var(--fg)">Seneste Sigtelser</div>
    <div style="background:var(--input);border:1px solid var(--border);border-radius:8px;padding:14px;min-height:80px;max-height:200px;overflow-y:auto">`;

        <span style="color:var(--fg);font-weight:500">${esc(s.beskrivelse)}</span>
        <div style="font-size:9px;color:var(--muted-fg)">${esc(s.medlemNavn)} — ${s.dato || '—'}</div>
      </div>`;

  } else {
    html += `<div style="font-size:12px;color:var(--muted-fg)">Ingen sigtelser registreret</div>`;
  }
  
  html += `</div>
    <div style="font-size:11px;color:var(--muted-fg);margin-top:14px">Oprettet: ${bande.oprettetDato || '—'}</div>

    <span style="font-size:15px;font-weight:700;display:block;margin-bottom:14px;color:var(--fg)">Beviser</span>

      <input class="input" id="nsk-bevis-desc" placeholder="Bevis beskrivelse..." style="flex:1;font-size:12px;background:var(--input);border-radius:8px">

    </div>`;
  
  if ((bande.beviser||[]).length === 0) {
    html += `<p style="font-size:12px;color:var(--muted-fg);text-align:center;padding:16px">Ingen beviser registreret</p>`;
  } else {
    (bande.beviser||[]).forEach((b2, i) => {
      html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid rgba(42,47,58,0.6);transition:background 0.15s" onmouseover="this.style.background='rgba(255,255,255,0.02)'" onmouseout="this.style.background=''">
        <div>
          <div style="font-size:12px;color:var(--fg)">${esc(b2.beskrivelse)}</div>
          <div style="font-size:9px;color:var(--muted-fg)">${b2.dato || '—'} — ${b2.forfatter || '—'}</div>
        </div>
        <button style="background:none;border:none;color:var(--destructive);cursor:pointer;padding:4px;font-size:12px;opacity:0.7;transition:opacity 0.15s" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'" onclick="window._nskRemoveBevis('${bande.id}',${i})">✕</button>
      </div>`;
    });
  }
  html += `</div>`;
  
  // Information section
  html += `<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px">
    <span style="font-size:15px;font-weight:700;display:block;margin-bottom:14px;color:var(--fg)">Information</span>
    <textarea class="textarea" id="nsk-bande-info" rows="4" style="font-size:12px;margin-bottom:12px;background:var(--input);border-radius:8px" placeholder="Generel information om banden...">${esc(bande.information || '')}</textarea>
    <button class="btn btn-primary btn-sm" style="border-radius:8px;font-weight:600" onclick="window._nskSaveInfo('${bande.id}')">Gem Information</button>
  </div>`;
  
  return html;
}

// ── NSK Bander event handlers ──
window._nskShowCreateBande = function() {
  const form = document.getElementById('nsk-create-bande-form');
  if (!form) return;
  if (form.style.display !== 'none') { form.style.display = 'none'; return; }
  form.style.display = 'block';
  form.innerHTML = `<div style="background:var(--card);border:1px solid rgba(59,130,246,0.2);border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 4px 16px rgba(0,0,0,0.2)">
    <span style="font-size:15px;font-weight:700;display:block;margin-bottom:14px;color:var(--fg)">Opret ny bande</span>
    <div style="display:flex;gap:12px;align-items:flex-end">
      <div style="flex:1"><div class="label">Bande Navn</div><input class="input" id="nsk-new-bande-navn" placeholder="Indtast bande navn..." style="border-radius:8px"></div>
      <div style="width:160px"><div class="label">Trusselsniveau</div><select class="select w-full" id="nsk-new-bande-trussel" style="border-radius:8px"><option value="Høj">Høj</option><option value="Middel" selected>Middel</option><option value="Lav">Lav</option></select></div>
      <button class="btn" style="background:var(--success);color:#fff;border-radius:8px;padding:8px 18px;font-weight:600" onclick="window._nskCreateBande()">Opret</button>
      <button class="btn btn-outline" style="border-radius:8px" onclick="document.getElementById('nsk-create-bande-form').style.display='none'">Annuller</button>
    </div>
  </div>`;
};

window._nskCreateBande = function() {
  const navn = document.getElementById('nsk-new-bande-navn')?.value?.trim();
  const trussel = document.getElementById('nsk-new-bande-trussel')?.value || 'Middel';
  if (!navn) { showToast('Indtast et bande navn'); return; }
  const bander = getNSKBander();
  bander.push({
    id: Date.now().toString() + Math.random().toString(36).substr(2,4),
    navn, trusselsniveau: trussel,
    medlemmer: [], beviser: [], information: '',
    oprettetAf: `${currentUser.fornavn} ${currentUser.efternavn}`,
    oprettetDato: new Date().toISOString().split('T')[0]
  });
  saveNSKBander(bander);
  showToast('Bande oprettet: ' + navn);
  renderPage(activeTabId);
};

window._nskDeleteBande = function(id) {
  if (!confirm('Er du sikker på du vil slette denne bande?')) return;
  const bander = getNSKBander().filter(b => b.id !== id);
  saveNSKBander(bander);
  showToast('Bande slettet');
  renderPage(activeTabId);
};

window._nskViewBandeDetaljer = function(id) {
  window._nskViewBande = id;
  renderPage(activeTabId);
};

window._nskBackToOversigt = function() {
  window._nskViewBande = null;
  renderPage(activeTabId);
};

window._nskChangeTrussel = function(id, value) {
  const bander = getNSKBander();
  const b = bander.find(x => x.id === id);
  if (b) { b.trusselsniveau = value; saveNSKBander(bander); showToast('Trusselsniveau ændret'); renderPage(activeTabId); }
};

window._nskRemoveMember = async function(bandeId, index) {
  if (!confirm('Fjern dette medlem?')) return;
  const bander = getNSKBander();
  const b = bander.find(x => x.id === bandeId);
  if (b && b.medlemmer) {
    const member = b.medlemmer[index];
    b.medlemmer.splice(index, 1);
    saveNSKBander(bander);
    // Sync: remove matching tilhørsforhold from person registry
    if (member) {
      try {
        const tilhId = 'bande_' + bandeId + '_' + member.id;
        await tilhoersforholdApi.remove(tilhId);
      } catch(e) { console.error('Tilhørsforhold remove sync fejl:', e); }
    }
    renderPage(activeTabId);
  }
};

window._nskAddBevis = function(bandeId) {
  const desc = document.getElementById('nsk-bevis-desc')?.value?.trim();
  if (!desc) { showToast('Indtast en bevis beskrivelse'); return; }
  const bander = getNSKBander();
  const b = bander.find(x => x.id === bandeId);
  if (b) {
    if (!b.beviser) b.beviser = [];
    b.beviser.push({ beskrivelse: desc, dato: new Date().toISOString().split('T')[0], forfatter: `${currentUser.fornavn} ${currentUser.efternavn}` });
    saveNSKBander(bander);
    showToast('Bevis tilføjet');
    renderPage(activeTabId);
  }
};

window._nskRemoveBevis = function(bandeId, index) {
  const bander = getNSKBander();
  const b = bander.find(x => x.id === bandeId);
  if (b && b.beviser) { b.beviser.splice(index, 1); saveNSKBander(bander); renderPage(activeTabId); }
};

window._nskSaveInfo = function(bandeId) {
  const info = document.getElementById('nsk-bande-info')?.value || '';
  const bander = getNSKBander();
  const b = bander.find(x => x.id === bandeId);
  if (b) { b.information = info; saveNSKBander(bander); showToast('Information gemt'); }
};

// Member search in detail view
document.addEventListener('input', e => {
  if (e.target.id !== 'nsk-add-member-search') return;
  const q = e.target.value.toLowerCase();
  const results = document.getElementById('nsk-member-search-results');
  if (!results) return;
  if (q.length < 2) { results.innerHTML = ''; return; }
  (async () => {
    try {
      let personer = window._nskPersoner;
      if (!personer || personer.length === 0) {
        personer = await personerApi.getAll();
        window._nskPersoner = personer;
      }
      const bandeId = window._nskViewBande;
      const bander = getNSKBander();
      const bande = bander.find(x => x.id === bandeId);
      const existingIds = (bande?.medlemmer||[]).map(m => m.id);
      const matches = personer.filter(p => !existingIds.includes(p.id) && `${p.fornavn} ${p.efternavn} ${p.cpr}`.toLowerCase().includes(q)).slice(0, 6);
      if (matches.length === 0) {
        results.innerHTML = '<div style="padding:6px 10px;font-size:11px;color:var(--muted-fg)">Ingen resultater fundet</div>';
      } else {
        results.innerHTML = matches.map(p => {
          const safeName = (p.fornavn + ' ' + p.efternavn).replace(/'/g, "\\'");
          return `<div class="list-item" style="padding:8px 12px;cursor:pointer;font-size:12px;border-radius:6px;transition:background 0.15s" onmouseover="this.style.background='rgba(59,130,246,0.1)'" onmouseout="this.style.background=''" onclick="window._nskAddMember('${bandeId}','${p.id}','${safeName}','${p.cpr}')">
          <span style="font-weight:500">${p.fornavn} ${p.efternavn}</span> <span class="mono" style="font-size:10px;color:var(--muted-fg)">${p.cpr}</span>
        </div>`;
        }).join('');
      }
    } catch (err) {
      console.error('NSK member search error:', err);
      results.innerHTML = '<div style="padding:6px 10px;font-size:11px;color:var(--destructive)">Fejl ved søgning</div>';
    }
  })();
});

window._nskAddMember = async function(bandeId, personId, navn, cpr) {
  const bander = getNSKBander();
  const b = bander.find(x => x.id === bandeId);
  if (b) {
    if (!b.medlemmer) b.medlemmer = [];
    if (b.medlemmer.find(m => m.id === personId)) { showToast('Personen er allerede medlem'); return; }
    b.medlemmer.push({ id: personId, navn, cpr, sigtelser: 0, sigtelserListe: [], tilfojetDato: new Date().toISOString().split('T')[0] });
    saveNSKBander(bander);
    // Sync: also create tilhørsforhold so it shows in person registry
    try {
      const t = { id: 'bande_' + bandeId + '_' + personId, personId, personCpr: cpr, personNavn: navn, bande: b.navn, rolle: 'Medlem', status: 'aktiv', oprettetAf: currentUser.fornavn + ' ' + currentUser.efternavn, oprettetDato: new Date().toISOString().split('T')[0] };
      await tilhoersforholdApi.create(t);
    } catch(e) { console.error('Tilhørsforhold sync fejl:', e); }
    showToast(navn + ' tilføjet som medlem');
    renderPage(activeTabId);
  }
};

// ── Sigtelse dialog for band members ──
window._nskShowSigtelseDialog = function(bandeId, memberIndex) {
  const bander = getNSKBander();
  const bande = bander.find(x => x.id === bandeId);
  if (!bande || !bande.medlemmer[memberIndex]) return;
  const medlem = bande.medlemmer[memberIndex];
  
  const overlay = el("div",{className:"dialog-overlay",onclick:e=>{if(e.target===overlay)overlay.remove();}});
  overlay.innerHTML = `<div class="dialog" style="max-width:480px">
    <div class="dialog-title">Tilføj sigtelse — ${esc(medlem.navn)}</div>
    <div style="font-size:11px;color:var(--muted-fg);margin-bottom:14px" class="mono">${medlem.cpr || ''} · ${esc(bande.navn)}</div>
    <div class="label">Sigtelse / Lovovertrædelse</div>
    <input class="input mb-2" id="nsk-sigt-desc" placeholder="F.eks. Besiddelse af narko, Hærværk, Trusler...">
    <div class="grid grid-2 gap-2 mb-2">
      <div><div class="label">Bøde (kr.)</div><input class="input" id="nsk-sigt-boede" type="number" placeholder="0" value="0"></div>
      <div><div class="label">Fængsel (mdr.)</div><input class="input" id="nsk-sigt-faengsel" type="number" placeholder="0" value="0"></div>
    </div>
    <div class="label">Noter (valgfrit)</div>
    <textarea class="textarea mb-2" id="nsk-sigt-noter" rows="2" placeholder="Yderligere detaljer..."></textarea>
    <div class="flex gap-2">
      <button class="btn btn-primary" id="nsk-sigt-submit">Tilføj sigtelse</button>
      <button class="btn btn-outline" onclick="this.closest('.dialog-overlay').remove()">Annuller</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById("nsk-sigt-submit").addEventListener("click", () => {
    const desc = document.getElementById("nsk-sigt-desc").value.trim();
    if (!desc) { showToast("Indtast en sigtelse"); return; }
    const freshBander = getNSKBander();
    const fb = freshBander.find(x => x.id === bandeId);
    if (!fb || !fb.medlemmer[memberIndex]) return;
    if (!fb.medlemmer[memberIndex].sigtelserListe) fb.medlemmer[memberIndex].sigtelserListe = [];
    fb.medlemmer[memberIndex].sigtelserListe.push({
      beskrivelse: desc,
      boede: parseInt(document.getElementById("nsk-sigt-boede").value) || 0,
      faengsel: parseInt(document.getElementById("nsk-sigt-faengsel").value) || 0,
      noter: document.getElementById("nsk-sigt-noter").value || '',
      dato: new Date().toISOString().split('T')[0],
      registreretAf: currentUser.fornavn + ' ' + currentUser.efternavn
    });
    fb.medlemmer[memberIndex].sigtelser = fb.medlemmer[memberIndex].sigtelserListe.length;
    saveNSKBander(freshBander);
    showToast("Sigtelse tilføjet til " + fb.medlemmer[memberIndex].navn);
    overlay.remove();
    renderPage(activeTabId);
  });
};

window._nskRemoveSigtelse = function(bandeId, memberIndex, sigtelseIndex) {
  if (!confirm("Fjern denne sigtelse?")) return;
  const bander = getNSKBander();
  const b = bander.find(x => x.id === bandeId);
  if (b && b.medlemmer[memberIndex] && b.medlemmer[memberIndex].sigtelserListe) {
    b.medlemmer[memberIndex].sigtelserListe.splice(sigtelseIndex, 1);
    b.medlemmer[memberIndex].sigtelser = b.medlemmer[memberIndex].sigtelserListe.length;
    saveNSKBander(bander);
    renderPage(activeTabId);
  }
};

// ── Better add-member dialog ──
window._nskShowAddMemberDialog = async function(bandeId) {
  if (!window._nskPersoner || window._nskPersoner.length === 0) {
    try { window._nskPersoner = await personerApi.getAll(); } catch {}
  }
  const personer = window._nskPersoner || [];
  const bander = getNSKBander();
  const bande = bander.find(x => x.id === bandeId);
  const existingIds = (bande?.medlemmer||[]).map(m => m.id);
  const available = personer.filter(p => !existingIds.includes(p.id));
  
  const overlay = el("div",{className:"dialog-overlay",onclick:e=>{if(e.target===overlay)overlay.remove();}});
  let listHtml = '';
  if (available.length === 0) {
    listHtml = '<div style="text-align:center;padding:20px;color:var(--muted-fg);font-size:12px">Ingen tilgængelige personer i registeret</div>';
  } else {
    available.forEach(p => {
      const safeName = (p.fornavn + ' ' + p.efternavn).replace(/'/g, "\\'");
      listHtml += `<div class="list-item nsk-dlg-person" data-search="${(p.fornavn+' '+p.efternavn+' '+p.cpr).toLowerCase()}" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.15s" onmouseover="this.style.background='rgba(59,130,246,0.08)'" onmouseout="this.style.background=''" onclick="window._nskAddMember('${bandeId}','${p.id}','${safeName}','${p.cpr}');this.closest('.dialog-overlay').remove()">
        <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
          <div>

async function renderNSKContent() {
  let html = '';
  try {
    const [tilhoersforhold, personer] = await Promise.all([tilhoersforholdApi.getAll(), personerApi.getAll()]);
    window._nskPersoner = personer;
    window._nskTilhoersforhold = tilhoersforhold;
    const bander = {};
    tilhoersforhold.forEach(t => { if(!bander[t.bande])bander[t.bande]=[]; bander[t.bande].push(t); });
    const bandeNavne = Object.keys(bander);
    const aktive = tilhoersforhold.filter(t=>t.status==="aktiv").length;
    const inaktive = tilhoersforhold.length - aktive;

    // Stats bar
    html += `<div class="grid grid-4 gap-2 mb-3">
      <div class="card card-sm" style="text-align:center;padding:10px"><div style="font-size:20px;font-weight:700;color:var(--primary)">${tilhoersforhold.length}</div><div style="font-size:10px;color:var(--muted-fg)">Registreringer</div></div>
      <div class="card card-sm" style="text-align:center;padding:10px"><div style="font-size:20px;font-weight:700;color:var(--destructive)">${bandeNavne.length}</div><div style="font-size:10px;color:var(--muted-fg)">Grupperinger</div></div>
      <div class="card card-sm" style="text-align:center;padding:10px"><div style="font-size:20px;font-weight:700;color:var(--success)">${aktive}</div><div style="font-size:10px;color:var(--muted-fg)">Aktive</div></div>
      <div class="card card-sm" style="text-align:center;padding:10px"><div style="font-size:20px;font-weight:700;color:var(--muted-fg)">${inaktive}</div><div style="font-size:10px;color:var(--muted-fg)">Inaktive</div></div>
    </div>`;

    // Main split layout
    html += `<div class="split-layout" style="height:calc(100vh - 320px);min-height:400px">`;

    // ── Left: Person search ──
    html += `<div class="split-left" style="width:280px;min-width:240px">
      <div style="padding:12px;border-bottom:1px solid var(--border)">
        <div style="font-size:13px;font-weight:600;margin-bottom:8px">🔍 Søg person</div>
        <input class="input" id="nsk-person-search" placeholder="Navn eller CPR..." style="font-size:12px">
      </div>
      <div id="nsk-person-list" style="flex:1;overflow-y:auto;padding:4px">`;

    // Show persons with their affiliation status
    personer.forEach(p => {
      const pTilhoer = tilhoersforhold.filter(t=>t.personId===p.id||t.personCpr===p.cpr);
      const aktiveTilhoer = pTilhoer.filter(t=>t.status==="aktiv");
      html += `<div class="list-item nsk-person-item" onclick="window._nskSelectPerson('${p.id}')" data-search="${(p.fornavn+' '+p.efternavn+' '+p.cpr).toLowerCase()}" style="padding:8px 12px">
        <div class="dot ${aktiveTilhoer.length>0?'dot-warning':'dot-success'}"></div>
        <div class="list-item-content">
          <div class="list-item-title" style="font-size:12px">${p.fornavn} ${p.efternavn}</div>
          <div class="list-item-sub mono" style="font-size:10px">${p.cpr}</div>
        </div>
        ${aktiveTilhoer.length>0?`<span class="badge badge-destructive" style="font-size:9px">${aktiveTilhoer.length}</span>`:''}
      </div>`;
    });

    html += `</div></div>`;

    // ── Right: Content area ──
    html += `<div class="split-right" style="flex:1;overflow-y:auto;padding:16px">
      <div id="nsk-right-content">`;

    // Default: show all grupperinger
    html += `<div class="flex items-center justify-between mb-3">
      <div class="flex items-center gap-3">${icons.target}<h2 style="font-size:16px;font-weight:600">NSK Bande Oversigt</h2></div>
      <button class="btn btn-primary btn-sm" onclick="showTilhoersforholdForm()" style="display:flex;align-items:center;gap:6px">${icons.plus} Tilføj tilhørsforhold</button>
    </div>`;

    if (bandeNavne.length === 0) {
      html += `<div style="text-align:center;padding:48px 16px">
        <div style="font-size:36px;margin-bottom:12px">🎯</div>
        <p style="font-size:14px;font-weight:500;margin-bottom:4px">Ingen tilhørsforhold registreret</p>
        <p style="font-size:12px;color:var(--muted-fg);margin-bottom:16px">Brug knappen ovenfor eller vælg en person til venstre for at tilføje</p>
        <button class="btn btn-primary" onclick="showTilhoersforholdForm()">Tilføj første tilhørsforhold</button>
      </div>`;
    } else {
      bandeNavne.forEach(bande => {
        const members = bander[bande];
        const aktiveMedl = members.filter(m=>m.status==="aktiv").length;
        html += `<div class="card mb-2" style="padding:0;overflow:hidden;border-left:3px solid var(--destructive)">
          <div class="accordion-header" onclick="this.nextElementSibling.classList.toggle('open')" style="padding:12px 16px">
            <div class="flex items-center gap-3">
              <span style="font-size:14px;font-weight:600">${bande}</span>
              <span class="badge badge-destructive">${members.length} medl.</span>
              <span class="badge badge-success" style="font-size:9px">${aktiveMedl} aktive</span>
            </div>
            <span style="color:var(--muted-fg);font-size:12px">▼</span>
          </div>
          <div class="accordion-body">`;
        members.forEach(m => {
          html += `<div style="padding:10px 16px;border-top:1px solid rgba(42,47,58,.5);display:flex;align-items:center;justify-content:space-between">
            <div style="cursor:pointer" onclick="window._nskSelectPerson('${m.personId}')">
              <span style="font-size:13px;font-weight:500">${m.personNavn||"Ukendt"}</span>
              <span class="mono" style="font-size:10px;color:var(--muted-fg);margin-left:6px">${m.personCpr||""}</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="badge badge-muted">${m.rolle||"Medlem"}</span>
              <span class="badge ${m.status==="aktiv"?"badge-success":"badge-muted"}">${m.status||"aktiv"}</span>
              ${isAdmin?`<button class="btn btn-ghost btn-sm" style="color:var(--destructive);padding:2px 6px" onclick="deleteTilhoersforhold('${m.id}')">✕</button>`:''}
            </div>
          </div>`;
        });
        html += '</div></div>';
      });
    }

    html += `</div></div></div>`;

  } catch(err) { html += '<p style="color:var(--muted-fg)">Kunne ikke indlæse data: '+err.message+'</p>'; }
  return html;
}

// NSK person search filter

// NSK select person → show their details + add tilhørsforhold button in right pane
window._nskSelectPerson = async function(personId) {
  const personer = window._nskPersoner || [];
  const tilhoersforhold = window._nskTilhoersforhold || [];
  const p = personer.find(pp=>pp.id===personId);
  if (!p) return;
  const pTilhoer = tilhoersforhold.filter(t=>t.personId===p.id||t.personCpr===p.cpr);
  const rightContent = document.getElementById('nsk-right-content');
  if (!rightContent) return;

  // Highlight selected person
  document.querySelectorAll('.nsk-person-item').forEach(el => el.classList.remove('active'));
  const items = document.querySelectorAll('.nsk-person-item');
  items.forEach(el => { if(el.querySelector('.list-item-title')?.textContent === `${p.fornavn} ${p.efternavn}`) el.classList.add('active'); });

  let html = `<div class="flex items-center justify-between mb-3">
    <div>
      <h2 style="font-size:16px;font-weight:600">${p.fornavn} ${p.efternavn}</h2>
      <span class="mono" style="font-size:11px;color:var(--muted-fg)">${p.cpr}</span>
    </div>
    <div class="flex gap-2">
      <button class="btn btn-primary btn-sm" onclick="showTilhoersforholdForPerson('${p.id}','${p.cpr}','${p.fornavn} ${p.efternavn}')" style="display:flex;align-items:center;gap:6px">${icons.plus} Tilføj tilhørsforhold</button>
      <button class="btn btn-outline btn-sm" onclick="renderPage(activeTabId)">← Tilbage</button>
    </div>
  </div>`;

  // Person info card
  html += `<div class="card card-sm mb-3" style="padding:12px">
    <div class="grid grid-3 gap-3">
      <div><div style="font-size:10px;color:var(--muted-fg)">Adresse</div><div style="font-size:12px">${p.adresse||"—"}</div></div>
      <div><div style="font-size:10px;color:var(--muted-fg)">Telefon</div><div style="font-size:12px">${p.telefon||"—"}</div></div>
      <div><div style="font-size:10px;color:var(--muted-fg)">Status</div><div style="font-size:12px">${p.status||"aktiv"}</div></div>
    </div>
  </div>`;

  // Tilhørsforhold list
  html += `<div style="font-size:14px;font-weight:600;margin-bottom:8px">Tilhørsforhold (${pTilhoer.length})</div>`;
  if (pTilhoer.length === 0) {
    html += `<div class="card card-sm" style="text-align:center;padding:24px">
      <p style="font-size:12px;color:var(--muted-fg);margin-bottom:12px">Ingen tilhørsforhold registreret for denne person</p>
      <button class="btn btn-primary btn-sm" onclick="showTilhoersforholdForPerson('${p.id}','${p.cpr}','${p.fornavn} ${p.efternavn}')">Tilføj tilhørsforhold</button>
    </div>`;
  } else {
    pTilhoer.forEach(t => {
      html += `<div class="card card-sm mb-2" style="border-left:3px solid var(--destructive);padding:12px">
        <div class="flex items-center justify-between">
          <div>
            <span style="font-size:14px;font-weight:600">${t.bande}</span>
            <div class="flex items-center gap-2" style="margin-top:4px">
              <span class="badge badge-muted">${t.rolle||"Medlem"}</span>
              <span class="badge ${t.status==="aktiv"?"badge-success":"badge-muted"}">${t.status||"aktiv"}</span>
              <span style="font-size:9px;color:var(--muted-fg)">Tilføjet: ${t.oprettetDato||"—"} af ${t.oprettetAf||"—"}</span>
            </div>
          </div>
          ${isAdmin?`<button class="btn btn-ghost btn-sm" style="color:var(--destructive)" onclick="deleteTilhoersforhold('${t.id}')">✕</button>`:''}
        </div>
      </div>`;
    });
  }

  rightContent.innerHTML = html;
};

async function renderAfdelingsIndhold(container, contentId, isLeder) {
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';
  try {
    const indhold = await afdelingsIndholdApi.getAll(contentId);
    let html = '';
    if (isLeder) html += `<div style="text-align:right;margin-bottom:12px"><button class="btn btn-primary btn-sm" onclick="showAfdelingsIndholdForm('${contentId}')">${icons.plus} Tilføj opslag</button></div>`;
    
    const sorted = [...indhold].sort((a,b) => {
      if (a.pinned !== b.pinned) return (a.pinned?-1:1);
      return new Date(b.oprettetDato||0).getTime() - new Date(a.oprettetDato||0).getTime();
    });
    
    sorted.forEach(item => {
      const typeColors = {info:"badge-primary",mission:"badge-warning",vigtig:"badge-destructive",notat:"badge-muted",taktisk:"badge-warning",vagtplan:"badge-success",udstyr:"badge-primary",nyhed:"badge-warning"};
      const typeLabels = {info:"Information",mission:"Mission",vigtig:"Vigtig",notat:"Notat",taktisk:"Taktisk plan",vagtplan:"Vagtplan",udstyr:"Udstyr",nyhed:"Nyhed"};
      html += `<div class="card card-sm mb-2" style="${item.pinned?'border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.03)':''}"><div class="flex items-center justify-between mb-1"><div class="flex items-center gap-2">${item.pinned?icons.pin:''}<span class="badge ${typeColors[item.type]||'badge-muted'}">${typeLabels[item.type]||item.type||"info"}</span><span style="font-size:12px;font-weight:600">${item.titel}</span></div>`;
      if (isLeder) html += `<div class="flex gap-1"><button class="btn btn-ghost btn-sm" onclick="togglePinIndhold('${item.id}',${item.pinned?0:1},'${contentId}')">${icons.pin}</button><button class="btn btn-ghost btn-sm" onclick="editAfdelingsIndhold('${item.id}','${contentId}')">${icons.pencil}</button><button class="btn btn-ghost btn-sm" style="color:var(--destructive)" onclick="deleteAfdelingsIndhold('${item.id}','${contentId}')">✕</button></div>`;
      html += `</div><p style="font-size:12px;color:var(--muted-fg);white-space:pre-wrap;line-height:1.6">${item.indhold||""}</p><div style="font-size:9px;color:var(--muted-fg);margin-top:6px">${item.oprettetAf||"—"} — ${item.oprettetDato?new Date(item.oprettetDato).toLocaleDateString("da-DK"):"—"}${item.opdateretDato?' (redigeret)':''}</div></div>`;
    });
    if(sorted.length===0&&!isLeder) html+='<div class="loading-center" style="min-height:100px"><p style="font-size:12px;color:var(--muted-fg)">Ingen opslag endnu</p></div>';
    if(sorted.length===0&&isLeder) html+='<div class="text-center" style="padding:32px"><p style="font-size:12px;color:var(--muted-fg)">Ingen opslag endnu</p><p style="font-size:10px;color:var(--muted-fg);margin-top:4px">Klik "Tilføj opslag" for at komme i gang</p></div>';
    container.innerHTML = html;
  } catch { container.innerHTML = '<p style="color:var(--muted-fg)">Kunne ikke indlæse indhold</p>'; }
}

window.setAfdTab = async function(afdId, tabId) { window._afdActiveTab[afdId] = tabId; renderPage(activeTabId); };
window.addAfdTab = async function(afdId) {
  const name = prompt("Tab navn:");
  if (!name) return;
  const tabsKey = `afd_tabs_${afdId}`;
  let tabs = JSON.parse(localStorage.getItem(tabsKey)||"null") || afdelingDefaultTabs[afdId] || [];
  tabs.push({id:`custom_${Date.now()}`,label:name,removable:true});
  localStorage.setItem(tabsKey, JSON.stringify(tabs));
  window._afdActiveTab[afdId] = tabs[tabs.length-1].id;
  await renderPage(activeTabId);
};
window.removeAfdTab = async function(afdId, tabId) {
  if(!confirm("Fjern denne tab?"))return;
  const tabsKey = `afd_tabs_${afdId}`;
  let tabs = JSON.parse(localStorage.getItem(tabsKey)||"null") || afdelingDefaultTabs[afdId] || [];
  tabs = tabs.filter(t=>t.id!==tabId);
  localStorage.setItem(tabsKey, JSON.stringify(tabs));
  if(window._afdActiveTab[afdId]===tabId) window._afdActiveTab[afdId]=tabs[0]?.id||"tavle";
  await renderPage(activeTabId);
};

window.showTilhoersforholdForm = function() {
  const overlay = el("div",{className:"dialog-overlay",onclick:e=>{if(e.target===overlay)overlay.remove();}});
  overlay.innerHTML = `<div class="dialog"><div class="dialog-title">Tilføj tilhørsforhold</div><div class="label">Søg person</div><input class="input mb-2" id="th-search" placeholder="Søg navn eller CPR..."><div id="th-person-results" style="max-height:120px;overflow-y:auto;margin-bottom:8px"></div><div id="th-selected" style="font-size:12px;color:var(--success);margin-bottom:8px"></div><div class="label">Gruppering / Bande</div><input class="input mb-2" id="th-bande" placeholder="Navn på gruppering..."><div class="grid grid-2 gap-2 mb-2"><div><div class="label">Rolle</div><select class="select w-full" id="th-rolle"><option value="Medlem">Medlem</option><option value="Leder">Leder</option><option value="Prospect">Prospect</option><option value="Associeret">Associeret</option></select></div><div><div class="label">Status</div><select class="select w-full" id="th-status"><option value="aktiv">Aktiv</option><option value="inaktiv">Inaktiv</option><option value="tidligere">Tidligere</option></select></div></div><div class="flex gap-2"><button class="btn btn-primary" id="th-submit">Tilføj</button><button class="btn btn-outline" onclick="this.closest('.dialog-overlay').remove()">Annuller</button></div></div>`;
  document.body.appendChild(overlay);
  let selectedPerson = null;
  document.getElementById("th-search").addEventListener("input", e=>{
    const q=e.target.value.toLowerCase();const results=document.getElementById("th-person-results");
    if(q.length<2){results.innerHTML="";return;}
    const matches=(window._nskPersoner||[]).filter(p=>`${p.fornavn} ${p.efternavn} ${p.cpr}`.toLowerCase().includes(q)).slice(0,8);
    results.innerHTML=matches.map(p=>`<div class="list-item" style="padding:4px 8px;cursor:pointer" data-id="${p.id}" data-cpr="${p.cpr}" data-navn="${p.fornavn} ${p.efternavn}"><span style="font-size:12px">${p.fornavn} ${p.efternavn}</span> <span class="mono" style="font-size:10px;color:var(--muted-fg)">${p.cpr}</span></div>`).join("");
    results.querySelectorAll(".list-item").forEach(item=>{
      item.addEventListener("click",()=>{
        selectedPerson={id:item.dataset.id,cpr:item.dataset.cpr,navn:item.dataset.navn};
        document.getElementById("th-selected").textContent="Valgt: "+selectedPerson.navn;
        results.innerHTML="";document.getElementById("th-search").value=selectedPerson.navn;
      });
    });
  });
  document.getElementById("th-submit").addEventListener("click", async ()=>{
    if(!selectedPerson){showToast("Vælg en person");return;}
    const bande=document.getElementById("th-bande").value;if(!bande){showToast("Udfyld gruppering");return;}
    const t={id:Date.now().toString(),personId:selectedPerson.id,personCpr:selectedPerson.cpr,personNavn:selectedPerson.navn,bande,rolle:document.getElementById("th-rolle").value,status:document.getElementById("th-status").value,oprettetAf:`${currentUser.fornavn} ${currentUser.efternavn}`,oprettetDato:new Date().toISOString().split("T")[0]};
    try{await tilhoersforholdApi.create(t);showToast("Tilhørsforhold tilføjet");overlay.remove();renderPage(activeTabId);}catch(e){showToast("Fejl: "+e.message);}
  });
};

window.deleteTilhoersforhold = async function(id) {
  if(!confirm("Slet tilhørsforhold?"))return;
  try{await tilhoersforholdApi.remove(id);showToast("Slettet");renderPage(activeTabId);}catch(e){showToast("Fejl: "+e.message);}
};

// ═══ EFTERLYSNING FRA PERSON (QUICK) ═══
window.markEftersoegt = async function(id) {
  const p = window._krPersoner.find(pp=>pp.id===id);
  if (!p) return;
  const newStatus = p.status === "eftersøgt" ? "aktiv" : "eftersøgt";
  if (!confirm(`${newStatus==="eftersøgt"?"Efterlys":"Fjern efterlysning for"} ${p.fornavn} ${p.efternavn}?`)) return;
  try { await personerApi.update(id, {status:newStatus}); showToast(newStatus==="eftersøgt"?"Person efterlyst":"Efterlysning fjernet"); renderPage(activeTabId); } catch(e) { showToast("Fejl: "+e.message); }
};
</script>

<script>
/* ==== Personregister visual override ==== */
(function(){
  function escLocal(v){
    return String(v ?? "")
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }

  function personInitials(p){
    return `${(p?.fornavn||"U")[0]||"U"}${(p?.efternavn||"B")[0]||"B"}`.toUpperCase();
  }

  window.renderPersonregister = async function(container){
    const personer = await personerApi.getAll();
    window._krPersoner = personer;
    const activeId = window._krSelectedId || personer[0]?.id || "";
    const q = String(window._krSearch || "").toLowerCase();

    container.innerHTML = `
      <div class="pr-shell">
        <div class="pr-layout">
          <div class="pr-sidebar">
            <div class="pr-sidebar-head">
              <div style="font-size:15px;font-weight:700;margin-bottom:10px">Personregister</div>
              <div class="flex gap-2">
                <input class="input" id="kr-search" placeholder="Søg navn eller CPR..." value="${escLocal(window._krSearch || "")}">
                <button class="btn btn-primary btn-sm" onclick="showPersonForm()">+</button>
              </div>
            </div>
            <div class="pr-list" id="kr-list">
              ${personer.filter(p => {
                const hay = `${p.fornavn||""} ${p.efternavn||""} ${p.cpr||""}`.toLowerCase();
                return !q || hay.includes(q);
              }).map(p => `
                <div class="pr-item ${activeId===p.id ? "active" : ""}" data-person-id="${p.id}" onclick="selectPerson('${p.id}')">
                  <div style="font-size:13px;font-weight:700">${escLocal(p.fornavn||"")} ${escLocal(p.efternavn||"")}</div>
                  <div style="font-size:11px;color:var(--muted-fg);margin-top:4px">${escLocal(p.cpr || "Ingen CPR")}</div>
                </div>
              `).join("") || `<div class="staff-empty">Ingen personer fundet.</div>`}
            </div>
          </div>
          <div class="pr-main" id="kr-detail"></div>
        </div>
      </div>
    `;

    document.getElementById("kr-search")?.addEventListener("input", e => {
      window._krSearch = e.target.value;
      renderPersonregister(document.getElementById("content-area"));
    });

    if (activeId) window.selectPerson(activeId);
  };

  window.selectPerson = async function(id){
    window._krSelectedId = id;
    const p = (window._krPersoner || []).find(pp => pp.id === id);
    if (!p) return;
    const detail = document.getElementById("kr-detail");
    if (!detail) return;

    const sager = await sagerApi.getAll().catch(() => []);
    const koeretoejer = await koeretoejerApi.getAll().catch(() => []);
    const ejendomme = await ejendommeApi.getAll().catch(() => []);
    const tilhoersforhold = await tilhoersforholdApi.getAll().catch(() => []);
    const relSager = (sager || []).filter(s => JSON.stringify(s).toLowerCase().includes(String(p.cpr || "").toLowerCase()) || JSON.stringify(s).toLowerCase().includes(`${(p.fornavn||"").toLowerCase()} ${(p.efternavn||"").toLowerCase()}`));
    const relKoeretoejer = (koeretoejer || []).filter(k => String(k.ejer || "").toLowerCase() === `${(p.fornavn||"").toLowerCase()} ${(p.efternavn||"").toLowerCase()}`);
    const relEjendomme = (ejendomme || []).filter(e => String(e.ejer || "").toLowerCase() === `${(p.fornavn||"").toLowerCase()} ${(p.efternavn||"").toLowerCase()}`);
    const relTilhoersforhold = (tilhoersforhold || []).filter(t => t.personId === id || t.personCpr === p.cpr);

    const foto = p.mugshotUrl || p.mugshot || p.billede || "";
    const fodselsdato = p.fodselsdato || (p.cpr && p.cpr.length >= 6 ? `${p.cpr.slice(0,2)}/${p.cpr.slice(2,4)}/19${p.cpr.slice(4,6)}` : "Ukendt");
    const topTabs = [
      {id:"personlig", label:"Personlig Information"},
      {id:"sager", label:`Sager (${relSager.length})`},
      {id:"koeretoejer", label:`Køretøjer (${relKoeretoejer.length})`},
      {id:"ejendomme", label:`Ejendomme (${relEjendomme.length})`},
      {id:"tilhoersforhold", label:`Tilhørsforhold (${relTilhoersforhold.length})`},
      {id:"frakendelser", label:"Frakendelser (0)"}
    ];
    const activeTab = window._krDetailTab || "personlig";

    detail.innerHTML = `
      <div class="pr-top-tabs">
        ${topTabs.map(tab => `<div class="pr-tab ${activeTab===tab.id ? "active" : ""}" onclick="window._krDetailTab='${tab.id}'; selectPerson('${p.id}')">${tab.label}</div>`).join("")}
      </div>

      ${activeTab === "personlig" ? `
        <div class="pr-profile-top">
          <div class="pr-side-sections">
            <div class="pr-mugshot">
              ${foto ? `<img src="${escLocal(foto)}" style="width:100%;height:100%;object-fit:cover">` : personInitials(p)}
            </div>
            <div class="pr-side-card">
              <div style="font-size:13px;font-weight:700;margin-bottom:8px">Særlige kendetegn</div>
              <div style="font-size:12px;color:var(--muted-fg)">${escLocal(p.saerligeKendetegn || p["særligeKendetegn"] || "Ingen Data/Ukendt")}</div>
            </div>
            <div class="pr-side-card">
              <div style="font-size:13px;font-weight:700;margin-bottom:8px">Tags</div>
              <div style="font-size:12px;color:var(--muted-fg)">${escLocal(p.tags || "Ingen Data/Ukendt")}</div>
            </div>
            <div class="pr-side-card">
              <div style="font-size:13px;font-weight:700;margin-bottom:8px">Kommentarer</div>
              <div style="font-size:12px;color:var(--muted-fg)">${escLocal(p.kommentar || "Ingen Data/Ukendt")}</div>
            </div>
          </div>

          <div>
            <div class="flex items-start justify-between gap-2">
              <div class="pr-person-name">${escLocal(p.fornavn || "")} ${escLocal(p.efternavn || "")}</div>
              <div class="pr-actions">
                <button class="btn btn-outline btn-sm" onclick="editPerson('${p.id}')">✎ Rediger</button>
                <button class="btn btn-outline btn-sm" onclick="showEfterlysningDialog('${p.id}')">△ Efterlys</button>
                <button class="btn btn-outline btn-sm">⋯</button>
              </div>
            </div>

            <div class="pr-info-grid">
              <div class="pr-info"><div class="pr-info-label">Fødselsdato</div><div class="pr-info-value">${escLocal(fodselsdato)}</div></div>
              <div class="pr-info"><div class="pr-info-label">Nationalitet</div><div class="pr-info-value">${escLocal(p.nationalitet || "Ingen Data/Ukendt")}</div></div>
              <div class="pr-info"><div class="pr-info-label">Køn</div><div class="pr-info-value">${escLocal(p.koen || "Ingen Data/Ukendt")}</div></div>

              <div class="pr-info"><div class="pr-info-label">Fødested</div><div class="pr-info-value">${escLocal(p.foedested || "Ukendt")}</div></div>
              <div class="pr-info"><div class="pr-info-label">Højde</div><div class="pr-info-value">${escLocal(p.hoejde || "Ingen Data/Ukendt")}</div></div>
              <div class="pr-info"><div class="pr-info-label">Vægt</div><div class="pr-info-value">${escLocal(p.vaegt || "Ingen Data/Ukendt")}</div></div>

              <div class="pr-info"><div class="pr-info-label">Øjenfarve</div><div class="pr-info-value">${escLocal(p.oejenfarve || p.øjenfarve || "Ingen Data/Ukendt")}</div></div>
              <div class="pr-info"><div class="pr-info-label">Hårfarve</div><div class="pr-info-value">${escLocal(p.haarfarve || p.hårfarve || "Ingen Data/Ukendt")}</div></div>
              <div class="pr-info"><div class="pr-info-label">Telefon</div><div class="pr-info-value">${escLocal(p.telefon || "Ingen Data/Ukendt")}</div></div>
            </div>
          </div>
        </div>

        <div class="pr-stats">
          <div class="pr-stat-card"><div class="pr-stat-label">Antal sager</div><div class="pr-stat-value">${relSager.length}</div></div>
          <div class="pr-stat-card"><div class="pr-stat-label">Antal køretøjer</div><div class="pr-stat-value">${relKoeretoejer.length}</div></div>
          <div class="pr-stat-card"><div class="pr-stat-label">Antal ejendomme</div><div class="pr-stat-value">${relEjendomme.length}</div></div>
        </div>

        <div class="pr-notes-card">
          <div style="font-size:13px;font-weight:700;margin-bottom:8px">Noter</div>
          <div style="font-size:12px;color:var(--muted-fg)">${escLocal(p.noter || "Ingen synlige noter fundet..")}</div>
        </div>
      ` : `
        ${activeTab === "tilhoersforhold" ? `
        <div style="padding:20px">
          <div style="font-size:15px;font-weight:700;margin-bottom:16px">Tilhørsforhold (${relTilhoersforhold.length})</div>
          ${relTilhoersforhold.length > 0 ? relTilhoersforhold.map(t => `
            <div style="padding:12px 16px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;border-left:3px solid var(--destructive);background:rgba(239,68,68,0.03)">
              <div class="flex items-center justify-between">
                <div>
                  <span style="font-size:14px;font-weight:600">${escLocal(t.bande)}</span>
                  <span class="badge badge-muted" style="margin-left:8px">${escLocal(t.rolle||"Medlem")}</span>
                  <span class="badge ${t.status==="aktiv"?"badge-success":"badge-muted"}" style="margin-left:4px">${escLocal(t.status||"aktiv")}</span>
                </div>

              </div>
              ${t.noter ? `<div style="font-size:11px;color:var(--muted-fg);margin-top:6px">${escLocal(t.noter)}</div>` : ""}

            </div>
          `).join("") : `
            <div class="card" style="text-align:center;padding:32px">
              <div style="font-size:13px;color:var(--muted-fg)">Ingen tilhørsforhold registreret for denne person</div>
              <div style="font-size:11px;color:var(--muted-fg);margin-top:4px">Tilhørsforhold tilføjes via NSK → Bander</div>
