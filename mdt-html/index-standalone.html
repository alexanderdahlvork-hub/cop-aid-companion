async function renderAnsoegninger(container) {
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div><span>Indlæser ansøgninger...</span></div>';
  try {
    const ansoegninger = await ansoeningerApi.getAll();
    const canManage = isAdmin;
    let html = `<div class="flex items-center justify-between mb-3"><div class="flex items-center gap-3">${icons.file}<h1 style="font-size:18px;font-weight:700">Ansøgninger</h1><span style="font-size:12px;color:var(--muted-fg)">${ansoegninger.length}</span></div><button class="btn btn-primary btn-sm" onclick="showAnsoegningForm()">${icons.plus} Indsend ansøgning</button></div>`;
    html += `<div class="flex gap-2 mb-3"><button class="btn btn-primary btn-sm" onclick="filterAnsoegninger('alle')">Alle</button><button class="btn btn-outline btn-sm" onclick="filterAnsoegninger('afventer')">Afventer</button><button class="btn btn-outline btn-sm" onclick="filterAnsoegninger('godkendt')">Godkendt</button><button class="btn btn-outline btn-sm" onclick="filterAnsoegninger('afvist')">Afvist</button></div><div id="ansoeg-list">`;
    const statusColors = {afventer:"badge-warning",godkendt:"badge-success",afvist:"badge-destructive"};
    ansoegninger.forEach(a => {
      html += `<div class="card card-sm mb-2 ansoeg-item" data-status="${a.status||'afventer'}"><div class="flex items-center justify-between"><div class="flex-1"><div class="flex items-center gap-2"><span style="font-size:13px;font-weight:600">${a.titel||a.type||"Ansøgning"}</span><span class="badge ${statusColors[a.status]||'badge-warning'}">${a.status==='godkendt'?'Godkendt':a.status==='afvist'?'Afvist':'Afventer'}</span></div><div style="font-size:11px;color:var(--muted-fg);margin-top:4px">${a.ansoegerNavn||"Ukendt"} · ${a.oprettetDato||"—"}</div>${a.begrundelse?`<p style="font-size:12px;color:var(--fg);margin-top:6px;white-space:pre-line">${a.begrundelse}</p>`:""}</div>`;
      if(canManage&&(a.status==="afventer"||!a.status)) html+=`<div class="flex gap-2 shrink-0"><button class="btn btn-sm" style="background:var(--success);color:#fff" onclick="behandlAnsoegning('${a.id}','godkendt')">Godkend</button><button class="btn btn-sm btn-destructive" onclick="behandlAnsoegning('${a.id}','afvist')">Afvis</button></div>`;
      html += '</div></div>';
    });
    if(ansoegninger.length===0) html+='<div class="loading-center" style="min-height:200px"><p>Ingen ansøgninger</p></div>';
    html += '</div>';
    container.innerHTML = html;
  } catch (err) { container.innerHTML = `<p style="color:var(--destructive)">Fejl: ${err.message}</p>`; }
}
window.filterAnsoegninger = function(f) { document.querySelectorAll(".ansoeg-item").forEach(i=>{i.style.display=(f==="alle"||i.dataset.status===f)?"":"none";}); };
window.showAnsoegningForm = function() {

    const a = {id:Date.now().toString(),type:document.getElementById("ans-type").value,titel:document.getElementById("ans-type").value+(document.getElementById("ans-afdeling").value?": "+document.getElementById("ans-afdeling").value:""),afdeling:document.getElementById("ans-afdeling").value,begrundelse:document.getElementById("ans-begrundelse").value,ansoegerNavn:`${currentUser.fornavn} ${currentUser.efternavn}`,ansoegerBadge:currentUser.badgeNr,oprettetDato:new Date().toISOString().split("T")[0],status:"afventer"};

window.behandlAnsoegning = async function(id, status) {

// ═══ AFDELINGER (MED SUB-TABS) ═══
async function renderAfdeling(container, afdId) {
  const titler = {nsk:"NSK — Tilhørsforhold & Efterretning",lima:"Lima — Aktionsstyrken",faerdsel:"Færdsel — Færdselsafdelingen",efterforskning:"Efterforskning",sig:"SIG — Særlig Indsatsgruppe",remeo:"Remeo"};
  const isLeder = isAdmin || (currentUser.afdeling||"").toLowerCase().includes(afdId);
  
  // Load tabs from localStorage or use defaults
  const tabsKey = `afd_tabs_${afdId}`;
  let tabs = afdelingDefaultTabs[afdId] || [{id:"tavle",label:"Opslagstavle",removable:false}];
  const saved = localStorage.getItem(tabsKey);
  if (saved) {
    try {
      const savedTabs = JSON.parse(saved);
      const defaultIds = (afdelingDefaultTabs[afdId]||[]).map(t=>t.id);
      const customTabs = savedTabs.filter(t=>!defaultIds.includes(t.id));
      const mergedDefaults = (afdelingDefaultTabs[afdId]||[]).map(dt => { const s=savedTabs.find(st=>st.id===dt.id); return s?{...dt,label:s.label}:dt; });
      tabs = [...mergedDefaults, ...customTabs];
    } catch {}
  }
  
  if (!window._afdActiveTab) window._afdActiveTab = {};
  if (!window._afdActiveTab[afdId]) window._afdActiveTab[afdId] = tabs[0]?.id || "tavle";
  const activeSubTab = window._afdActiveTab[afdId];

  let html = `<div><div class="flex items-center justify-between mb-3"><div><h1 style="font-size:18px;font-weight:700">${titler[afdId]||afdId}</h1><p style="font-size:11px;color:var(--muted-fg)">Afdelingsleder: ${isLeder?"Ja":"Nej"}</p></div></div>`;
  
  // Sub-tab bar
  html += `<div class="flex items-center gap-1 mb-3" style="border-bottom:2px solid var(--border);padding-bottom:0">`;
  tabs.forEach(t => {
    html += `<button class="btn btn-sm" style="border-radius:8px 8px 0 0;border-bottom:2px solid ${activeSubTab===t.id?'var(--primary)':'transparent'};color:${activeSubTab===t.id?'var(--primary)':'var(--muted-fg)'};font-weight:${activeSubTab===t.id?'600':'400'};margin-bottom:-2px;position:relative" onclick="setAfdTab('${afdId}','${t.id}')">${t.label}${isLeder&&t.removable?`<span style="margin-left:6px;cursor:pointer;color:var(--destructive);font-size:9px" onclick="event.stopPropagation();removeAfdTab('${afdId}','${t.id}')">✕</span>`:''}</button>`;
  });
  if (isLeder) {
    html += `<button class="btn btn-ghost btn-sm" style="margin-bottom:-2px" onclick="addAfdTab('${afdId}')">${icons.plus}</button>`;
  }
  html += `</div>`;

  // NSK special: tilhørsforhold tab
  if (afdId === "nsk" && activeSubTab === "tilhoersforhold") {
    html += await renderNSKContent();
  } else {
    // Generic tab content with CRUD
    html += `<div id="afd-tab-content"></div>`;
  }
  html += '</div>';
  container.innerHTML = html;

  // Load content for generic tabs
  if (!(afdId === "nsk" && activeSubTab === "tilhoersforhold")) {
    const contentId = `${afdId}_${activeSubTab}`;
    const contentDiv = document.getElementById("afd-tab-content");
    if (contentDiv) await renderAfdelingsIndhold(contentDiv, contentId, isLeder);
  }
}

async function renderNSKContent() {
  let html = '';
  try {
    const [tilhoersforhold, personer] = await Promise.all([tilhoersforholdApi.getAll(), personerApi.getAll()]);
    html += `<div class="flex items-center justify-between mb-3"><div class="flex items-center gap-3">${icons.target}<h2 style="font-size:16px;font-weight:600">Tilhørsforhold</h2><span style="font-size:12px;color:var(--muted-fg)">${tilhoersforhold.length} registreringer</span></div><button class="btn btn-primary btn-sm" onclick="showTilhoersforholdForm()">${icons.plus} Tilføj</button></div>`;
    const bander = {};
    tilhoersforhold.forEach(t => { if(!bander[t.bande])bander[t.bande]=[]; bander[t.bande].push(t); });
    for (const [bande, members] of Object.entries(bander)) {
      html += `<div class="card mb-2" style="padding:0;overflow:hidden;border-left:3px solid var(--destructive)"><div class="accordion-header" onclick="this.nextElementSibling.classList.toggle('open')"><div class="flex items-center gap-2"><span style="font-size:14px;font-weight:600">${bande}</span><span class="badge badge-destructive">${members.length}</span></div><span style="color:var(--muted-fg)">▼</span></div><div class="accordion-body">`;
      members.forEach(m => {
        html += `<div style="padding:10px 16px;border-top:1px solid rgba(42,47,58,.5)"><div class="flex items-center justify-between"><div><span style="font-size:13px;font-weight:500">${m.personNavn||"Ukendt"}</span> <span class="mono" style="font-size:10px;color:var(--muted-fg)">${m.personCpr||""}</span></div><div class="flex items-center gap-2"><span class="badge badge-muted">${m.rolle||"Medlem"}</span><span class="badge ${m.status==="aktiv"?"badge-success":"badge-muted"}">${m.status||"aktiv"}</span>${isAdmin?`<button class="btn btn-ghost btn-sm" style="color:var(--destructive)" onclick="deleteTilhoersforhold('${m.id}')">✕</button>`:''}</div></div></div>`;
      });
      html += '</div></div>';
    }
    if(Object.keys(bander).length===0) html+='<div class="loading-center" style="min-height:200px"><p>Ingen tilhørsforhold registreret</p></div>';
    window._nskPersoner = personer;
  } catch { html += '<p style="color:var(--muted-fg)">Kunne ikke indlæse data</p>'; }
  return html;
}

async function renderAfdelingsIndhold(container, contentId, isLeder) {
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div></div>';
  try {
    const indhold = await afdelingsIndholdApi.getAll(contentId);
    let html = '';
    if (isLeder) html += `<div style="text-align:right;margin-bottom:12px"><button class="btn btn-primary btn-sm" onclick="showAfdelingsIndholdForm('${contentId}')">${icons.plus} Tilføj opslag</button></div>`;
    
    const sorted = [...indhold].sort((a,b) => {
      if (a.pinned !== b.pinned) return (a.pinned?-1:1);
      return new Date(b.oprettetDato||0).getTime() - new Date(a.oprettetDato||0).getTime();
    });
    
    sorted.forEach(item => {
      const typeColors = {info:"badge-primary",mission:"badge-warning",vigtig:"badge-destructive",notat:"badge-muted",taktisk:"badge-warning",vagtplan:"badge-success",udstyr:"badge-primary",nyhed:"badge-warning"};
      const typeLabels = {info:"Information",mission:"Mission",vigtig:"Vigtig",notat:"Notat",taktisk:"Taktisk plan",vagtplan:"Vagtplan",udstyr:"Udstyr",nyhed:"Nyhed"};
      html += `<div class="card card-sm mb-2" style="${item.pinned?'border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.03)':''}"><div class="flex items-center justify-between mb-1"><div class="flex items-center gap-2">${item.pinned?icons.pin:''}<span class="badge ${typeColors[item.type]||'badge-muted'}">${typeLabels[item.type]||item.type||"info"}</span><span style="font-size:12px;font-weight:600">${item.titel}</span></div>`;
      if (isLeder) html += `<div class="flex gap-1"><button class="btn btn-ghost btn-sm" onclick="togglePinIndhold('${item.id}',${item.pinned?0:1},'${contentId}')">${icons.pin}</button><button class="btn btn-ghost btn-sm" onclick="editAfdelingsIndhold('${item.id}','${contentId}')">${icons.pencil}</button><button class="btn btn-ghost btn-sm" style="color:var(--destructive)" onclick="deleteAfdelingsIndhold('${item.id}','${contentId}')">✕</button></div>`;
      html += `</div><p style="font-size:12px;color:var(--muted-fg);white-space:pre-wrap;line-height:1.6">${item.indhold||""}</p><div style="font-size:9px;color:var(--muted-fg);margin-top:6px">${item.oprettetAf||"—"} — ${item.oprettetDato?new Date(item.oprettetDato).toLocaleDateString("da-DK"):"—"}${item.opdateretDato?' (redigeret)':''}</div></div>`;
    });
    if(sorted.length===0&&!isLeder) html+='<div class="loading-center" style="min-height:100px"><p style="font-size:12px;color:var(--muted-fg)">Ingen opslag endnu</p></div>';
    if(sorted.length===0&&isLeder) html+='<div class="text-center" style="padding:32px"><p style="font-size:12px;color:var(--muted-fg)">Ingen opslag endnu</p><p style="font-size:10px;color:var(--muted-fg);margin-top:4px">Klik "Tilføj opslag" for at komme i gang</p></div>';
    container.innerHTML = html;
  } catch { container.innerHTML = '<p style="color:var(--muted-fg)">Kunne ikke indlæse indhold</p>'; }
}

window.setAfdTab = function(afdId, tabId) { window._afdActiveTab[afdId] = tabId; renderPage(activeTabId); };
window.addAfdTab = function(afdId) {
  const name = prompt("Tab navn:");
  if (!name) return;
  const tabsKey = `afd_tabs_${afdId}`;
  let tabs = JSON.parse(localStorage.getItem(tabsKey)||"null") || afdelingDefaultTabs[afdId] || [];
  tabs.push({id:`custom_${Date.now()}`,label:name,removable:true});
  localStorage.setItem(tabsKey, JSON.stringify(tabs));
  window._afdActiveTab[afdId] = tabs[tabs.length-1].id;
  renderPage(activeTabId);
};
window.removeAfdTab = function(afdId, tabId) {
  if(!confirm("Fjern denne tab?"))return;
  const tabsKey = `afd_tabs_${afdId}`;
  let tabs = JSON.parse(localStorage.getItem(tabsKey)||"null") || afdelingDefaultTabs[afdId] || [];
  tabs = tabs.filter(t=>t.id!==tabId);
  localStorage.setItem(tabsKey, JSON.stringify(tabs));
  if(window._afdActiveTab[afdId]===tabId) window._afdActiveTab[afdId]=tabs[0]?.id||"tavle";
  renderPage(activeTabId);
};

window.showTilhoersforholdForm = function() {
  const overlay = el("div",{className:"dialog-overlay",onclick:e=>{if(e.target===overlay)overlay.remove();}});
  overlay.innerHTML = `<div class="dialog"><div class="dialog-title">Tilføj tilhørsforhold</div><div class="label">Søg person</div><input class="input mb-2" id="th-search" placeholder="Søg navn eller CPR..."><div id="th-person-results" style="max-height:120px;overflow-y:auto;margin-bottom:8px"></div><div id="th-selected" style="font-size:12px;color:var(--success);margin-bottom:8px"></div><div class="label">Gruppering / Bande</div><input class="input mb-2" id="th-bande" placeholder="Navn på gruppering..."><div class="grid grid-2 gap-2 mb-2"><div><div class="label">Rolle</div><select class="select w-full" id="th-rolle"><option value="Medlem">Medlem</option><option value="Leder">Leder</option><option value="Prospect">Prospect</option><option value="Associeret">Associeret</option></select></div><div><div class="label">Status</div><select class="select w-full" id="th-status"><option value="aktiv">Aktiv</option><option value="inaktiv">Inaktiv</option><option value="tidligere">Tidligere</option></select></div></div><div class="flex gap-2"><button class="btn btn-primary" id="th-submit">Tilføj</button><button class="btn btn-outline" onclick="this.closest('.dialog-overlay').remove()">Annuller</button></div></div>`;
  document.body.appendChild(overlay);
  let selectedPerson = null;
  document.getElementById("th-search").addEventListener("input", e=>{
    const q=e.target.value.toLowerCase();const results=document.getElementById("th-person-results");
    if(q.length<2){results.innerHTML="";return;}
    const matches=(window._nskPersoner||[]).filter(p=>`${p.fornavn} ${p.efternavn} ${p.cpr}`.toLowerCase().includes(q)).slice(0,8);
    results.innerHTML=matches.map(p=>`<div class="list-item" style="padding:4px 8px;cursor:pointer" data-id="${p.id}" data-cpr="${p.cpr}" data-navn="${p.fornavn} ${p.efternavn}"><span style="font-size:12px">${p.fornavn} ${p.efternavn}</span> <span class="mono" style="font-size:10px;color:var(--muted-fg)">${p.cpr}</span></div>`).join("");
    results.querySelectorAll(".list-item").forEach(item=>{
      item.addEventListener("click",()=>{
        selectedPerson={id:item.dataset.id,cpr:item.dataset.cpr,navn:item.dataset.navn};
        document.getElementById("th-selected").textContent="Valgt: "+selectedPerson.navn;
        results.innerHTML="";document.getElementById("th-search").value=selectedPerson.navn;
      });
    });
  });
  document.getElementById("th-submit").addEventListener("click", async ()=>{
    if(!selectedPerson){showToast("Vælg en person");return;}
    const bande=document.getElementById("th-bande").value;if(!bande){showToast("Udfyld gruppering");return;}
    const t={id:Date.now().toString(),personId:selectedPerson.id,personCpr:selectedPerson.cpr,personNavn:selectedPerson.navn,bande,rolle:document.getElementById("th-rolle").value,status:document.getElementById("th-status").value,oprettetAf:`${currentUser.fornavn} ${currentUser.efternavn}`,oprettetDato:new Date().toISOString().split("T")[0]};
    try{await tilhoersforholdApi.create(t);showToast("Tilhørsforhold tilføjet");overlay.remove();renderPage(activeTabId);}catch(e){showToast("Fejl: "+e.message);}
  });
};

window.deleteTilhoersforhold = async function(id) {
  if(!confirm("Slet tilhørsforhold?"))return;
  try{await tilhoersforholdApi.remove(id);showToast("Slettet");renderPage(activeTabId);}catch(e){showToast("Fejl: "+e.message);}
};

// ═══ EFTERLYSNING FRA PERSON (QUICK) ═══
window.markEftersoegt = async function(id) {
  const p = window._krPersoner.find(pp=>pp.id===id);
  if (!p) return;
  const newStatus = p.status === "eftersøgt" ? "aktiv" : "eftersøgt";
  if (!confirm(`${newStatus==="eftersøgt"?"Efterlys":"Fjern efterlysning for"} ${p.fornavn} ${p.efternavn}?`)) return;
  try { await personerApi.update(id, {status:newStatus}); showToast(newStatus==="eftersøgt"?"Person efterlyst":"Efterlysning fjernet"); renderPage(activeTabId); } catch(e) { showToast("Fejl: "+e.message); }
};
</script>
