  <style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

:root {
  --bg: #161a22; --fg: #d4dae4; --card: #1c2029; --card-fg: #d4dae4;
  --primary: #3b82f6; --primary-fg: #fff; --secondary: #252a35; --secondary-fg: #a0aab8;
  --muted: #1e222b; --muted-fg: #6b7585; --accent: #2097a6; --accent-fg: #fff;
  --destructive: #d6364b; --destructive-fg: #fff; --border: #2a2f3a; --input: #2a2f3a;
  --ring: #3b82f6; --radius: 0.5rem; --warning: #e0642a; --warning-fg: #fff;
  --success: #33a06a; --success-fg: #fff;
  --sidebar-bg: #131620; --sidebar-fg: #9ba5b5; --sidebar-border: #252a35;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Space Grotesk', sans-serif; background: #000; color: var(--fg); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
input, textarea, select, button { font-family: inherit; }
.mono { font-family: 'IBM Plex Mono', monospace; }

/* ── Layout ── */
#app { width: 100vw; height: 100vh; padding: 8px; }
.app-shell { width: 100%; height: 100%; border-radius: 16px; background: var(--bg); overflow: hidden; border: 1px solid rgba(59,130,246,.2); display: flex; position: relative; }

/* ── Login ── */
#login-page { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; }
#login-page .bg-img { position: absolute; inset: 0; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); }
#login-page .overlay { position: absolute; inset: 0; background: rgba(0,0,0,.6); }
.login-card { position: relative; z-index: 1; width: 100%; max-width: 360px; padding: 32px; }
.login-logo { width: 80px; height: 80px; border: 1px solid rgba(59,130,246,.2); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; cursor: pointer; border-radius: 12px; background: rgba(59,130,246,.05); }
.login-logo svg { width: 40px; height: 40px; color: var(--primary); }
.login-title { text-align: center; color: #fff; font-size: 20px; font-weight: 700; letter-spacing: .05em; }
.login-sub { text-align: center; color: var(--primary); font-size: 10px; letter-spacing: .3em; margin-top: 4px; }
.login-matched { text-align: center; margin: 12px 0; color: rgba(255,255,255,.8); font-size: 14px; }
.login-matched small { display: block; color: rgba(59,130,246,.6); font-size: 11px; }
.login-field { position: relative; margin-bottom: 12px; }
.login-field svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: rgba(59,130,246,.4); }
.login-field input { width: 100%; height: 44px; background: transparent; border: 1px solid rgba(255,255,255,.15); color: #fff; padding: 0 12px 0 40px; border-radius: 12px; font-size: 13px; text-align: center; outline: none; }
.login-field input::placeholder { color: rgba(255,255,255,.3); }
.login-field input:focus { border-color: rgba(59,130,246,.5); }
.login-btn { width: 100%; height: 44px; border-radius: 12px; background: var(--primary); color: #fff; font-size: 13px; font-weight: 600; border: none; cursor: pointer; letter-spacing: .1em; margin-top: 20px; }
.login-btn:hover { background: #4b90f7; }
.login-btn:disabled { opacity: .5; cursor: default; }
.login-error { text-align: center; color: #f87171; font-size: 11px; margin-top: 12px; }
.login-footer { text-align: center; color: rgba(255,255,255,.2); font-size: 9px; letter-spacing: .2em; margin-top: 16px; }

/* ── Sidebar ── */
.sidebar { width: 224px; background: var(--sidebar-bg); border-right: 1px solid var(--sidebar-border); display: flex; flex-direction: column; height: 100%; flex-shrink: 0; }
.sidebar-logo { padding: 14px 16px; border-bottom: 1px solid var(--sidebar-border); display: flex; align-items: center; gap: 10px; }
.sidebar-logo-icon { width: 32px; height: 32px; border-radius: 8px; background: rgba(59,130,246,.1); border: 1px solid rgba(59,130,246,.2); display: flex; align-items: center; justify-content: center; color: var(--primary); }
.sidebar-logo-text { font-size: 13px; font-weight: 700; color: var(--fg); line-height: 1; }
.sidebar-logo-text small { display: block; font-size: 9px; color: var(--primary); letter-spacing: .2em; font-weight: 500; }
.sidebar-nav { flex: 1; padding: 8px; overflow-y: auto; }
.sidebar-section-label { font-size: 9px; font-weight: 600; color: rgba(59,130,246,.6); text-transform: uppercase; letter-spacing: .2em; padding: 0 8px; margin-bottom: 6px; margin-top: 8px; }
.sidebar-divider { margin: 10px 8px; height: 1px; background: linear-gradient(to right, rgba(59,130,246,.2), var(--sidebar-border), transparent); }
.sidebar-item { width: 100%; display: flex; align-items: center; gap: 10px; padding: 6px 10px; border-radius: 8px; font-size: 12px; color: var(--muted-fg); background: transparent; border: 1px solid transparent; cursor: pointer; transition: all .15s; text-align: left; }
.sidebar-item:hover { color: var(--fg); background: var(--secondary); }
.sidebar-item.active { background: rgba(59,130,246,.1); color: var(--primary); font-weight: 600; border-color: rgba(59,130,246,.15); }
.sidebar-item.active::after { content: ""; width: 4px; height: 4px; border-radius: 50%; background: var(--primary); margin-left: auto; }
.sidebar-item svg { width: 14px; height: 14px; flex-shrink: 0; }
.sidebar-bottom { border-top: 1px solid var(--sidebar-border); padding: 8px; }
.sidebar-user { padding: 10px 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-radius: 8px; transition: background .15s; }
.sidebar-user:hover { background: var(--secondary); }
.sidebar-user-avatar { width: 32px; height: 32px; border-radius: 8px; background: rgba(59,130,246,.1); border: 1px solid rgba(59,130,246,.2); display: flex; align-items: center; justify-content: center; color: var(--primary); flex-shrink: 0; overflow: hidden; }
.sidebar-user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.sidebar-user-info { flex: 1; min-width: 0; }
.sidebar-user-name { font-size: 11px; font-weight: 600; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-user-rank { font-size: 9px; color: var(--muted-fg); }
.sidebar-user-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

.sidebar-popup { position: absolute; bottom: 56px; left: 4px; right: 4px; background: var(--card); border: 1px solid rgba(59,130,246,.15); border-radius: 12px; padding: 10px; z-index: 50; box-shadow: 0 10px 40px rgba(0,0,0,.5); }
.sidebar-popup-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 8px; font-size: 12px; color: var(--fg); cursor: pointer; width: 100%; background: transparent; border: none; text-align: left; }
.sidebar-popup-item:hover { background: var(--muted); }
.sidebar-popup-item.logout:hover { color: var(--destructive); }
.sidebar-popup-divider { margin: 4px 0; border: none; border-top: 1px solid var(--border); }

/* ── Main Content ── */
.main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.top-header { height: 40px; padding: 0 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; background: rgba(28,32,41,.6); backdrop-filter: blur(8px); flex-shrink: 0; }
.top-header-search { position: relative; flex: 1; max-width: 320px; }
.top-header-search input { width: 100%; height: 28px; padding: 0 10px 0 30px; background: rgba(30,34,43,.4); border: 1px solid var(--border); border-radius: 8px; color: var(--fg); font-size: 12px; outline: none; }
.top-header-search input:focus { border-color: var(--primary); }
.top-header-search svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--muted-fg); }
.top-header-spacer { flex: 1; }
.top-header-badge { font-size: 10px; color: var(--primary); padding: 2px 8px; background: rgba(59,130,246,.08); border: 1px solid rgba(59,130,246,.1); border-radius: 4px; font-weight: 500; }
.top-header-status { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--muted-fg); }
.top-header-status svg { width: 12px; height: 12px; color: var(--success); }
.top-header-time { display: flex; align-items: center; gap: 8px; }
.top-header-date { font-size: 10px; color: var(--muted-fg); }
.top-header-clock { font-size: 13px; font-weight: 700; color: var(--primary); letter-spacing: .05em; }

/* ── Tabs Bar ── */
.tabs-bar { height: 32px; display: flex; align-items: center; gap: 2px; padding: 0 4px; background: rgba(28,32,41,.3); border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; }
.tab-btn { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; color: var(--muted-fg); background: transparent; border: 1px solid transparent; cursor: pointer; white-space: nowrap; transition: all .15s; }
.tab-btn:hover { color: var(--fg); background: var(--muted); }
.tab-btn.active { color: var(--primary); background: rgba(59,130,246,.15); font-weight: 600; border-color: rgba(59,130,246,.2); }
.tab-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
.tab-close { margin-left: 4px; width: 14px; height: 14px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--muted-fg); cursor: pointer; background: transparent; border: none; opacity: 0; transition: opacity .15s; }
.tab-btn:hover .tab-close, .tab-btn.active .tab-close { opacity: 1; }
.tab-close:hover { background: rgba(214,54,75,.15); color: var(--destructive); }

/* ── Content Area ── */
.content-area { flex: 1; overflow-y: auto; padding: 16px; }
.content-area .page { display: none; }
.content-area .page.active { display: block; }

/* ── Cards & Sections ── */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.card-sm { padding: 12px 16px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-title { font-size: 14px; font-weight: 600; color: var(--fg); }
.section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .2em; color: var(--muted-fg); margin-bottom: 8px; }

/* ── Form Elements ── */
.input { width: 100%; height: 32px; padding: 0 10px; background: var(--secondary); border: 1px solid var(--border); border-radius: 8px; color: var(--fg); font-size: 12px; outline: none; }
.input:focus { border-color: var(--primary); }
.input-lg { height: 40px; font-size: 13px; }
.textarea { width: 100%; padding: 8px 10px; background: var(--secondary); border: 1px solid var(--border); border-radius: 8px; color: var(--fg); font-size: 12px; outline: none; resize: vertical; min-height: 80px; }
.textarea:focus { border-color: var(--primary); }
.select { height: 32px; padding: 0 10px; background: var(--secondary); border: 1px solid var(--border); border-radius: 8px; color: var(--fg); font-size: 12px; outline: none; }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted-fg); display: block; margin-bottom: 4px; }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
.btn-primary { background: var(--primary); color: var(--primary-fg); }
.btn-primary:hover { opacity: .9; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--fg); }
.btn-outline:hover { background: var(--muted); }
.btn-destructive { background: var(--destructive); color: var(--destructive-fg); }
.btn-destructive:hover { opacity: .9; }
.btn-sm { padding: 4px 8px; font-size: 11px; }
.btn-ghost { background: transparent; color: var(--muted-fg); border: none; }
.btn-ghost:hover { color: var(--fg); background: var(--muted); }
.btn:disabled { opacity: .5; cursor: default; }

/* ── Badges ── */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 100px; font-size: 10px; font-weight: 500; }
.badge-primary { background: rgba(59,130,246,.15); color: var(--primary); }
.badge-warning { background: rgba(224,100,42,.15); color: var(--warning); }
.badge-destructive { background: rgba(214,54,75,.15); color: var(--destructive); }
.badge-success { background: rgba(51,160,106,.15); color: var(--success); }
.badge-muted { background: var(--muted); color: var(--muted-fg); }

/* ── Grid helpers ── */
.grid { display: grid; gap: 16px; }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.gap-4 { gap: 16px; }
.flex-1 { flex: 1; min-width: 0; }
.shrink-0 { flex-shrink: 0; }
.text-center { text-align: center; }
.hidden { display: none !important; }
.mt-2 { margin-top: 8px; }
.mt-3 { margin-top: 12px; }
.mb-2 { margin-bottom: 8px; }
.mb-3 { margin-bottom: 12px; }
.w-full { width: 100%; }

/* ── Toast ── */
.toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; font-size: 12px; color: var(--fg); z-index: 999; animation: toastIn .3s ease, toastOut .3s ease 2.7s forwards; box-shadow: 0 10px 30px rgba(0,0,0,.4); }
@keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* ── Stat Card ── */
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; position: relative; overflow: hidden; }
.stat-card .accent-bar { position: absolute; top: 0; left: 0; width: 3px; height: 100%; border-radius: 12px 0 0 12px; }
.stat-card .stat-value { font-size: 18px; font-weight: 700; }
.stat-card .stat-label { font-size: 10px; color: var(--muted-fg); }

/* ── Dialog ── */
.dialog-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 90; display: flex; align-items: center; justify-content: center; }
.dialog { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; min-width: 360px; max-width: 500px; max-height: 85vh; overflow-y: auto; z-index: 91; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
.dialog-title { font-size: 16px; font-weight: 600; color: var(--fg); margin-bottom: 16px; }

/* ── List Items ── */
.list-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-bottom: 1px solid rgba(42,47,58,.5); cursor: pointer; transition: background .1s; }
.list-item:hover { background: rgba(255,255,255,.03); }
.list-item.active { background: rgba(59,130,246,.08); border-left: 2px solid var(--primary); }
.list-item-avatar { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.list-item-content { flex: 1; min-width: 0; }
.list-item-title { font-size: 12px; font-weight: 500; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-item-sub { font-size: 10px; color: var(--muted-fg); }

/* ── Split Layout ── */
.split-layout { display: flex; height: 100%; gap: 0; }
.split-left { width: 260px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.split-right { flex: 1; overflow-y: auto; padding: 24px; }

/* ── Table ── */
.table-header { display: grid; padding: 8px 16px; background: rgba(37,42,53,.8); font-size: 10px; font-weight: 600; text-transform: uppercase; color: var(--muted-fg); }
.table-row { display: grid; padding: 10px 16px; border-top: 1px solid rgba(42,47,58,.5); font-size: 13px; cursor: pointer; transition: background .1s; }
.table-row:hover { background: rgba(255,255,255,.03); }

/* ── Accordion ── */
.accordion-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: rgba(37,42,53,.8); cursor: pointer; transition: background .1s; }
.accordion-header:hover { background: var(--secondary); }
.accordion-body { padding: 0; max-height: 0; overflow: hidden; transition: max-height .3s ease; }
.accordion-body.open { max-height: 2000px; }

/* ── Dot status ── */
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-success { background: var(--success); }
.dot-warning { background: var(--warning); }
.dot-destructive { background: var(--destructive); }
.dot-primary { background: var(--primary); }

/* ── Alert Banner ── */
.alert-banner { display: flex; align-items: center; gap: 8px; padding: 12px; border-radius: 8px; font-size: 12px; font-weight: 500; }
.alert-warning { background: rgba(224,100,42,.08); border: 1px solid rgba(224,100,42,.15); color: var(--warning); }

/* ── Loading ── */
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-center { display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 300px; color: var(--muted-fg); font-size: 13px; }

/* ── Info Field ── */
.info-field { margin-bottom: 8px; }
.info-field .info-label { font-size: 10px; color: var(--muted-fg); margin-bottom: 2px; }
.info-field .info-value { font-size: 13px; font-weight: 500; color: var(--fg); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted-fg); }
  </style>
</head>

}

  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "className") e.className = v;
    else if (k === "onclick") e.addEventListener("click", v);
    else if (k === "innerHTML") e.innerHTML = v;
    else if (k === "textContent") e.textContent = v;
    else if (k === "style") Object.assign(e.style, v);
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (typeof c === "string") e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  }
  return e;
}

// ═══ LOGIN ═══
let loginTapCount = 0, loginLastTap = 0;
document.addEventListener("DOMContentLoaded", () => {
  const badgeInput = $("#login-badge");
  const passInput = $("#login-password");
  const loginBtn = $("#login-btn");
  const errorDiv = $("#login-error");
  const matchedDiv = $("#login-matched");
  const logoTap = $("#login-logo-tap");

  let debounceTimer;
  badgeInput.addEventListener("input", () => {
    clearTimeout(debounceTimer);
    if (badgeInput.value.length < 2) { matchedDiv.classList.add("hidden"); return; }
    debounceTimer = setTimeout(async () => {
      try {
        const b = await betjenteApi.getByBadge(badgeInput.value);
        if (b) { matchedDiv.innerHTML = `${b.fornavn} ${b.efternavn}<small class="mono">${b.rang}</small>`; matchedDiv.classList.remove("hidden"); }
        else matchedDiv.classList.add("hidden");
      } catch { matchedDiv.classList.add("hidden"); }
    }, 300);
  });

  logoTap.addEventListener("click", () => {
    const now = Date.now();
    if (now - loginLastTap < 500) { loginTapCount++; if (loginTapCount >= 2) { badgeInput.value = "ADM221"; passInput.value = "OverKommando99"; loginTapCount = 0; } }
    else loginTapCount = 0;
    loginLastTap = now;
  });

  async function doLogin() {
    if (!badgeInput.value || !passInput.value) { errorDiv.textContent = "Udfyld begge felter"; errorDiv.classList.remove("hidden"); return; }
    loginBtn.disabled = true; loginBtn.textContent = "LOGGER IND...";
    try {
      const betjent = await betjenteApi.getByBadge(badgeInput.value);
      if (!betjent) { errorDiv.textContent = "Badge nummer ikke fundet"; errorDiv.classList.remove("hidden"); loginBtn.disabled = false; loginBtn.textContent = "LOG IND"; return; }
      if (passInput.value !== betjent.kodeord) { errorDiv.textContent = "Forkert adgangskode"; errorDiv.classList.remove("hidden"); loginBtn.disabled = false; loginBtn.textContent = "LOG IND"; return; }
      currentUser = betjent;
      isAdmin = betjent.rang === "Administrator";
      errorDiv.classList.add("hidden");
      $("#login-page").classList.add("hidden");
      $("#app").classList.remove("hidden");
      initApp();
    } catch (err) {
      errorDiv.textContent = "Fejl: " + (err.message || "Ukendt"); errorDiv.classList.remove("hidden");
      loginBtn.disabled = false; loginBtn.textContent = "LOG IND";
    }
  }

  loginBtn.addEventListener("click", doLogin);
  passInput.addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
  badgeInput.addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
});

  $("#sidebar-userrole").textContent = isAdmin ? "ADMIN" : currentUser.rang;

// ═══ SIDEBAR ═══
function renderSidebar() {
  const nav = $("#sidebar-nav");
  nav.innerHTML = "";
  sidebarSections.forEach((section, i) => {
    if (i > 0) nav.appendChild(el("div", { className: "sidebar-divider" }));
    nav.appendChild(el("div", { className: "sidebar-section-label mono", textContent: section.label }));
    section.items.forEach(item => {
      const btn = el("button", {

        innerHTML: `${icons[item.icon] || ""} <span>${item.label}</span>`,
        onclick: () => openTab(item.id),
      });
      nav.appendChild(btn);
    });
  });

  const visibleAfd = isAdmin ? afdelinger : afdelinger.filter(a => (currentUser.afdeling || "").toLowerCase().includes(a.id));
  if (visibleAfd.length > 0) {
    nav.appendChild(el("div", { className: "sidebar-divider" }));

  `;

  const linksDiv = el("div", { className: "sidebar-links", innerHTML: linksHtml });
  bottom.insertBefore(linksDiv, bottom.firstChild);
}

// ═══ TAB MANAGEMENT ═══
function openTab(type, data) {
  if (type === "opret_sag") type = "sag";
  if (type === "sag") {
    const id = `sag-${data?.sagId || Date.now()}`;
    if (!openTabs.find(t => t.id === id)) { openTabs.push({ id, label: data?.label || "Ny Sag", type: "sag", data }); }
    activeTabId = id;
  } else {
    const existing = openTabs.find(t => t.type === type);
    if (existing) { activeTabId = existing.id; }
    else { openTabs.push({ id: type, label: tabLabels[type] || type, type }); activeTabId = type; }
  }
  renderTabs(); renderSidebar(); renderPage(activeTabId);
}

function closeTab(id) {
  if (id === "forside") return;
  const idx = openTabs.findIndex(t => t.id === id);
  openTabs = openTabs.filter(t => t.id !== id);
  if (activeTabId === id) { activeTabId = openTabs[Math.min(idx, openTabs.length - 1)]?.id || "forside"; }
  renderTabs(); renderSidebar(); renderPage(activeTabId);
}

function renderTabs() {
  const bar = $("#tabs-bar");
  bar.innerHTML = "";
  openTabs.forEach(tab => {
    const btn = el("button", {
      className: `tab-btn ${tab.id === activeTabId ? "active" : ""}`,
      onclick: () => { activeTabId = tab.id; renderTabs(); renderSidebar(); renderPage(tab.id); },
    }, [document.createTextNode(tab.label)]);
    if (tab.id !== "forside") {
      const closeBtn = el("button", { className: "tab-close", innerHTML: icons.x, onclick: (e) => { e.stopPropagation(); closeTab(tab.id); } });
      btn.appendChild(closeBtn);
    }
    bar.appendChild(btn);
  });
}

// ═══ PAGE RENDERING ═══
function renderPage(tabId) {
  const area = $("#content-area");
  area.innerHTML = "";
  const tab = openTabs.find(t => t.id === tabId);
  if (!tab) return;
  switch (tab.type) {
    case "forside": renderDashboard(area); break;
    case "opslagstavle": renderOpslagstavle(area); break;
    case "kr": renderPersonregister(area); break;
    case "koeretoej": renderKoeretoejsregister(area); break;
    case "ejendomme": renderEjendomsregister(area); break;
    case "efterlysninger": renderEfterlysninger(area); break;
    case "sag": renderSagEditor(area, tab.data); break;
    case "boeder": renderBodetakster(area); break;
    case "fartberegner": renderFartberegner(area); break;
    case "sagsarkiv": renderSagsarkiv(area); break;
    case "flaade": renderFlaade(area); break;
    case "ansatte": renderAnsatte(area); break;
    case "profil": renderProfil(area); break;
    case "kort": renderKort(area); break;
    case "ansoegninger": renderAnsoegninger(area); break;
    case "nsk": renderNSK(area); break;
    case "lima": case "faerdsel": case "efterforskning": case "sig": case "remeo":
      renderAfdeling(area, tab.type); break;
    default: area.innerHTML = `<div class="loading-center"><p>Siden "${tab.label}" kommer snart</p></div>`;
  }
}

async function renderPersonregister(container) {
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div><span>Indlæser personer...</span></div>';
  try {
    const [personer, sigtelser] = await Promise.all([personerApi.getAll(), sigtelserApi.getAll()]);
    const statusDots = { aktiv: "dot-success", eftersøgt: "dot-warning", anholdt: "dot-destructive", sigtet: "dot-primary" };
    let html = `<div class="split-layout" style="height:calc(100vh - 140px)"><div class="split-left"><div style="padding:12px;border-bottom:1px solid var(--border)" class="flex gap-2"><div style="position:relative;flex:1"><input class="input" id="kr-search" placeholder="Søg navn eller CPR..." style="padding-left:32px">${icons.search.replace('width="14"','width="14" style="position:absolute;left:8px;top:8px;color:var(--muted-fg)"')}</div><button class="btn btn-primary btn-sm" onclick="showPersonForm()">+</button></div><div id="kr-list" style="flex:1;overflow-y:auto">`;
    personer.forEach(p => {
      const pSig = sigtelser.filter(s => s.personId === p.id);
      html += `<div class="list-item" onclick="selectPerson('${p.id}')"><div class="dot ${statusDots[p.status] || 'dot-success'}"></div><div class="list-item-content"><div class="list-item-title">${p.fornavn} ${p.efternavn}</div><div class="list-item-sub mono">${p.cpr}</div></div>${pSig.length > 0 ? `<span style="font-size:9px;color:var(--muted-fg)">${pSig.length}</span>` : ""}</div>`;
    });
    if (personer.length === 0) html += '<p style="text-align:center;padding:32px;font-size:12px;color:var(--muted-fg)">Ingen personer</p>';
    html += `</div></div><div class="split-right" id="kr-detail"><div class="loading-center" style="min-height:200px"><p>Vælg en person fra listen</p></div></div></div>`;
    container.innerHTML = html;
    document.getElementById("kr-search").addEventListener("input", (e) => {

// ═══ FARTBEREGNER ═══
function beregnFartboede(hastighed, graense, vejtype, vejarbejde) {
  const overskridelse = hastighed - graense;
  if (overskridelse <= 0) return null;
  let boede = 0, klip = 0, frakendelse = "", faengsel = 0;
  if (overskridelse <= 20) { boede = overskridelse <= 10 ? 1000 : 1500; }
  else if (overskridelse <= 30) { boede = 2000; klip = 1; }
  else if (overskridelse <= 40) { boede = 3000; klip = 1; }
  else if (overskridelse <= 50) { boede = 4000; klip = 2; frakendelse = "Betinget"; }
  else if (overskridelse <= 60) { boede = 5000; klip = 3; frakendelse = "Betinget"; }
  else { boede = 6000 + (overskridelse - 60) * 100; klip = 3; frakendelse = "Ubetinget"; faengsel = Math.max(0, Math.floor((overskridelse - 100) / 10)); }
  if (vejarbejde) { boede = Math.round(boede * 1.5); }
  return { overskridelse, boede, klip, frakendelse, faengsel };
}

function renderFartberegner(container) {
  const vtc = { by: { label: "Byzone", graenser: [30,40,50,60,70] }, landevej: { label: "Landevej", graenser: [60,70,80,90] }, motorvej: { label: "Motorvej", graenser: [80,90,100,110,120,130] } };
  let vt = "by", gr = 50, vejarbejde = false;
  function render() {
    let html = `<div style="max-width:600px"><div class="flex items-center gap-3 mb-3">${icons.gauge}<h1 style="font-size:18px;font-weight:700">Fartberegner</h1></div>`;
    html += `<div class="card mb-3"><div class="label">Vejtype</div><div class="grid grid-3 gap-2 mb-3">`;
    ["by","landevej","motorvej"].forEach(v => { html += `<button class="btn ${vt === v ? 'btn-primary' : 'btn-outline'}" id="fb-vt-${v}">${vtc[v].label}</button>`; });
    html += `</div><div class="label">Hastighedsgrænse</div><div class="flex gap-2 mb-3" style="flex-wrap:wrap">`;
    vtc[vt].graenser.forEach(g => { html += `<button style="width:48px;height:48px;border-radius:50%;border:2px solid ${gr === g ? 'var(--destructive)' : 'var(--border)'};background:${gr === g ? 'rgba(214,54,75,.1)' : 'transparent'};color:${gr === g ? 'var(--destructive)' : 'var(--muted-fg)'};font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center" id="fb-gr-${g}">${g}</button>`; });
    html += `</div><div class="label">Målt hastighed (km/t)</div><input class="input input-lg mb-3" type="number" id="fb-hastighed" placeholder="Indtast hastighed..."><div class="flex items-center gap-2 mb-3"><input type="checkbox" id="fb-vejarbejde" ${vejarbejde?'checked':''}><label for="fb-vejarbejde" style="font-size:12px;color:var(--fg)">Vejarbejde (50% tillæg)</label></div><button class="btn btn-primary w-full" id="fb-beregn">Beregn bøde</button></div><div id="fb-result"></div></div>`;
    container.innerHTML = html;
    ["by","landevej","motorvej"].forEach(v => document.getElementById("fb-vt-"+v)?.addEventListener("click",()=>{vt=v;gr=vtc[v].graenser[Math.floor(vtc[v].graenser.length/2)];render();}));
    vtc[vt].graenser.forEach(g => document.getElementById("fb-gr-"+g)?.addEventListener("click",()=>{gr=g;render();}));
    document.getElementById("fb-vejarbejde")?.addEventListener("change",(e)=>{vejarbejde=e.target.checked;});
    document.getElementById("fb-beregn")?.addEventListener("click",()=>{
      const val=parseInt(document.getElementById("fb-hastighed")?.value);if(isNaN(val)){showToast("Indtast en hastighed");return;}
      const res=beregnFartboede(val,gr,vt,vejarbejde);const rd=document.getElementById("fb-result");
      if(!res){rd.innerHTML=`<div class="card text-center"><p style="color:var(--success);font-size:14px;font-weight:600">✅ Ingen overskridelse</p></div>`;return;}
      rd.innerHTML=`<div class="card"><div class="grid grid-4 gap-3 mb-3" style="text-align:center"><div><p class="label">Overskridelse</p><p style="font-size:20px;font-weight:700;color:var(--destructive)">+${res.overskridelse} km/t</p></div><div><p class="label">Bøde</p><p style="font-size:20px;font-weight:700;color:var(--warning)" class="mono">${formatDaDK(res.boede)} kr</p></div><div><p class="label">Klip</p><p style="font-size:20px;font-weight:700;color:var(--primary)">${res.klip}</p></div><div><p class="label">Frakendelse</p><p style="font-size:14px;font-weight:600;color:${res.frakendelse?'var(--destructive)':'var(--muted-fg)'}">${res.frakendelse||"Ingen"}</p></div></div>${res.faengsel>0?`<div class="alert-banner alert-warning">${icons.alert} Fængselsstraf: ${res.faengsel} måned(er)</div>`:''}</div>`;
    });
  }
  render();

    html += `<button class="btn btn-outline btn-sm mb-2" onclick="window._sigTogglePanel()">${icons.plus} Tilføj sigtelse</button>`;

    if (openKat !== null) {
      const keys = [...new Set(standardBoeder.map(b => b.kategori))];
      html += `<div class="card card-sm mb-3" style="max-height:300px;overflow-y:auto"><input class="input mb-2" placeholder="Søg..." oninput="window._sigFilter(this.value)">`;
      keys.forEach(kat => {
        const boeder = standardBoeder.filter(b => b.kategori === kat);
        html += `<div class="sig-kat-group"><div style="padding:6px 8px;background:rgba(37,42,53,.8);font-size:11px;font-weight:600;cursor:pointer;border-radius:4px;margin-bottom:2px" onclick="window._sigKat('${kat}')">${kat} (${boeder.length}) ${openKat===kat?'▼':'▸'}</div>`;
        if (openKat === kat) {
          boeder.forEach(b => {
            html += `<div style="padding:4px 8px;border-top:1px solid rgba(42,47,58,.3);display:flex;align-items:center;justify-content:space-between;font-size:10px"><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.paragraf?b.paragraf+' — ':''}${b.beskrivelse}</span><div class="flex items-center gap-2 shrink-0"><span class="mono" style="color:var(--warning)">${formatDaDK(b.beloeb)} kr</span><button class="btn btn-primary" style="padding:2px 6px;font-size:9px" onclick="window._sigAdd('${b.id}')">+</button></div></div>`;
          });
        }
        html += '</div>';
      });
      html += '</div>';
    }

    html += `<button class="btn btn-outline btn-sm mt-2 mb-3" onclick="window._sigFart()">${icons.gauge} Fartbøde-beregner</button>`;
    if (valgteBoeder.length > 0) {
      html += `<div class="card mb-3" style="padding:0;overflow:hidden">`;
      const grouped = {};
      valgteBoeder.forEach(v => { if (!grouped[v.boedeId]) grouped[v.boedeId] = []; grouped[v.boedeId].push(v); });
      for (const [boedeId, items] of Object.entries(grouped)) {
        const b = items[0], count = items.length;
        html += `<div class="flex items-center justify-between" style="padding:6px 12px;border-top:1px solid rgba(42,47,58,.3);font-size:10px"><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${count > 1 ? `<span style="color:var(--primary);font-weight:600;margin-right:4px">${count}×</span>` : ''}${b.paragraf ? b.paragraf + ' — ' : ''}${b.beskrivelse}</span><div class="flex items-center gap-2 shrink-0">${b.faengselMaaneder > 0 ? `<span style="color:var(--destructive)">${b.faengselMaaneder * count}md</span>` : ''}<span class="mono" style="color:var(--warning)">${formatDaDK(b.beloeb * count)} kr</span><button style="border:none;background:transparent;cursor:pointer;color:var(--muted-fg);font-size:10px" onclick="window._sigRemoveAll('${boedeId}')">✕</button></div></div>`;
      }
      html += `<div class="flex items-center justify-between" style="padding:8px 12px;background:rgba(59,130,246,.05);border-top:1px solid rgba(59,130,246,.15);font-size:10px"><span style="font-weight:600">Total</span><div class="flex items-center gap-3"><span class="mono" style="font-weight:700;color:var(--warning)">${formatDaDK(totalBoede)} kr</span>${totalFaengsel > 0 ? `<span style="font-weight:700;color:var(--destructive)">${totalFaengsel} md.</span>` : ''}${totalKlip > 0 ? `<span class="badge badge-primary">${totalKlip} klip</span>` : ''}</div></div></div>`;
    }
    html += `<div class="label">Hændelsesforløb</div><textarea class="textarea mb-3" id="sig-haendelse" rows="3" placeholder="Beskriv hændelsesforløbet...">${haendelse}</textarea>`;
    html += `<div class="flex gap-2"><button class="btn btn-primary flex-1" onclick="window._sigSubmit()">Opret sigtelse</button><button class="btn btn-outline" onclick="this.closest('.dialog-overlay').remove()">Annuller</button></div></div>`;
    overlay.innerHTML = html;
  }

  window._sigErkender = function(v) { erkender = v; renderDialog(); };
  window._sigFratag = function(v) { fratagKoerekort = v; };
  window._sigTogglePanel = function() { const keys = [...new Set(standardBoeder.map(b => b.kategori))]; openKat = openKat ? null : keys[0]; renderDialog(); };
  window._sigKat = function(kat) { openKat = openKat === kat ? null : kat; renderDialog(); };
  window._sigAdd = function(boedeId) { const b = standardBoeder.find(x => x.id === boedeId); if (b) valgteBoeder.push({ boedeId: b.id, paragraf: b.paragraf, beskrivelse: b.beskrivelse, beloeb: b.beloeb, faengselMaaneder: b.faengselMaaneder || 0 }); renderDialog(); };
  window._sigRemove = function(boedeId) { const idx = valgteBoeder.findIndex(v => v.boedeId === boedeId); if (idx >= 0) valgteBoeder.splice(idx, 1); renderDialog(); };
  window._sigRemoveAll = function(boedeId) { valgteBoeder = valgteBoeder.filter(v => v.boedeId !== boedeId); renderDialog(); };
  window._sigFilter = function(q) { document.querySelectorAll(".sig-kat-group").forEach(g => { let vis = 0; g.querySelectorAll("div[style*='border-top']").forEach(r => { const m = r.textContent.toLowerCase().includes(q.toLowerCase()); r.style.display = m ? "" : "none"; if (m) vis++; }); g.style.display = (q && vis === 0) ? "none" : ""; }); };

  window._sigFart = function() {
    const fo = el("div", { className: "dialog-overlay", style: { zIndex: 100 }, onclick: (e) => { if (e.target === fo) fo.remove(); } });
    const vtc = { by: { label: "Byzone", graenser: [30,40,50,60,70] }, landevej: { label: "Landevej", graenser: [60,70,80,90] }, motorvej: { label: "Motorvej", graenser: [80,90,100,110,120,130] } };
    let vt = "by", gr2 = 50;
    function rf() {
      let h = `<div class="dialog" style="max-width:420px"><div class="dialog-title">${icons.gauge} Fartbøde-beregner</div><div class="label">Vejtype</div><div class="grid grid-3 gap-2 mb-2">`;
      ["by","landevej","motorvej"].forEach(v => { h += `<button class="btn btn-sm ${vt === v ? 'btn-primary' : 'btn-outline'}" id="fv-${v}">${vtc[v].label}</button>`; });
      h += `</div><div class="label">Grænse</div><div class="flex gap-2 mb-2" style="flex-wrap:wrap">`;
      vtc[vt].graenser.forEach(g => { h += `<button style="width:36px;height:36px;border-radius:50%;border:2px solid ${gr2 === g ? 'var(--destructive)' : 'var(--border)'};background:${gr2 === g ? 'rgba(214,54,75,.1)' : 'transparent'};color:${gr2 === g ? 'var(--destructive)' : 'var(--muted-fg)'};font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center" id="fg-${g}">${g}</button>`; });
      h += `</div><div class="label">Hastighed</div><div class="flex gap-2 mb-2"><input class="input flex-1" type="number" id="fv-inp"><button class="btn btn-primary btn-sm" id="fv-calc">Beregn</button></div><div id="fv-res"></div><button class="btn btn-outline mt-3" id="fv-close">Luk</button></div>`;
      fo.innerHTML = h;
      ["by","landevej","motorvej"].forEach(v => document.getElementById("fv-"+v)?.addEventListener("click",()=>{vt=v;gr2=vtc[v].graenser[Math.floor(vtc[v].graenser.length/2)];rf();}));
      vtc[vt].graenser.forEach(g => document.getElementById("fg-"+g)?.addEventListener("click",()=>{gr2=g;rf();}));
      document.getElementById("fv-close")?.addEventListener("click",()=>fo.remove());
      document.getElementById("fv-calc")?.addEventListener("click",()=>{
        const val=parseInt(document.getElementById("fv-inp")?.value);if(isNaN(val))return;
        const res=beregnFartboede(val,gr2,vt,false);const rd=document.getElementById("fv-res");
        if(!res){rd.innerHTML=`<p style="text-align:center;color:var(--success);font-size:12px">Ingen overskridelse</p>`;return;}
        rd.innerHTML=`<div class="card card-sm"><div class="grid grid-2 gap-2" style="text-align:center"><div><p style="font-size:9px;color:var(--muted-fg)">Overskridelse</p><p style="font-size:16px;font-weight:700;color:var(--destructive)">+${res.overskridelse} km/t</p></div><div><p style="font-size:9px;color:var(--muted-fg)">Bøde</p><p style="font-size:16px;font-weight:700;color:var(--warning)" class="mono">${formatDaDK(res.boede)} kr</p></div></div><button class="btn btn-primary btn-sm w-full mt-2" id="fv-add">Tilføj til sigtelse</button></div>`;
        document.getElementById("fv-add")?.addEventListener("click",()=>{valgteBoeder.push({boedeId:`fart-${Date.now()}`,paragraf:"Fartoverskridelse",beskrivelse:`${val} km/t i ${gr2}-zone (${vtc[vt].label})`,beloeb:res.boede,faengselMaaneder:0});fo.remove();renderDialog();});
      });
    }
    document.body.appendChild(fo); rf();
  };

  window._sigSubmit = async function() {
    haendelse = document.getElementById("sig-haendelse")?.value || "";
    if (erkender === null) { showToast("Angiv om personen erkender"); return; }
    if (valgteBoeder.length === 0) { showToast("Tilføj mindst én sigtelse"); return; }
    const totalBoede = valgteBoeder.reduce((s, b) => s + b.beloeb, 0);
    const totalFaengsel = valgteBoeder.reduce((s, b) => s + b.faengselMaaneder, 0);
    const sigtelse = { id: Date.now().toString(), personId: p.id, personNavn: `${p.fornavn} ${p.efternavn}`, personCpr: p.cpr, dato: new Date().toISOString().split("T")[0], sigtelseBoeder: valgteBoeder, totalBoede, faengselMaaneder: totalFaengsel, fratagKoerekort, erkender, involveretBetjente: [currentUser.id], rapport: { haendelsesforloeb: haendelse, konfiskeredeGenstande: "", magtanvendelse: "" }, skabelonType: "", sagsStatus: "aaben" };
    try { await sigtelserApi.create(sigtelse); showToast("Sigtelse oprettet"); overlay.remove(); renderPage(activeTabId); } catch (e) { showToast("Fejl: " + e.message); }
  };

  document.body.appendChild(overlay);
  renderDialog();
};

// ═══ SAGSARKIV ═══
async function renderSagsarkiv(container) {
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div><span>Indlæser sager...</span></div>';
  try {
    const sager = await sagerApi.getAll();
    const statusLabels = { aaben: "Åben", under_efterforskning: "Under efterforskning", afventer_retten: "Afventer retten", lukket: "Lukket" };
    const statusColors = { aaben: "badge-success", under_efterforskning: "badge-primary", afventer_retten: "badge-warning", lukket: "badge-muted" };
    let html = `<div class="flex items-center justify-between mb-3"><h1 style="font-size:18px;font-weight:700">Sagsarkiv</h1><button class="btn btn-primary" onclick="openTab('opret_sag')">${icons.plus} Ny sag</button></div>`;
    sager.forEach(s => {
      html += `<div class="card card-sm mb-2" style="cursor:pointer" onclick="openTab('sag',{sagId:'${s.id}',label:'${(s.titel || s.sagsnummer).replace(/'/g, "\\'")}'})"><div class="flex items-center justify-between"><div><div style="font-size:13px;font-weight:600">${s.titel || "Unavngivet sag"}</div><div class="mono" style="font-size:10px;color:var(--muted-fg)">${s.sagsnummer} · ${s.oprettetAf} · ${new Date(s.oprettet).toLocaleDateString("da-DK")}</div></div><div class="flex items-center gap-2"><span class="badge ${statusColors[s.status] || 'badge-muted'}">${statusLabels[s.status] || s.status}</span><span style="font-size:11px;color:var(--muted-fg)">${s.mistaenkte.length} mistænkte</span></div></div></div>`;
    });
    if (sager.length === 0) html += '<div class="loading-center" style="min-height:200px"><p>Ingen sager oprettet</p></div>';
    container.innerHTML = html;
  } catch (err) { container.innerHTML = `<p style="color:var(--destructive)">Fejl: ${err.message}</p>`; }
}

// ═══ SAG EDITOR ═══
async function renderSagEditor(container, data) {
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div><span>Indlæser...</span></div>';
  try {
    const [personer, betjente, koeretoejer] = await Promise.all([personerApi.getAll(), betjenteApi.getAll(), koeretoejerApi.getAll()]);
    let sag, isExisting = false;
    if (data?.sagId) { const allSager = await sagerApi.getAll(); sag = allSager.find(s => s.id === data.sagId); if (sag) isExisting = true; }
    if (!sag) { sag = { id: Date.now().toString(), sagsnummer: `SAG-${Date.now().toString().slice(-6)}`, titel: "", oprettet: new Date().toISOString(), opdateret: new Date().toISOString(), status: "aaben", oprettetAf: `${currentUser.fornavn} ${currentUser.efternavn}`, mistaenkte: [], involveretBetjente: [], involveretBorgere: [], koeretoejer: [], referencer: [], tags: [], beviser: [], rapport: { haendelsesforloeb: "", konfiskeredeGenstande: [], magtanvendelse: [] }, noter: [], aktivitetslog: [] }; }
    window._currentSag = sag;
    window._sagExisting = isExisting;

    let html = `<div style="max-width:900px"><div class="flex items-center justify-between mb-3"><div class="flex items-center gap-3"><div class="list-item-avatar" style="width:40px;height:40px;border-radius:8px;background:rgba(59,130,246,.1);color:var(--primary)">${icons.file}</div><div><h1 style="font-size:18px;font-weight:700">${isExisting ? "Rediger Sag" : "Opret Sag"}</h1><p class="mono" style="font-size:11px;color:var(--muted-fg)">${sag.sagsnummer}</p></div></div><div class="flex gap-2"><select class="select" id="sag-status"><option value="aaben" ${sag.status==="aaben"?"selected":""}>Åben</option><option value="under_efterforskning" ${sag.status==="under_efterforskning"?"selected":""}>Under efterforskning</option><option value="afventer_retten" ${sag.status==="afventer_retten"?"selected":""}>Afventer retten</option><option value="lukket" ${sag.status==="lukket"?"selected":""}>Lukket</option></select><button class="btn btn-primary" onclick="saveSag()">${isExisting ? "Gem ændringer" : "Opret sag"}</button></div></div>`;
    html += `<div class="card mb-3"><div class="label">Sagstitel</div><input class="input mb-2" id="sag-titel" value="${sag.titel}" placeholder="Skriv en titel..."><div class="label">Hændelsesforløb</div><textarea class="textarea" id="sag-rapport" rows="5" placeholder="Beskriv hændelsesforløbet...">${sag.rapport.haendelsesforloeb}</textarea></div>`;
    html += `<div class="card mb-3"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">${icons.alert} Mistænkte (${sag.mistaenkte.length})</h3><div id="sag-mistaenkte">`;
    sag.mistaenkte.forEach(m => { html += `<div class="card card-sm mb-2" style="border-left:2px solid var(--warning)"><div class="flex items-center justify-between"><div><span style="font-size:12px;font-weight:500">${m.personNavn}</span> <span class="mono" style="font-size:10px;color:var(--muted-fg)">${m.personCpr}</span></div><span style="font-size:10px;color:var(--muted-fg)">${m.sigtelser.length} sigtelser</span></div></div>`; });
    html += `</div><div style="margin-top:8px"><input class="input" id="sag-person-search" placeholder="Søg person at tilføje..."></div><div id="sag-person-results" style="max-height:150px;overflow-y:auto;margin-top:4px"></div></div>`;
    html += `<div class="card mb-3"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">Noter</h3>`;
    sag.noter.forEach(n => { html += `<div style="padding:8px;background:var(--muted);border-radius:8px;margin-bottom:6px;font-size:12px"><p>${n.tekst}</p><div style="font-size:10px;color:var(--muted-fg);margin-top:4px">${n.oprettetAf} — ${new Date(n.oprettetDato).toLocaleDateString("da-DK")}</div></div>`; });
    html += `<div class="flex gap-2 mt-2"><input class="input flex-1" id="sag-note-input" placeholder="Tilføj note..."><button class="btn btn-outline btn-sm" onclick="addSagNote()">Tilføj</button></div></div></div>`;
    container.innerHTML = html;

    const searchInput = document.getElementById("sag-person-search");
    searchInput.addEventListener("input", () => {
      const q = searchInput.value.toLowerCase();
      const results = document.getElementById("sag-person-results");
      if (q.length < 2) { results.innerHTML = ""; return; }
      const matches = personer.filter(p => `${p.fornavn} ${p.efternavn} ${p.cpr}`.toLowerCase().includes(q)).slice(0, 10);
      results.innerHTML = matches.map(p => `<div class="list-item" style="padding:6px 8px;cursor:pointer" onclick="addMistaenkt('${p.id}')"><span style="font-size:12px">${p.fornavn} ${p.efternavn}</span> <span class="mono" style="font-size:10px;color:var(--muted-fg)">${p.cpr}</span></div>`).join("");
    });
    window._sagPersoner = personer;
  } catch (err) { container.innerHTML = `<p style="color:var(--destructive)">Fejl: ${err.message}</p>`; }
}

window.addMistaenkt = function(personId) {
  const p = window._sagPersoner.find(pp => pp.id === personId);
  if (!p) return;
  const sag = window._currentSag;
  if (sag.mistaenkte.find(m => m.personId === personId)) { showToast("Allerede tilføjet"); return; }
  sag.mistaenkte.push({ id: Date.now().toString(), personId: p.id, personNavn: `${p.fornavn} ${p.efternavn}`, personCpr: p.cpr, sigtelser: [], totalBoede: 0, totalFaengsel: 0, erkender: null, behandlet: false, tilkendegivelseAfgivet: false, fratagKoerekort: false });
  renderPage(activeTabId);
};

window.addSagNote = function() {
  const input = document.getElementById("sag-note-input");
  if (!input.value.trim()) return;
  window._currentSag.noter.push({ id: Date.now().toString(), tekst: input.value, oprettetAf: `${currentUser.fornavn} ${currentUser.efternavn}`, oprettetDato: new Date().toISOString() });
  input.value = "";
  renderPage(activeTabId);
};

window.saveSag = async function() {
  const sag = window._currentSag;
  sag.titel = document.getElementById("sag-titel").value;
  sag.status = document.getElementById("sag-status").value;
  sag.rapport.haendelsesforloeb = document.getElementById("sag-rapport").value;
  sag.opdateret = new Date().toISOString();
  try {
    if (window._sagExisting) await sagerApi.update(sag.id, sag);
    else { await sagerApi.create(sag); window._sagExisting = true; }
    showToast(window._sagExisting ? "Sag opdateret" : "Sag oprettet");
    const tab = openTabs.find(t => t.id === activeTabId);
    if (tab) tab.label = sag.titel || sag.sagsnummer;
    renderTabs();
  } catch (e) { showToast("Fejl: " + e.message); }
};

// ═══ FLÅDESTYRING ═══
async function renderFlaade(container) {
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div><span>Indlæser patruljer...</span></div>';

    const patrols = await patruljerApi.getAll().catch(() => []);
    let html = `<div class="flex items-center justify-between mb-3"><h2 style="font-size:16px;font-weight:600">Patrulje Skema</h2><div class="flex gap-2"><span class="badge badge-primary">Bemandede: ${patrols.filter(p => p.medlemmer.length > 0).length}</span><span class="badge badge-success">Ledige: ${patrols.filter(p => p.status === "ledig").length}</span></div></div>`;
    const statusColors = { ledig: "badge-success", i_brug: "badge-primary", optaget: "badge-warning", ude_af_drift: "badge-destructive" };
    const statusLabels = { ledig: "Ledig", i_brug: "I brug", optaget: "Optaget", ude_af_drift: "Ude af drift" };
    patrols.forEach(p => {
      html += `<div class="card card-sm mb-2"><div class="flex items-center justify-between"><div><span style="font-size:13px;font-weight:600">${p.navn}</span> <span class="badge ${statusColors[p.status]}">${statusLabels[p.status]}</span></div><span style="font-size:11px;color:var(--muted-fg)">${p.medlemmer.length}/${p.pladser} pladser</span></div>`;
      if (p.medlemmer.length > 0) { html += `<div style="margin-top:6px;font-size:11px;color:var(--muted-fg)">`; p.medlemmer.forEach(m => { html += `<span style="margin-right:12px">🛡️ ${m.navn} (${m.badgeNr})</span>`; }); html += '</div>'; }
      html += '</div>';
    });
    if (patrols.length === 0) html += '<div class="loading-center" style="min-height:200px"><p>Ingen patruljer oprettet</p></div>';
    container.innerHTML = html;
  } catch (err) { container.innerHTML = `<p style="color:var(--destructive)">Fejl: ${err.message}</p>`; }
}

// ═══ ANSATTE ═══
async function renderAnsatte(container) {
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div><span>Indlæser ansatte...</span></div>';
  try {
    const ansatte = await betjenteApi.getAll();
    const grouped = rangOrder.map(rang => ({ rang, members: ansatte.filter(a => a.rang === rang) }));
    let html = `<div class="flex items-center justify-between mb-3"><h1 style="font-size:18px;font-weight:700">Ansatte</h1><button class="btn btn-primary btn-sm" onclick="showAnsatForm()">+ Opret betjent</button></div>`;
    grouped.forEach(g => {
      html += `<div class="card mb-2" style="padding:0;overflow:hidden"><div class="accordion-header"><span style="font-size:14px;font-weight:600">${g.rang}</span><span style="font-size:11px;color:var(--muted-fg)">${g.members.length}</span></div>`;
      g.members.forEach(b => { html += `<div class="list-item" style="padding-left:16px"><span style="font-size:12px">${b.badgeNr} — ${b.fornavn} ${b.efternavn}</span></div>`; });
      if (g.members.length === 0) html += '<div style="padding:8px 16px;font-size:12px;color:var(--muted-fg);font-style:italic">Ingen ansatte</div>';
      html += '</div>';
    });
    container.innerHTML = html;
  } catch (err) { container.innerHTML = `<p style="color:var(--destructive)">Fejl: ${err.message}</p>`; }
}

window.showAnsatForm = function() {
  const overlay = el("div", { className: "dialog-overlay", onclick: (e) => { if (e.target === overlay) overlay.remove(); } });
  let rangoptions = rangOrder.map(r => `<option value="${r}">${r}</option>`).join("");
  overlay.innerHTML = `<div class="dialog"><div class="dialog-title">Opret ny betjent</div><div class="grid grid-2 gap-2 mb-2"><div><div class="label">Badge nummer</div><input class="input" id="na-badge"></div><div><div class="label">Stilling</div><select class="select w-full" id="na-rang">${rangoptions}</select></div></div><div class="grid grid-2 gap-2 mb-2"><div><div class="label">Fornavn</div><input class="input" id="na-fornavn"></div><div><div class="label">Efternavn</div><input class="input" id="na-efternavn"></div></div><p style="font-size:11px;color:var(--muted-fg);margin-bottom:12px">Standardkodeord: 1234</p><div class="flex gap-2"><button class="btn btn-primary" id="na-submit">Opret</button><button class="btn btn-outline" onclick="this.closest('.dialog-overlay').remove()">Annuller</button></div></div>`;
  document.body.appendChild(overlay);
  document.getElementById("na-submit").addEventListener("click", async () => {

window.changePassword = async function() {
  const oldP = document.getElementById("prof-old").value;
  const newP = document.getElementById("prof-new").value;
  const confP = document.getElementById("prof-confirm").value;
  const errDiv = document.getElementById("prof-error");
  if (oldP !== currentUser.kodeord) { errDiv.textContent = "Forkert nuværende kodeord"; return; }

  if (newP !== confP) { errDiv.textContent = "Kodeord matcher ikke"; return; }
  try { await betjenteApi.update(currentUser.id, { kodeord: newP }); currentUser.kodeord = newP; showToast("Kodeord ændret"); errDiv.textContent = ""; } catch (e) { errDiv.textContent = "Fejl: " + e.message; }
};

// ═══ AKTIV PATRULJE / KORT ═══
async function renderKort(container) {
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div><span>Indlæser patruljer...</span></div>';
  try {
    const [patruljer, betjente] = await Promise.all([patruljerApi.getAll().catch(() => []), betjenteApi.getAll()]);

    const statusLabels = { ledig: "Ledig", i_brug: "I brug", optaget: "Optaget", ude_af_drift: "Ude af drift" };
    let html = `<div class="flex items-center justify-between mb-3"><div class="flex items-center gap-3">${icons.radio}<h1 style="font-size:18px;font-weight:700">Aktive Patruljer</h1></div><div class="flex gap-2"><button class="btn btn-primary btn-sm" onclick="showPatruljeForm()">${icons.plus} Opret patrulje</button></div></div>`;
    html += `<div class="grid grid-4 mb-3"><div class="stat-card"><div class="accent-bar" style="background:var(--primary)"></div><div class="stat-value mono">${patruljer.length}</div><div class="stat-label">Total patruljer</div></div><div class="stat-card"><div class="accent-bar" style="background:var(--success)"></div><div class="stat-value mono" style="color:var(--success)">${patruljer.filter(p => p.status === "ledig").length}</div><div class="stat-label">Ledige</div></div><div class="stat-card"><div class="accent-bar" style="background:var(--primary)"></div><div class="stat-value mono" style="color:var(--primary)">${patruljer.filter(p => p.status === "i_brug").length}</div><div class="stat-label">I brug</div></div><div class="stat-card"><div class="accent-bar" style="background:var(--warning)"></div><div class="stat-value mono" style="color:var(--warning)">${patruljer.filter(p => p.status === "optaget").length}</div><div class="stat-label">Optaget</div></div></div>`;
    patruljer.forEach(p => {
      html += `<div class="card card-sm mb-2"><div class="flex items-center justify-between"><div class="flex items-center gap-3"><div class="dot ${statusColors[p.status] || 'dot-success'}"></div><span style="font-size:14px;font-weight:600">${p.navn}</span><span class="badge badge-muted">${p.kategori || "Standard"}</span></div><div class="flex items-center gap-3"><span style="font-size:11px;color:var(--muted-fg)">${p.medlemmer.length}/${p.pladser} pladser</span><select class="select" style="height:28px;font-size:10px" onchange="updatePatruljeStatus('${p.id}',this.value)"><option value="ledig" ${p.status==="ledig"?"selected":""}>Ledig</option><option value="i_brug" ${p.status==="i_brug"?"selected":""}>I brug</option><option value="optaget" ${p.status==="optaget"?"selected":""}>Optaget</option><option value="ude_af_drift" ${p.status==="ude_af_drift"?"selected":""}>Ude af drift</option></select><button class="btn btn-ghost btn-sm" onclick="joinPatrulje('${p.id}')">Tilmeld mig</button><button class="btn btn-ghost btn-sm" style="color:var(--destructive)" onclick="leavePatrulje('${p.id}')">Forlad</button></div></div>`;
      if (p.medlemmer.length > 0) { html += '<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px">'; p.medlemmer.forEach(m => { html += `<span class="badge badge-primary">🛡️ ${m.navn} (${m.badgeNr})</span>`; }); html += '</div>'; }
      if (p.bemaerkning) html += `<div style="margin-top:6px;font-size:11px;color:var(--muted-fg);font-style:italic">📝 ${p.bemaerkning}</div>`;

window.showPatruljeForm = function() {
  const overlay = el("div", { className: "dialog-overlay", onclick: (e) => { if (e.target === overlay) overlay.remove(); } });

window.joinPatrulje = async function(patruljeId) {
  try {
    const patruljer = window._kortPatruljer || await patruljerApi.getAll();
    const p = patruljer.find(pp => pp.id === patruljeId);
    if (!p) return;
    if (p.medlemmer.find(m => m.badgeNr === currentUser.badgeNr)) { showToast("Du er allerede tilmeldt"); return; }
    if (p.medlemmer.length >= p.pladser) { showToast("Patruljen er fuld"); return; }
    p.medlemmer.push({ badgeNr: currentUser.badgeNr, navn: `${currentUser.fornavn} ${currentUser.efternavn}` });
    await patruljerApi.update(patruljeId, p);
    showToast("Tilmeldt patrulje");
    renderPage(activeTabId);
  } catch (e) { showToast("Fejl: " + e.message); }
};

window.leavePatrulje = async function(patruljeId) {
  try {
    const patruljer = window._kortPatruljer || await patruljerApi.getAll();
    const p = patruljer.find(pp => pp.id === patruljeId);
    if (!p) return;
    p.medlemmer = p.medlemmer.filter(m => m.badgeNr !== currentUser.badgeNr);
    await patruljerApi.update(patruljeId, p);
    showToast("Forladt patrulje");
    renderPage(activeTabId);
  } catch (e) { showToast("Fejl: " + e.message); }
};

window.updatePatruljeStatus = async function(patruljeId, status) {
  try {
    const patruljer = window._kortPatruljer || await patruljerApi.getAll();
    const p = patruljer.find(pp => pp.id === patruljeId);
    if (!p) return;
    p.status = status;
    await patruljerApi.update(patruljeId, p);
    showToast("Status opdateret");
  } catch (e) { showToast("Fejl: " + e.message); }
};

// ═══ ANSØGNINGER ═══
async function renderAnsoegninger(container) {
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div><span>Indlæser ansøgninger...</span></div>';
  try {

    html += `<div class="flex gap-2 mb-3"><button class="btn btn-primary btn-sm" onclick="filterAnsoegninger('alle')">Alle</button><button class="btn btn-outline btn-sm" onclick="filterAnsoegninger('afventer')">Afventer</button><button class="btn btn-outline btn-sm" onclick="filterAnsoegninger('godkendt')">Godkendt</button><button class="btn btn-outline btn-sm" onclick="filterAnsoegninger('afvist')">Afvist</button></div>`;
    html += '<div id="ansoeg-list">';
    const statusColors = { afventer: "badge-warning", godkendt: "badge-success", afvist: "badge-destructive" };
    const statusLabels = { afventer: "Afventer", godkendt: "Godkendt", afvist: "Afvist" };
    ansoegninger.forEach(a => {
      html += `<div class="card card-sm mb-2 ansoeg-item" data-status="${a.status || 'afventer'}"><div class="flex items-center justify-between"><div class="flex-1"><div class="flex items-center gap-2"><span style="font-size:13px;font-weight:600">${a.titel || a.type || "Ansøgning"}</span><span class="badge ${statusColors[a.status] || 'badge-warning'}">${statusLabels[a.status] || 'Afventer'}</span></div><div style="font-size:11px;color:var(--muted-fg);margin-top:4px">${a.ansoegerNavn || "Ukendt"} · ${a.oprettetDato || "—"}</div>${a.begrundelse ? `<p style="font-size:12px;color:var(--fg);margin-top:6px;white-space:pre-line">${a.begrundelse}</p>` : ""}</div>`;
      if (canManage && (a.status === "afventer" || !a.status)) {
        html += `<div class="flex gap-2 shrink-0"><button class="btn btn-sm" style="background:var(--success);color:#fff" onclick="behandlAnsoegning('${a.id}','godkendt')">Godkend</button><button class="btn btn-sm btn-destructive" onclick="behandlAnsoegning('${a.id}','afvist')">Afvis</button></div>`;
      }
      html += '</div></div>';
    });
    if (ansoegninger.length === 0) html += '<div class="loading-center" style="min-height:200px"><p>Ingen ansøgninger</p></div>';
    html += '</div>';
    container.innerHTML = html;
  } catch (err) { container.innerHTML = `<p style="color:var(--destructive)">Fejl: ${err.message}</p>`; }
}

// ═══ NSK — TILHØRSFORHOLD ═══
async function renderNSK(container) {
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div><span>Indlæser tilhørsforhold...</span></div>';
  try {
    const [tilhoersforhold, personer] = await Promise.all([tilhoersforholdApi.getAll(), personerApi.getAll()]);
    let html = `<div class="flex items-center justify-between mb-3"><div class="flex items-center gap-3">${icons.target}<h1 style="font-size:18px;font-weight:700">NSK — Tilhørsforhold</h1><span style="font-size:12px;color:var(--muted-fg)">${tilhoersforhold.length} registreringer</span></div><button class="btn btn-primary btn-sm" onclick="showTilhoersforholdForm()">${icons.plus} Tilføj tilhørsforhold</button></div>`;
    const bander = {};
    tilhoersforhold.forEach(t => { if (!bander[t.bande]) bander[t.bande] = []; bander[t.bande].push(t); });
    for (const [bande, members] of Object.entries(bander)) {
      html += `<div class="card mb-2" style="padding:0;overflow:hidden;border-left:3px solid var(--destructive)"><div class="accordion-header" onclick="this.nextElementSibling.classList.toggle('open')"><div class="flex items-center gap-2"><span style="font-size:14px;font-weight:600">${bande}</span><span class="badge badge-destructive">${members.length} medlemmer</span></div><span style="color:var(--muted-fg)">▼</span></div><div class="accordion-body">`;
      members.forEach(m => {
        const person = personer.find(p => p.cpr === m.personCpr);
        html += `<div style="padding:10px 16px;border-top:1px solid rgba(42,47,58,.5)"><div class="flex items-center justify-between"><div><span style="font-size:13px;font-weight:500">${m.personNavn || (person ? person.fornavn + " " + person.efternavn : "Ukendt")}</span> <span class="mono" style="font-size:10px;color:var(--muted-fg)">${m.personCpr}</span></div><div class="flex items-center gap-2"><span class="badge badge-muted">${m.rolle || "Medlem"}</span><span class="badge ${m.status === "aktiv" ? "badge-success" : "badge-muted"}">${m.status || "aktiv"}</span>`;
        if (isAdmin) html += `<button class="btn btn-ghost btn-sm" style="color:var(--destructive)" onclick="deleteTilhoersforhold('${m.id}')">✕</button>`;
        html += `</div></div></div>`;
      });
      html += '</div></div>';
    }
    if (Object.keys(bander).length === 0) html += '<div class="loading-center" style="min-height:200px"><p>Ingen tilhørsforhold registreret</p></div>';
    html += `<div class="card mt-3"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">Afdelingsopslag</h3><div id="nsk-afd-content"></div></div>`;
    container.innerHTML = html;
    window._nskPersoner = personer;
    try {
      const indhold = await afdelingsIndholdApi.getAll("nsk");
      const afdDiv = document.getElementById("nsk-afd-content");
      if (indhold.length === 0) { afdDiv.innerHTML = '<p style="font-size:12px;color:var(--muted-fg)">Ingen opslag</p>'; }
      else indhold.forEach(item => { afdDiv.innerHTML += `<div class="card card-sm mb-2"><span class="badge badge-muted">${item.type}</span> <span style="font-size:12px;font-weight:600">${item.titel}</span><p style="font-size:12px;color:var(--muted-fg);margin-top:4px;white-space:pre-wrap">${item.indhold}</p></div>`; });
    } catch {}
  } catch (err) { container.innerHTML = `<p style="color:var(--destructive)">Fejl: ${err.message}</p>`; }
}

window.showTilhoersforholdForm = function() {
  const overlay = el("div", { className: "dialog-overlay", onclick: (e) => { if (e.target === overlay) overlay.remove(); } });
  overlay.innerHTML = `<div class="dialog"><div class="dialog-title">Tilføj tilhørsforhold</div><div class="label">Søg person (CPR eller navn)</div><input class="input mb-2" id="th-search" placeholder="Søg..."><div id="th-person-results" style="max-height:120px;overflow-y:auto;margin-bottom:8px"></div><div id="th-selected" style="font-size:12px;color:var(--success);margin-bottom:8px"></div><div class="label">Gruppering / Bande</div><input class="input mb-2" id="th-bande" placeholder="Navn på gruppering..."><div class="grid grid-2 gap-2 mb-2"><div><div class="label">Rolle</div><select class="select w-full" id="th-rolle"><option value="Medlem">Medlem</option><option value="Leder">Leder</option><option value="Prospect">Prospect</option><option value="Associeret">Associeret</option></select></div><div><div class="label">Status</div><select class="select w-full" id="th-status"><option value="aktiv">Aktiv</option><option value="inaktiv">Inaktiv</option><option value="tidligere">Tidligere</option></select></div></div><div class="flex gap-2"><button class="btn btn-primary" id="th-submit">Tilføj</button><button class="btn btn-outline" onclick="this.closest('.dialog-overlay').remove()">Annuller</button></div></div>`;
  document.body.appendChild(overlay);
  let selectedPerson = null;
  document.getElementById("th-search").addEventListener("input", (e) => {
    const q = e.target.value.toLowerCase();
    const results = document.getElementById("th-person-results");
    if (q.length < 2) { results.innerHTML = ""; return; }
    const matches = (window._nskPersoner || []).filter(p => `${p.fornavn} ${p.efternavn} ${p.cpr}`.toLowerCase().includes(q)).slice(0, 8);
    results.innerHTML = matches.map(p => `<div class="list-item" style="padding:4px 8px;cursor:pointer" data-id="${p.id}" data-cpr="${p.cpr}" data-navn="${p.fornavn} ${p.efternavn}"><span style="font-size:12px">${p.fornavn} ${p.efternavn}</span> <span class="mono" style="font-size:10px;color:var(--muted-fg)">${p.cpr}</span></div>`).join("");
    results.querySelectorAll(".list-item").forEach(item => {
      item.addEventListener("click", () => {
        selectedPerson = { id: item.dataset.id, cpr: item.dataset.cpr, navn: item.dataset.navn };
        document.getElementById("th-selected").textContent = "Valgt: " + selectedPerson.navn + " (" + selectedPerson.cpr + ")";
        results.innerHTML = "";
        document.getElementById("th-search").value = selectedPerson.navn;
      });
    });
  });
  document.getElementById("th-submit").addEventListener("click", async () => {
    if (!selectedPerson) { showToast("Vælg en person"); return; }
    const bande = document.getElementById("th-bande").value;
    if (!bande) { showToast("Udfyld gruppering"); return; }
    const t = { id: Date.now().toString(), personId: selectedPerson.id, personCpr: selectedPerson.cpr, personNavn: selectedPerson.navn, bande, rolle: document.getElementById("th-rolle").value, status: document.getElementById("th-status").value, oprettetAf: `${currentUser.fornavn} ${currentUser.efternavn}`, oprettetDato: new Date().toISOString().split("T")[0] };
    try { await tilhoersforholdApi.create(t); showToast("Tilhørsforhold tilføjet"); overlay.remove(); renderPage(activeTabId); } catch (e) { showToast("Fejl: " + e.message); }
  });
};

window.deleteTilhoersforhold = async function(id) {
  if (!confirm("Slet dette tilhørsforhold?")) return;
  try { await tilhoersforholdApi.remove(id); showToast("Slettet"); renderPage(activeTabId); } catch (e) { showToast("Fejl: " + e.message); }
};

// ═══ AFDELINGER (generisk) ═══
async function renderAfdeling(container, afdId) {
  const titler = { lima: "Lima — Aktionsstyrken", faerdsel: "Færdsel — Færdselsafdelingen", efterforskning: "Efterforskning", sig: "SIG — Særlig Indsatsgruppe", remeo: "Remeo" };
  container.innerHTML = `<div class="loading-center"><div class="spinner"></div><span>Indlæser...</span></div>`;
  try {
    const indhold = await afdelingsIndholdApi.getAll(afdId);
    const canManage = isAdmin;
    let html = `<div class="flex items-center justify-between mb-3"><div class="flex items-center gap-3">${icons.shield}<h1 style="font-size:18px;font-weight:700">${titler[afdId] || afdId}</h1><span style="font-size:12px;color:var(--muted-fg)">${indhold.length} opslag</span></div>`;
    if (canManage) html += `<button class="btn btn-primary btn-sm" onclick="showAfdelingsIndholdForm('${afdId}')">${icons.plus} Tilføj indhold</button>`;
    html += '</div>';
    indhold.forEach(item => {
      html += `<div class="card card-sm mb-2"><div class="flex items-center justify-between mb-1"><div class="flex items-center gap-2"><span class="badge badge-muted">${item.type || "info"}</span><span style="font-size:12px;font-weight:600">${item.titel}</span></div>`;
      if (canManage) html += `<button class="btn btn-ghost btn-sm" style="color:var(--destructive)" onclick="deleteAfdelingsIndhold('${item.id}')">✕</button>`;
      html += `</div><p style="font-size:12px;color:var(--muted-fg);white-space:pre-wrap">${item.indhold}</p><div style="font-size:9px;color:var(--muted-fg);margin-top:6px">${item.oprettetAf || "—"} — ${item.oprettetDato ? new Date(item.oprettetDato).toLocaleDateString("da-DK") : "—"}</div></div>`;
    });
    if (indhold.length === 0) html += '<div class="loading-center" style="min-height:200px"><p>Ingen indhold endnu</p></div>';
    container.innerHTML = html;
  } catch (err) { container.innerHTML = `<div class="card"><div class="flex items-center gap-3 mb-3">${icons.shield}<h1 style="font-size:18px;font-weight:700">${titler[afdId] || afdId}</h1></div><p style="font-size:12px;color:var(--muted-fg)">Kunne ikke indlæse indhold</p></div>`; }
}

window.showAfdelingsIndholdForm = function(afdId) {
  const overlay = el("div", { className: "dialog-overlay", onclick: (e) => { if (e.target === overlay) overlay.remove(); } });
  overlay.innerHTML = `<div class="dialog"><div class="dialog-title">Tilføj afdelingsindhold</div><div class="label">Titel</div><input class="input mb-2" id="ai-titel" placeholder="Overskrift..."><div class="label">Type</div><select class="select w-full mb-2" id="ai-type"><option value="info">Information</option><option value="taktisk">Taktisk plan</option><option value="vagtplan">Vagtplan</option><option value="udstyr">Udstyr</option><option value="nyhed">Nyhed</option></select><div class="label">Indhold</div><textarea class="textarea mb-2" id="ai-indhold" rows="4" placeholder="Skriv indhold..."></textarea><div class="flex gap-2"><button class="btn btn-primary" id="ai-submit">Tilføj</button><button class="btn btn-outline" onclick="this.closest('.dialog-overlay').remove()">Annuller</button></div></div>`;
  document.body.appendChild(overlay);
  document.getElementById("ai-submit").addEventListener("click", async () => {
    const item = { id: Date.now().toString(), afdelingId: afdId, titel: document.getElementById("ai-titel").value, type: document.getElementById("ai-type").value, indhold: document.getElementById("ai-indhold").value, oprettetAf: `${currentUser.fornavn} ${currentUser.efternavn}`, oprettetDato: new Date().toISOString() };
    if (!item.titel || !item.indhold) { showToast("Udfyld titel og indhold"); return; }
    try { await afdelingsIndholdApi.create(item); showToast("Indhold tilføjet"); overlay.remove(); renderPage(activeTabId); } catch (e) { showToast("Fejl: " + e.message); }
  });
};

window.deleteAfdelingsIndhold = async function(id) {
  if (!confirm("Slet dette indhold?")) return;
  try { await afdelingsIndholdApi.remove(id); showToast("Slettet"); renderPage(activeTabId); } catch (e) { showToast("Fejl: " + e.message); }
};
</script>
</body>
</html>
