  <style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

:root {
  --bg: #161a22; --fg: #d4dae4; --card: #1c2029; --card-fg: #d4dae4;
  --primary: #3b82f6; --primary-fg: #fff; --secondary: #252a35; --secondary-fg: #a0aab8;
  --muted: #1e222b; --muted-fg: #6b7585; --accent: #2097a6; --accent-fg: #fff;
  --destructive: #d6364b; --destructive-fg: #fff; --border: #2a2f3a; --input: #2a2f3a;
  --ring: #3b82f6; --radius: 0.5rem; --warning: #e0642a; --warning-fg: #fff;
  --success: #33a06a; --success-fg: #fff;
  --sidebar-bg: #131620; --sidebar-fg: #9ba5b5; --sidebar-border: #252a35;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Space Grotesk', sans-serif; background: #000; color: var(--fg); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
input, textarea, select, button { font-family: inherit; }
.mono { font-family: 'IBM Plex Mono', monospace; }

/* ── Layout ── */
#app { width: 100vw; height: 100vh; padding: 8px; }
.app-shell { width: 100%; height: 100%; border-radius: 16px; background: var(--bg); overflow: hidden; border: 1px solid rgba(59,130,246,.2); display: flex; position: relative; box-shadow: 0 0 20px rgba(59,130,246,.15), 0 0 60px rgba(59,130,246,.05); }
.app-shell::before { content:""; position:absolute; top:0; left:0; width:64px; height:1px; background:linear-gradient(to right,rgba(59,130,246,.6),transparent); z-index:10; }
.app-shell::after { content:""; position:absolute; top:0; left:0; width:1px; height:64px; background:linear-gradient(to bottom,rgba(59,130,246,.6),transparent); z-index:10; }

/* ── Login ── */
#login-page { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 100; }
#login-page .bg-img { position: absolute; inset: 0; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); }
#login-page .overlay { position: absolute; inset: 0; background: rgba(0,0,0,.6); }
.login-card { position: relative; z-index: 1; width: 100%; max-width: 360px; padding: 32px; }
.login-logo { width: 80px; height: 80px; border: 1px solid rgba(59,130,246,.2); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; cursor: pointer; border-radius: 12px; background: rgba(59,130,246,.05); }
.login-logo svg { width: 40px; height: 40px; color: var(--primary); }
.login-title { text-align: center; color: #fff; font-size: 20px; font-weight: 700; letter-spacing: .05em; }
.login-sub { text-align: center; color: var(--primary); font-size: 10px; letter-spacing: .3em; margin-top: 4px; }
.login-matched { text-align: center; margin: 12px 0; color: rgba(255,255,255,.8); font-size: 14px; }
.login-matched small { display: block; color: rgba(59,130,246,.6); font-size: 11px; }
.login-field { position: relative; margin-bottom: 12px; }
.login-field svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: rgba(59,130,246,.4); }
.login-field input { width: 100%; height: 44px; background: transparent; border: 1px solid rgba(255,255,255,.15); color: #fff; padding: 0 12px 0 40px; border-radius: 12px; font-size: 13px; text-align: center; outline: none; }
.login-field input::placeholder { color: rgba(255,255,255,.3); }
.login-field input:focus { border-color: rgba(59,130,246,.5); }
.login-btn { width: 100%; height: 44px; border-radius: 12px; background: var(--primary); color: #fff; font-size: 13px; font-weight: 600; border: none; cursor: pointer; letter-spacing: .1em; margin-top: 20px; }
.login-btn:hover { background: #4b90f7; }
.login-btn:disabled { opacity: .5; cursor: default; }
.login-error { text-align: center; color: #f87171; font-size: 11px; margin-top: 12px; }
.login-footer { text-align: center; color: rgba(255,255,255,.2); font-size: 9px; letter-spacing: .2em; margin-top: 16px; }

/* ── Sidebar ── */
.sidebar { width: 224px; background: var(--sidebar-bg); border-right: 1px solid var(--sidebar-border); display: flex; flex-direction: column; height: 100%; flex-shrink: 0; }
.sidebar-logo { padding: 14px 16px; border-bottom: 1px solid var(--sidebar-border); display: flex; align-items: center; gap: 10px; }
.sidebar-logo-icon { width: 32px; height: 32px; border-radius: 8px; background: rgba(59,130,246,.1); border: 1px solid rgba(59,130,246,.2); display: flex; align-items: center; justify-content: center; color: var(--primary); }
.sidebar-logo-text { font-size: 13px; font-weight: 700; color: var(--fg); line-height: 1; }
.sidebar-logo-text small { display: block; font-size: 9px; color: var(--primary); letter-spacing: .2em; font-weight: 500; }
.sidebar-nav { flex: 1; padding: 8px; overflow-y: auto; }
.sidebar-section-label { font-size: 9px; font-weight: 600; color: rgba(59,130,246,.6); text-transform: uppercase; letter-spacing: .2em; padding: 0 8px; margin-bottom: 6px; margin-top: 8px; }
.sidebar-divider { margin: 10px 8px; height: 1px; background: linear-gradient(to right, rgba(59,130,246,.2), var(--sidebar-border), transparent); }
.sidebar-item { width: 100%; display: flex; align-items: center; gap: 10px; padding: 6px 10px; border-radius: 8px; font-size: 12px; color: var(--muted-fg); background: transparent; border: 1px solid transparent; cursor: pointer; transition: all .15s; text-align: left; }
.sidebar-item:hover { color: var(--fg); background: var(--secondary); }
.sidebar-item.active { background: rgba(59,130,246,.1); color: var(--primary); font-weight: 600; border-color: rgba(59,130,246,.15); }
.sidebar-item.active::after { content: ""; width: 4px; height: 4px; border-radius: 50%; background: var(--primary); margin-left: auto; }
.sidebar-item svg { width: 14px; height: 14px; flex-shrink: 0; }
.sidebar-bottom { border-top: 1px solid var(--sidebar-border); padding: 8px; }
.sidebar-user { padding: 10px 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-radius: 8px; transition: background .15s; }
.sidebar-user:hover { background: var(--secondary); }
.sidebar-user-avatar { width: 32px; height: 32px; border-radius: 8px; background: rgba(59,130,246,.1); border: 1px solid rgba(59,130,246,.2); display: flex; align-items: center; justify-content: center; color: var(--primary); flex-shrink: 0; overflow: hidden; }
.sidebar-user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.sidebar-user-info { flex: 1; min-width: 0; }
.sidebar-user-name { font-size: 11px; font-weight: 600; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-user-rank { font-size: 9px; color: var(--muted-fg); }
.sidebar-user-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

.sidebar-popup { position: absolute; bottom: 56px; left: 4px; right: 4px; background: var(--card); border: 1px solid rgba(59,130,246,.15); border-radius: 12px; padding: 10px; z-index: 50; box-shadow: 0 10px 40px rgba(0,0,0,.5); }
.sidebar-popup-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 8px; font-size: 12px; color: var(--fg); cursor: pointer; width: 100%; background: transparent; border: none; text-align: left; }
.sidebar-popup-item:hover { background: var(--muted); }
.sidebar-popup-item.logout:hover { color: var(--destructive); }
.sidebar-popup-divider { margin: 4px 0; border: none; border-top: 1px solid var(--border); }

/* ── Main Content ── */
.main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.top-header { height: 40px; padding: 0 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; background: rgba(28,32,41,.6); backdrop-filter: blur(8px); flex-shrink: 0; }
.top-header-search { position: relative; flex: 1; max-width: 320px; }
.top-header-search input { width: 100%; height: 28px; padding: 0 10px 0 30px; background: rgba(30,34,43,.4); border: 1px solid var(--border); border-radius: 8px; color: var(--fg); font-size: 12px; outline: none; }
.top-header-search input:focus { border-color: var(--primary); }
.top-header-search svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--muted-fg); }
.top-header-spacer { flex: 1; }
.top-header-badge { font-size: 10px; color: var(--primary); padding: 2px 8px; background: rgba(59,130,246,.08); border: 1px solid rgba(59,130,246,.1); border-radius: 4px; font-weight: 500; }
.top-header-status { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--muted-fg); }
.top-header-status svg { width: 12px; height: 12px; color: var(--success); }
.top-header-time { display: flex; align-items: center; gap: 8px; }
.top-header-date { font-size: 10px; color: var(--muted-fg); }
.top-header-clock { font-size: 13px; font-weight: 700; color: var(--primary); letter-spacing: .05em; }

/* ── Tabs Bar ── */
.tabs-bar { height: 32px; display: flex; align-items: center; gap: 2px; padding: 0 4px; background: rgba(28,32,41,.3); border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; }
.tab-btn { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; color: var(--muted-fg); background: transparent; border: 1px solid transparent; cursor: pointer; white-space: nowrap; transition: all .15s; }
.tab-btn:hover { color: var(--fg); background: var(--muted); }
.tab-btn.active { color: var(--primary); background: rgba(59,130,246,.15); font-weight: 600; border-color: rgba(59,130,246,.2); }
.tab-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
.tab-close { margin-left: 4px; width: 14px; height: 14px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--muted-fg); cursor: pointer; background: transparent; border: none; opacity: 0; transition: opacity .15s; }
.tab-btn:hover .tab-close, .tab-btn.active .tab-close { opacity: 1; }
.tab-close:hover { background: rgba(214,54,75,.15); color: var(--destructive); }

/* ── Content Area ── */
.content-area { flex: 1; overflow-y: auto; padding: 16px; }
.content-area .page { display: none; }
.content-area .page.active { display: block; }

/* ── Cards & Sections ── */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.card-sm { padding: 12px 16px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-title { font-size: 14px; font-weight: 600; color: var(--fg); }
.section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .2em; color: var(--muted-fg); margin-bottom: 8px; }

/* ── Form Elements ── */
.input { width: 100%; height: 32px; padding: 0 10px; background: var(--secondary); border: 1px solid var(--border); border-radius: 8px; color: var(--fg); font-size: 12px; outline: none; }
.input:focus { border-color: var(--primary); }
.input-lg { height: 40px; font-size: 13px; }
.textarea { width: 100%; padding: 8px 10px; background: var(--secondary); border: 1px solid var(--border); border-radius: 8px; color: var(--fg); font-size: 12px; outline: none; resize: vertical; min-height: 80px; }
.textarea:focus { border-color: var(--primary); }
.select { height: 32px; padding: 0 10px; background: var(--secondary); border: 1px solid var(--border); border-radius: 8px; color: var(--fg); font-size: 12px; outline: none; }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted-fg); display: block; margin-bottom: 4px; }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
.btn-primary { background: var(--primary); color: var(--primary-fg); }
.btn-primary:hover { opacity: .9; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--fg); }
.btn-outline:hover { background: var(--muted); }
.btn-destructive { background: var(--destructive); color: var(--destructive-fg); }
.btn-destructive:hover { opacity: .9; }
.btn-sm { padding: 4px 8px; font-size: 11px; }
.btn-ghost { background: transparent; color: var(--muted-fg); border: none; }
.btn-ghost:hover { color: var(--fg); background: var(--muted); }
.btn:disabled { opacity: .5; cursor: default; }

/* ── Badges ── */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 100px; font-size: 10px; font-weight: 500; }
.badge-primary { background: rgba(59,130,246,.15); color: var(--primary); }
.badge-warning { background: rgba(224,100,42,.15); color: var(--warning); }
.badge-destructive { background: rgba(214,54,75,.15); color: var(--destructive); }
.badge-success { background: rgba(51,160,106,.15); color: var(--success); }
.badge-muted { background: var(--muted); color: var(--muted-fg); }

/* ── Grid helpers ── */
.grid { display: grid; gap: 16px; }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.gap-4 { gap: 16px; }
.flex-1 { flex: 1; min-width: 0; }
.shrink-0 { flex-shrink: 0; }
.text-center { text-align: center; }
.hidden { display: none !important; }
.mt-2 { margin-top: 8px; }
.mt-3 { margin-top: 12px; }
.mb-2 { margin-bottom: 8px; }
.mb-3 { margin-bottom: 12px; }
.w-full { width: 100%; }

/* ── Toast ── */
.toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; font-size: 12px; color: var(--fg); z-index: 999; animation: toastIn .3s ease, toastOut .3s ease 2.7s forwards; box-shadow: 0 10px 30px rgba(0,0,0,.4); }
@keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* ── Stat Card ── */
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; position: relative; overflow: hidden; }
.stat-card .accent-bar { position: absolute; top: 0; left: 0; width: 3px; height: 100%; border-radius: 12px 0 0 12px; }
.stat-card .stat-value { font-size: 18px; font-weight: 700; }
.stat-card .stat-label { font-size: 10px; color: var(--muted-fg); }

/* ── Dialog ── */
.dialog-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 90; display: flex; align-items: center; justify-content: center; }
.dialog { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; min-width: 360px; max-width: 500px; max-height: 85vh; overflow-y: auto; z-index: 91; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
.dialog-title { font-size: 16px; font-weight: 600; color: var(--fg); margin-bottom: 16px; }

/* ── List Items ── */
.list-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-bottom: 1px solid rgba(42,47,58,.5); cursor: pointer; transition: background .1s; }
.list-item:hover { background: rgba(255,255,255,.03); }
.list-item.active { background: rgba(59,130,246,.08); border-left: 2px solid var(--primary); }
.list-item-avatar { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.list-item-content { flex: 1; min-width: 0; }
.list-item-title { font-size: 12px; font-weight: 500; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-item-sub { font-size: 10px; color: var(--muted-fg); }

/* ── Split Layout ── */
.split-layout { display: flex; height: 100%; gap: 0; }
.split-left { width: 260px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.split-right { flex: 1; overflow-y: auto; padding: 24px; }

/* ── Table ── */
.table-header { display: grid; padding: 8px 16px; background: rgba(37,42,53,.8); font-size: 10px; font-weight: 600; text-transform: uppercase; color: var(--muted-fg); }
.table-row { display: grid; padding: 10px 16px; border-top: 1px solid rgba(42,47,58,.5); font-size: 13px; cursor: pointer; transition: background .1s; }
.table-row:hover { background: rgba(255,255,255,.03); }

/* ── Accordion ── */
.accordion-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: rgba(37,42,53,.8); cursor: pointer; transition: background .1s; }
.accordion-header:hover { background: var(--secondary); }
.accordion-body { padding: 0; max-height: 0; overflow: hidden; transition: max-height .3s ease; }
.accordion-body.open { max-height: 2000px; }

/* ── Dot status ── */
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-success { background: var(--success); }
.dot-warning { background: var(--warning); }
.dot-destructive { background: var(--destructive); }
.dot-primary { background: var(--primary); }

/* ── Alert Banner ── */
.alert-banner { display: flex; align-items: center; gap: 8px; padding: 12px; border-radius: 8px; font-size: 12px; font-weight: 500; }
.alert-warning { background: rgba(224,100,42,.08); border: 1px solid rgba(224,100,42,.15); color: var(--warning); }

/* ── Loading ── */
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-center { display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 300px; color: var(--muted-fg); font-size: 13px; }

/* ── Info Field ── */
.info-field { margin-bottom: 8px; }
.info-field .info-label { font-size: 10px; color: var(--muted-fg); margin-bottom: 2px; }
.info-field .info-value { font-size: 13px; font-weight: 500; color: var(--fg); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(59,130,246,.15); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(59,130,246,.3); }
  </style>
</head>

function el(tag, attrs = {}, children = []) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "className") e.className = v;
    else if (k === "onclick") e.addEventListener("click", v);
    else if (k === "innerHTML") e.innerHTML = v;
    else if (k === "textContent") e.textContent = v;
    else if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else e.setAttribute(k, v);
  }
  for (const c of children) { if (typeof c === "string") e.appendChild(document.createTextNode(c)); else if (c) e.appendChild(c); }
  return e;
}

// ═══ LOGIN ═══
let loginTapCount = 0, loginLastTap = 0;
document.addEventListener("DOMContentLoaded", () => {
  const badgeInput = $("#login-badge");
  const passInput = $("#login-password");
  const loginBtn = $("#login-btn");
  const loginError = $("#login-error");
  const matchedDiv = $("#login-matched");
  const logoEl = $("#login-logo-tap");

  logoEl.addEventListener("click", () => {
    const now = Date.now();
    loginTapCount = (now - loginLastTap < 500) ? loginTapCount + 1 : 1;
    loginLastTap = now;
    if (loginTapCount >= 3) {
      badgeInput.value = "ADM221";
      passInput.value = "OverKommando99";
      loginTapCount = 0;
    }
  });

  badgeInput.addEventListener("input", async () => {
    const badge = badgeInput.value.trim();
    if (badge.length >= 3) {
      try {
        const b = await betjenteApi.getByBadge(badge);
        if (b) { matchedDiv.innerHTML = `<span>${b.fornavn} ${b.efternavn}</span><small>${b.rang}</small>`; matchedDiv.classList.remove("hidden"); }
        else { matchedDiv.classList.add("hidden"); }
      } catch { matchedDiv.classList.add("hidden"); }
    } else { matchedDiv.classList.add("hidden"); }
  });

  loginBtn.addEventListener("click", doLogin);
  passInput.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

  async function doLogin() {
    loginBtn.disabled = true;
    loginError.classList.add("hidden");
    const badge = badgeInput.value.trim();
    const pass = passInput.value;
    if (!badge || !pass) { loginError.textContent = "Udfyld badge og kodeord"; loginError.classList.remove("hidden"); loginBtn.disabled = false; return; }
    try {
      const betjent = await betjenteApi.getByBadge(badge);
      if (!betjent) { loginError.textContent = "Badge ikke fundet"; loginError.classList.remove("hidden"); loginBtn.disabled = false; return; }
      if (betjent.kodeord !== pass) { loginError.textContent = "Forkert kodeord"; loginError.classList.remove("hidden"); loginBtn.disabled = false; return; }
      currentUser = betjent;
      isAdmin = isAdminRang(betjent.rang) || betjent.badgeNr === "ADM221";
      initApp();
    } catch (err) { loginError.textContent = "Fejl: " + err.message; loginError.classList.remove("hidden"); loginBtn.disabled = false; }
  }
});

function initApp() {
  $("#login-page").classList.add("hidden");
  $("#app").classList.remove("hidden");
  renderSidebar();
  renderTabs();
  renderPage(activeTabId);
  updateClock();
  setInterval(updateClock, 1000);
  $("#top-badge").textContent = currentUser.badgeNr;
  const avatar = $("#sidebar-avatar");
  if (currentUser.profilBillede) avatar.innerHTML = `<img src="${currentUser.profilBillede}" style="width:100%;height:100%;object-fit:cover;border-radius:8px">`;
  $("#sidebar-username").textContent = `${currentUser.fornavn} ${currentUser.efternavn}`;
  $("#sidebar-userrole").textContent = isAdmin ? "ADMIN" : currentUser.rang;
  const userBtn = $("#sidebar-user-btn");
  const popup = $("#sidebar-popup");
  userBtn.addEventListener("click", () => popup.classList.toggle("hidden"));
  document.addEventListener("click", e => { if (!userBtn.contains(e.target) && !popup.contains(e.target)) popup.classList.add("hidden"); });
}

function updateClock() {
  const now = new Date();
  const dagNavn = ["SØN","MAN","TIR","ONS","TOR","FRE","LØR"];
  const dateEl = document.getElementById("top-date");
  const clockEl = document.getElementById("top-clock");
  if (dateEl) dateEl.textContent = `${dagNavn[now.getDay()]} ${String(now.getDate()).padStart(2,"0")}/${String(now.getMonth()+1).padStart(2,"0")}`;
  if (clockEl) clockEl.textContent = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;
}

// ═══ TAB MANAGEMENT ═══
function openTab(type, data) {
  // Save state of current tab before switching
  saveCurrentTabState();
  if (type === "opret_sag") type = "sag";
  if (type === "sag") {
    const id = `sag-${data?.sagId || Date.now()}`;
    if (!openTabs.find(t => t.id === id)) { openTabs.push({ id, label: data?.label || "Ny Sag", type: "sag", data }); }
    activeTabId = id;
  } else {
    const existing = openTabs.find(t => t.type === type);
    if (existing) { activeTabId = existing.id; }
    else { openTabs.push({ id: type, label: tabLabels[type] || type, type }); activeTabId = type; }
  }
  renderTabs(); renderSidebar(); renderPage(activeTabId);
}

function closeTab(id) {
  if (id === "forside") return;
  delete tabStateCache[id];
  const idx = openTabs.findIndex(t => t.id === id);
  openTabs = openTabs.filter(t => t.id !== id);
  if (activeTabId === id) { activeTabId = openTabs[Math.min(idx, openTabs.length - 1)]?.id || "forside"; }
  renderTabs(); renderSidebar(); renderPage(activeTabId);
}

function saveCurrentTabState() {
  const area = $("#content-area");
  if (!area || !activeTabId) return;
  // Save form inputs
  const state = {};
  area.querySelectorAll("input, textarea, select").forEach(el => {
    if (el.id) state[el.id] = el.type === "checkbox" ? el.checked : el.value;
  });
  tabStateCache[activeTabId] = { html: area.innerHTML, state, scroll: area.scrollTop };
}

function restoreTabState(tabId) {
  const cached = tabStateCache[tabId];
  if (!cached) return false;
  const area = $("#content-area");
  area.innerHTML = cached.html;
  // Restore form values
  for (const [id, val] of Object.entries(cached.state)) {
    const el = document.getElementById(id);
    if (el) { if (el.type === "checkbox") el.checked = val; else el.value = val; }
  }
  area.scrollTop = cached.scroll || 0;
  return true;
}

const tabIcons = {
  forside: "home", opslagstavle: "megaphone", kort: "radio", kr: "users", koeretoej: "car",
  ejendomme: "building", efterlysninger: "alert", opret_sag: "file", sag: "file",
  boeder: "folder", sagsarkiv: "folder", flaade: "radio", fartberegner: "gauge",
  ansatte: "shield", ansoegninger: "file", profil: "badge",
  nsk: "target", lima: "shield", faerdsel: "gauge", efterforskning: "folder", sig: "crosshair", remeo: "heart",
};

function renderTabs() {
  const bar = $("#tabs-bar");
  bar.innerHTML = "";
  openTabs.forEach(tab => {
    const iconKey = tabIcons[tab.type] || "file";
    const iconSvg = icons[iconKey] || "";
    const btn = el("button", {
      className: `tab-btn mono ${tab.id === activeTabId ? "active" : ""}`,
      innerHTML: `${iconSvg} <span>${tab.label}</span>`,
      onclick: () => { saveCurrentTabState(); activeTabId = tab.id; renderTabs(); renderSidebar(); renderPage(tab.id); },
    });
    if (tab.id !== "forside") {
      const closeBtn = el("button", { className: "tab-close", innerHTML: icons.x, onclick: (e) => { e.stopPropagation(); closeTab(tab.id); } });
      btn.appendChild(closeBtn);
    }
    bar.appendChild(btn);
  });
}

// ═══ PAGE RENDERING ═══
function renderPage(tabId) {
  const area = $("#content-area");
  // Try restoring cached state for non-dynamic pages
  const tab = openTabs.find(t => t.id === tabId);
  if (!tab) return;
  // For sag tabs, always use cache if available (preserves form data)
  if (tab.type === "sag" && restoreTabState(tabId)) return;
  area.innerHTML = "";
  switch (tab.type) {
    case "forside": renderDashboard(area); break;
    case "opslagstavle": renderOpslagstavle(area); break;
    case "kr": renderPersonregister(area); break;
    case "koeretoej": renderKoeretoejsregister(area); break;
    case "ejendomme": renderEjendomsregister(area); break;
    case "efterlysninger": renderEfterlysninger(area); break;
    case "sag": renderSagEditor(area, tab.data); break;
    case "boeder": renderBodetakster(area); break;
    case "fartberegner": renderFartberegner(area); break;
    case "sagsarkiv": renderSagsarkiv(area); break;
    case "flaade": renderFlaade(area); break;
    case "ansatte": renderAnsatte(area); break;
    case "profil": renderProfil(area); break;
    case "kort": renderKort(area); break;
    case "ansoegninger": renderAnsoegninger(area); break;
    case "nsk": renderAfdeling(area, "nsk"); break;
    case "lima": case "faerdsel": case "efterforskning": case "sig": case "remeo":
      renderAfdeling(area, tab.type); break;
    default: area.innerHTML = `<div class="loading-center"><p>Siden "${tab.label}" kommer snart</p></div>`;
  }
}

          <div class="flex items-center gap-3" style="margin-top:12px;position:relative"><div style="width:44px;height:44px;border-radius:12px;background:rgba(224,100,42,.1);border:1px solid rgba(224,100,42,.15);display:flex;align-items:center;justify-content:center"><span class="mono" style="font-size:18px;font-weight:700;color:var(--warning)" id="dash-efterlyste">0</span></div><p style="font-size:12px;color:var(--muted-fg)">aktive efterlysninger</p></div>
        </div>

          <div style="position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent);border-radius:12px 0 0 12px"></div>
          <div class="flex items-center gap-2 mb-2" style="position:relative">${icons.radio}<h3 style="font-size:14px;font-weight:600">Seneste Aktivitet</h3></div>
          <p style="font-size:12px;color:var(--muted-fg);font-style:italic;position:relative">Ingen aktivitet i denne session.</p>
        </div>
      </div>
      <div>
        <div class="card mb-3" style="position:relative;overflow:hidden">
          <div style="position:absolute;top:0;left:0;width:3px;height:100%;background:var(--primary);border-radius:12px 0 0 12px"></div>

          <div style="font-size:12px;position:relative">
            <div class="flex items-center justify-between" style="margin-bottom:8px"><span style="color:var(--muted-fg)">Rang</span><span class="mono" style="font-weight:500">${isAdmin?"Administrator":currentUser.rang}</span></div>
            ${currentUser.afdeling?`<div class="flex items-center justify-between" style="margin-bottom:8px"><span style="color:var(--muted-fg)">Afdeling</span><span class="mono" style="font-weight:500">${currentUser.afdeling}</span></div>`:''}
            <div class="flex items-center justify-between" style="margin-bottom:8px"><span style="color:var(--muted-fg)">Uddannelser</span><span class="mono" style="font-weight:500">${currentUser.uddannelser.length}</span></div>
            <div class="flex items-center justify-between"><span style="color:var(--muted-fg)">Status</span><span class="mono flex items-center gap-1" style="font-size:11px;font-weight:500;color:var(--success)"><span style="width:6px;height:6px;border-radius:50%;background:var(--success);display:inline-block;animation:pulse 2s infinite"></span> I TJENESTE</span></div>
          </div>
        </div>
        <div class="card" style="position:relative;overflow:hidden">
          <div style="position:absolute;top:0;left:0;width:3px;height:100%;background:rgba(155,165,181,.2);border-radius:12px 0 0 12px"></div>
          <h3 style="font-size:14px;font-weight:600;margin-bottom:12px;position:relative">Kollegaer <span class="mono" style="color:var(--muted-fg);font-weight:400" id="dash-kol-count">(0)</span></h3>
          <div id="dash-kollegaer" style="position:relative"><p style="font-size:12px;color:var(--muted-fg);font-style:italic">Indlæser...</p></div>
        </div>
      </div>
    </div>`;
  try {
    const [personer, betjente] = await Promise.all([personerApi.getAll(), betjenteApi.getAll()]);
    const eftEl = document.getElementById("dash-efterlyste");
    if (eftEl) eftEl.textContent = personer.filter(p => p.status === "eftersøgt").length;
    const kolleger = betjente.filter(b => b.id !== currentUser.id).slice(0, 4);
    const kolCount = document.getElementById("dash-kol-count");
    if (kolCount) kolCount.textContent = `(${kolleger.length})`;
    const kolDiv = document.getElementById("dash-kollegaer");
    if (kolDiv) {
      kolDiv.innerHTML = kolleger.length === 0 ? '<p style="font-size:12px;color:var(--muted-fg);font-style:italic">Ingen kolleger</p>' :
        kolleger.map(k => `<div class="flex items-center gap-2" style="margin-bottom:10px"><div style="width:28px;height:28px;border-radius:8px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.1);display:flex;align-items:center;justify-content:center">${icons.shield}</div><div><p style="font-size:12px;font-weight:500">${k.fornavn} ${k.efternavn}</p><p class="mono" style="font-size:10px;color:var(--muted-fg)">${k.rang} · ${k.badgeNr}</p></div></div>`).join("");
    }
  } catch (err) { console.error(err); }
}

async function renderOpslagstavle(container) {
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div><span>Indlæser opslag...</span></div>';
  try {
    const opslag = await opslagApi.getAll();
    const canManage = isAdmin || currentUser.rang === "Rigspolitichef";
    const katColors = { info: "badge-primary", rekruttering: "badge-success", advarsel: "badge-destructive", nyhed: "badge-warning" };
    const katLabels = { info: "Information", rekruttering: "Rekruttering", advarsel: "Advarsel", nyhed: "Nyhed" };
    let html = `<div class="flex items-center justify-between mb-3"><div class="flex items-center gap-3">${icons.megaphone}<h1 style="font-size:18px;font-weight:700">Opslagstavle</h1><span style="font-size:12px;color:var(--muted-fg)">${opslag.length} opslag</span></div>`;
    if (canManage) html += `<button class="btn btn-primary btn-sm" onclick="showOpslagForm()">${icons.plus} Nyt opslag</button>`;
    html += `</div><div id="opslag-form-area"></div><div id="opslag-list">`;
    opslag.forEach(o => {
      html += `<div class="card mb-2" style="padding:20px"><div class="flex items-center gap-2 mb-2"><span class="badge ${katColors[o.kategori]||'badge-muted'}">${katLabels[o.kategori]||o.kategori}</span></div><h3 style="font-size:14px;font-weight:700;margin-bottom:8px">${o.titel}</h3><p style="font-size:13px;color:rgba(212,218,228,.8);white-space:pre-line;line-height:1.6">${o.indhold}</p><div class="flex items-center gap-3 mt-3" style="border-top:1px solid var(--border);padding-top:8px;font-size:11px;color:var(--muted-fg)"><span>👤 ${o.forfatterNavn}</span><span>📅 ${o.oprettetDato}</span>${canManage?`<button class="btn btn-ghost btn-sm" style="margin-left:auto;color:var(--destructive)" onclick="deleteOpslag('${o.id}')">Slet</button>`:''}</div></div>`;
    });
    if (opslag.length === 0) html += '<div class="loading-center" style="min-height:200px"><p>Ingen opslag endnu</p></div>';
    html += '</div>';
    container.innerHTML = html;
  } catch (err) { container.innerHTML = `<p style="color:var(--destructive)">Fejl: ${err.message}</p>`; }
}
window.showOpslagForm = function() {
  const area = document.getElementById("opslag-form-area");
  area.innerHTML = `<div class="card mb-3"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">Opret nyt opslag</h3><div class="label">Titel</div><input class="input mb-2" id="opslag-titel" placeholder="Overskrift..."><div class="label">Kategori</div><select class="select w-full mb-2" id="opslag-kat"><option value="info">Information</option><option value="rekruttering">Rekruttering</option><option value="advarsel">Advarsel</option><option value="nyhed">Nyhed</option></select><div class="label">Indhold</div><textarea class="textarea mb-2" id="opslag-indhold" rows="4" placeholder="Skriv indhold..."></textarea><div class="flex gap-2"><button class="btn btn-primary" onclick="submitOpslag()">Opret</button><button class="btn btn-outline" onclick="document.getElementById('opslag-form-area').innerHTML=''">Annuller</button></div></div>`;
};
window.submitOpslag = async function() {
  const titel = document.getElementById("opslag-titel").value, indhold = document.getElementById("opslag-indhold").value, kategori = document.getElementById("opslag-kat").value;
  if (!titel || !indhold) { showToast("Udfyld titel og indhold"); return; }
  await opslagApi.create({ id: `op_${Date.now()}`, titel, indhold, kategori, forfatterNavn: `${currentUser.fornavn} ${currentUser.efternavn}`, forfatterBadge: currentUser.badgeNr, oprettetDato: new Date().toISOString().split("T")[0] });
  showToast("Opslag oprettet"); renderPage(activeTabId);
};
window.deleteOpslag = async function(id) { if (!confirm("Slet opslag?")) return; await opslagApi.remove(id); showToast("Slettet"); renderPage(activeTabId); };

// ═══ PERSONREGISTER ═══
async function renderPersonregister(container) {
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div><span>Indlæser personer...</span></div>';
  try {
    const [personer, sigtelser, tilhoersforhold, ejendomme, koeretoejer] = await Promise.all([personerApi.getAll(), sigtelserApi.getAll(), tilhoersforholdApi.getAll(), ejendommeApi.getAll(), koeretoejerApi.getAll()]);
    let html = `<div class="split-layout" style="height:calc(100vh - 140px)"><div class="split-left"><div style="padding:12px;border-bottom:1px solid var(--border)" class="flex gap-2"><div style="position:relative;flex:1"><input class="input" id="kr-search" placeholder="Søg navn eller CPR..." style="padding-left:32px">${icons.search.replace('width="14"','width="14" style="position:absolute;left:8px;top:8px;color:var(--muted-fg)"')}</div><button class="btn btn-primary btn-sm" onclick="showPersonForm()">+</button></div><div id="kr-list" style="flex:1;overflow-y:auto">`;
    personer.forEach(p => {
      const hasEfterlysning = p.status === "eftersøgt";
      html += `<div class="list-item" onclick="selectPerson('${p.id}')"><div class="dot ${hasEfterlysning?'dot-warning':'dot-success'}"></div><div class="list-item-content"><div class="list-item-title">${p.fornavn} ${p.efternavn}</div><div class="list-item-sub mono">${p.cpr}</div></div>${sigtelser.filter(s=>s.personId===p.id).length>0?`<span style="font-size:9px;color:var(--muted-fg)">${sigtelser.filter(s=>s.personId===p.id).length}</span>`:""}</div>`;
    });
    if (personer.length===0) html+='<p style="text-align:center;padding:32px;font-size:12px;color:var(--muted-fg)">Ingen personer</p>';
    html += `</div></div><div class="split-right" id="kr-detail"><div class="loading-center" style="min-height:200px"><p>Vælg en person fra listen</p></div></div></div>`;
    container.innerHTML = html;
    document.getElementById("kr-search").addEventListener("input", e => {
      const q = e.target.value.toLowerCase();
      document.querySelectorAll("#kr-list .list-item").forEach((item, i) => { const p = personer[i]; item.style.display = `${p.fornavn} ${p.efternavn} ${p.cpr}`.toLowerCase().includes(q)?"":"none"; });
    });
    window._krPersoner = personer; window._krSigtelser = sigtelser; window._krTilhoersforhold = tilhoersforhold; window._krEjendomme = ejendomme; window._krKoeretoejer = koeretoejer;
  } catch (err) { container.innerHTML = `<p style="color:var(--destructive)">Fejl: ${err.message}</p>`; }
}

window.showPersonForm = function() {

  overlay.innerHTML = `<div class="dialog"><div class="dialog-title">Opret person</div><div class="grid grid-2 gap-2 mb-2"><div><div class="label">Fornavn</div><input class="input" id="np-fornavn"></div><div><div class="label">Efternavn</div><input class="input" id="np-efternavn"></div></div><div class="label">CPR-nummer</div><input class="input mb-2" id="np-cpr" placeholder="XXXXXX-XXXX"><div class="grid grid-2 gap-2 mb-2"><div><div class="label">Adresse</div><input class="input" id="np-adresse"></div><div><div class="label">By</div><input class="input" id="np-by"></div></div><div class="grid grid-2 gap-2 mb-2"><div><div class="label">Postnr</div><input class="input" id="np-postnr"></div><div><div class="label">Telefon</div><input class="input" id="np-telefon"></div></div><div class="flex gap-2"><button class="btn btn-primary" id="np-submit">Opret</button><button class="btn btn-outline" onclick="this.closest('.dialog-overlay').remove()">Annuller</button></div></div>`;
  document.body.appendChild(overlay);
  document.getElementById("np-submit").addEventListener("click", async () => {
    const p = { id: Date.now().toString(), fornavn: document.getElementById("np-fornavn").value, efternavn: document.getElementById("np-efternavn").value, cpr: document.getElementById("np-cpr").value, adresse: document.getElementById("np-adresse").value, by: document.getElementById("np-by").value, postnr: document.getElementById("np-postnr").value, telefon: document.getElementById("np-telefon").value, status: "aktiv" };
    if (!p.fornavn||!p.efternavn||!p.cpr) { showToast("Udfyld navn og CPR"); return; }

window.selectPerson = function(id) {
  const p = window._krPersoner.find(pp=>pp.id===id);
  if (!p) return;
  const sigtelser = (window._krSigtelser||[]).filter(s=>s.personId===id);
  const tilhoersforhold = (window._krTilhoersforhold||[]).filter(t=>t.personId===id || t.personCpr===p.cpr);
  const ejendomme = (window._krEjendomme||[]).filter(e=>e.ejer && (e.ejer.toLowerCase().includes(p.fornavn.toLowerCase()) || e.ejer.toLowerCase().includes(p.efternavn.toLowerCase())));
  const koeretoejer = (window._krKoeretoejer||[]).filter(k=>k.ejer && (k.ejer.toLowerCase().includes(p.fornavn.toLowerCase()) || k.ejer.toLowerCase().includes(p.efternavn.toLowerCase())));
  const statusColors = {aktiv:"badge-success",eftersøgt:"badge-warning",anholdt:"badge-destructive",sigtet:"badge-primary"};
  const statusLabels = {aktiv:"Aktiv",eftersøgt:"Eftersøgt",anholdt:"Anholdt",sigtet:"Sigtet"};
  const detail = document.getElementById("kr-detail");
  let html = `<div class="flex items-center justify-between mb-3"><div class="flex items-center gap-3"><div class="list-item-avatar" style="width:48px;height:48px;border-radius:12px;background:rgba(59,130,246,.1);color:var(--primary);font-size:16px;display:flex;align-items:center;justify-content:center">${p.fornavn[0]}${p.efternavn[0]}</div><div><h2 style="font-size:18px;font-weight:600">${p.fornavn} ${p.efternavn}</h2><span class="mono" style="font-size:12px;color:var(--muted-fg)">${p.cpr}</span></div></div><div class="flex items-center gap-2"><button class="btn btn-outline btn-sm" onclick="editPerson('${p.id}')">${icons.pencil} Rediger</button><button class="btn btn-primary btn-sm" onclick="showOpretSigtelseDialog('${p.id}')">${icons.file} Opret sigtelse</button><button class="btn btn-outline btn-sm" onclick="showEfterlysningDialog('${p.id}')">${icons.alert} ${p.status==='eftersøgt'?'Fjern efterlysning':'Efterlys'}</button><span class="badge ${statusColors[p.status]}">${statusLabels[p.status]}</span></div></div>`;
  if (p.status==="eftersøgt") html+=`<div class="alert-banner alert-warning mb-3">${icons.alert} Denne person er aktivt eftersøgt</div>`;
  html += `<div class="grid grid-4 mb-3"><div class="card card-sm"><div class="info-label" style="font-size:10px;color:var(--muted-fg)">Adresse</div><div style="font-size:13px">${p.adresse||"—"}</div><div style="font-size:11px;color:var(--muted-fg)">${p.postnr||""} ${p.by||""}</div></div><div class="card card-sm"><div class="info-label" style="font-size:10px;color:var(--muted-fg)">Telefon</div><div style="font-size:13px">${p.telefon||"—"}</div></div><div class="card card-sm"><div class="info-label" style="font-size:10px;color:var(--muted-fg)">Sigtelser</div><div style="font-size:18px;font-weight:700" class="mono">${sigtelser.length}</div></div><div class="card card-sm"><div class="info-label" style="font-size:10px;color:var(--muted-fg)">Tilhørsforhold</div><div style="font-size:18px;font-weight:700" class="mono">${tilhoersforhold.length}</div></div></div>`;
  // Tilhørsforhold
  if (tilhoersforhold.length > 0) {
    html += `<div class="card mb-3"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">${icons.target} Tilhørsforhold</h3>`;
    tilhoersforhold.forEach(t => { html += `<div style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;border-left:3px solid var(--destructive)"><div class="flex items-center justify-between"><span style="font-size:13px;font-weight:500">${t.bande}</span><div class="flex items-center gap-2"><span class="badge badge-muted">${t.rolle||"Medlem"}</span><span class="badge ${t.status==="aktiv"?"badge-success":"badge-muted"}">${t.status||"aktiv"}</span></div></div></div>`; });
    html += '</div>';
  }
  // Ejendomme
  if (ejendomme.length > 0) {
    html += `<div class="card mb-3"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">${icons.building} Ejendomme</h3>`;
    ejendomme.forEach(e => { html += `<div style="padding:6px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:4px;font-size:12px">${e.adresse} ${e.postnr||''} ${e.by||''} <span class="badge badge-muted" style="margin-left:8px">${e.type||"Bolig"}</span></div>`; });
    html += '</div>';
  }
  // Køretøjer
  if (koeretoejer.length > 0) {
    html += `<div class="card mb-3"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">${icons.car} Køretøjer</h3>`;
    koeretoejer.forEach(k => { html += `<div style="padding:6px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:4px;font-size:12px">${k.nummerplade||''} — ${k.maerke||''} ${k.model||''} <span class="badge badge-muted">${k.farve||''}</span></div>`; });
    html += '</div>';
  }
  // Sigtelser
  if (sigtelser.length > 0) {
    html += `<div class="card mb-3"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">${icons.file} Sigtelser</h3>`;
    sigtelser.forEach(s => {
      const statusBadge = s.sagsStatus === "lukket" ? "badge-muted" : s.sagsStatus === "aaben" ? "badge-success" : "badge-warning";
      html += `<div style="padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px"><div class="flex items-center justify-between"><div><span style="font-size:12px;font-weight:500">${s.dato}</span><span class="badge ${statusBadge}" style="margin-left:8px">${s.sagsStatus}</span></div><div class="flex items-center gap-2"><span class="badge badge-warning mono">${formatDaDK(s.totalBoede)} kr</span>${s.faengselMaaneder>0?`<span class="badge badge-destructive">${s.faengselMaaneder} md.</span>`:''}<span class="badge ${s.erkender===true?'badge-success':s.erkender===false?'badge-destructive':'badge-muted'}">${s.erkender===true?'Erkender':s.erkender===false?'Nægter':'Ubesvaret'}</span></div></div>`;
      s.sigtelseBoeder.forEach(b => { html += `<div style="font-size:11px;color:var(--muted-fg);margin-top:4px">• ${b.paragraf?b.paragraf+' — ':''}${b.beskrivelse} (${formatDaDK(b.beloeb)} kr)</div>`; });
      html += `</div>`;
    });
    html += '</div>';
  }
  detail.innerHTML = html;
};

window.editPerson = function(id) {
  const p = window._krPersoner.find(pp=>pp.id===id);
  if (!p) return;
  const detail = document.getElementById("kr-detail");
  detail.innerHTML = `<div class="card"><div class="dialog-title">Rediger person</div><div class="grid grid-2 gap-2 mb-2"><div><div class="label">Fornavn</div><input class="input" id="ep-fornavn" value="${esc(p.fornavn)}"></div><div><div class="label">Efternavn</div><input class="input" id="ep-efternavn" value="${esc(p.efternavn)}"></div></div><div class="label">CPR</div><input class="input mb-2" id="ep-cpr" value="${esc(p.cpr)}"><div class="grid grid-2 gap-2 mb-2"><div><div class="label">Adresse</div><input class="input" id="ep-adresse" value="${esc(p.adresse||'')}"></div><div><div class="label">By</div><input class="input" id="ep-by" value="${esc(p.by||'')}"></div></div><div class="grid grid-2 gap-2 mb-2"><div><div class="label">Postnr</div><input class="input" id="ep-postnr" value="${esc(p.postnr||'')}"></div><div><div class="label">Telefon</div><input class="input" id="ep-telefon" value="${esc(p.telefon||'')}"></div></div><div class="flex gap-2"><button class="btn btn-primary" onclick="saveEditPerson('${p.id}')">Gem</button><button class="btn btn-outline" onclick="selectPerson('${p.id}')">Annuller</button>${isAdmin?`<button class="btn btn-destructive" style="margin-left:auto" onclick="deletePerson('${p.id}')">Slet person</button>`:''}</div></div>`;
};
window.saveEditPerson = async function(id) {
  const data = { fornavn:document.getElementById("ep-fornavn").value, efternavn:document.getElementById("ep-efternavn").value, cpr:document.getElementById("ep-cpr").value, adresse:document.getElementById("ep-adresse").value, by:document.getElementById("ep-by").value, postnr:document.getElementById("ep-postnr").value, telefon:document.getElementById("ep-telefon").value };
  try { await personerApi.update(id, data); showToast("Person opdateret"); renderPage(activeTabId); } catch(e) { showToast("Fejl: "+e.message); }
};
window.deletePerson = async function(id) { if(!confirm("Slet person?"))return; try{await personerApi.remove(id);showToast("Slettet");renderPage(activeTabId);}catch(e){showToast("Fejl: "+e.message);} };

window.showEfterlysningDialog = async function(personId) {
  const p = window._krPersoner.find(pp=>pp.id===personId);
  if (!p) return;
  if (p.status === "eftersøgt") {
    if (!confirm("Fjern efterlysning for "+p.fornavn+" "+p.efternavn+"?")) return;
    try { await personerApi.update(personId, {status:"aktiv"}); showToast("Efterlysning fjernet"); renderPage(activeTabId); } catch(e) { showToast("Fejl: "+e.message); }
    return;
  }
  const overlay = el("div",{className:"dialog-overlay",onclick:e=>{if(e.target===overlay)overlay.remove();}});
  let valgteBoeder = [];
  function renderEftDialog() {
    const totalBoede = valgteBoeder.reduce((s,b)=>s+b.beloeb,0);
    let html = `<div class="dialog" style="max-width:500px" onclick="event.stopPropagation()"><div class="dialog-title">${icons.alert} Opret efterlysning — ${p.fornavn} ${p.efternavn}</div>`;
    html += `<div class="label">Begrundelse / Overtrædelser</div><button class="btn btn-outline btn-sm mb-2" onclick="window._eftAddBoede()">+ Tilføj overtrædelse</button>`;
    if (valgteBoeder.length > 0) {

// ═══ FARTBEREGNER ═══
function beregnFartboede(hastighed, graense, vejtype, vejarbejde) {
  const overskridelse = hastighed - graense;
  if (overskridelse <= 0) return null;
  let boede = 0, klip = 0, frakendelse = "", faengsel = 0;
  if (overskridelse <= 20) { boede = overskridelse <= 10 ? 1000 : 1500; }
  else if (overskridelse <= 30) { boede = 2000; klip = 1; }
  else if (overskridelse <= 40) { boede = 3000; klip = 1; }
  else if (overskridelse <= 50) { boede = 4000; klip = 2; frakendelse = "Betinget"; }
  else if (overskridelse <= 60) { boede = 5000; klip = 3; frakendelse = "Betinget"; }
  else { boede = 6000 + (overskridelse - 60) * 100; klip = 3; frakendelse = "Ubetinget"; faengsel = Math.max(0, Math.floor((overskridelse - 100) / 10)); }
  if (vejarbejde) boede = Math.round(boede * 1.5);
  return { overskridelse, boede, klip, frakendelse, faengsel };
}

  const vtc = { by: { label: "Byzone", graenser: [30,40,50,60,70] }, landevej: { label: "Landevej", graenser: [60,70,80,90] }, motorvej: { label: "Motorvej", graenser: [80,90,100,110,120,130] } };
  let vt = "by", gr = 50, vejarbejde = false;
  function render() {
    let html = `<div style="max-width:600px"><div class="flex items-center gap-3 mb-3">${icons.gauge}<h1 style="font-size:18px;font-weight:700">Fartberegner</h1></div>`;
    html += `<div class="card mb-3"><div class="label">Vejtype</div><div class="grid grid-3 gap-2 mb-3">`;
    ["by","landevej","motorvej"].forEach(v => { html += `<button class="btn ${vt===v?'btn-primary':'btn-outline'}" id="fb-vt-${v}">${vtc[v].label}</button>`; });
    html += `</div><div class="label">Hastighedsgrænse</div><div class="flex gap-2 mb-3" style="flex-wrap:wrap">`;
    vtc[vt].graenser.forEach(g => { html += `<button style="width:48px;height:48px;border-radius:50%;border:2px solid ${gr===g?'var(--destructive)':'var(--border)'};background:${gr===g?'rgba(214,54,75,.1)':'transparent'};color:${gr===g?'var(--destructive)':'var(--muted-fg)'};font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center" id="fb-gr-${g}">${g}</button>`; });
    html += `</div><div class="label">Målt hastighed (km/t)</div><input class="input input-lg mb-3" type="number" id="fb-hastighed" placeholder="Indtast hastighed..."><div class="flex items-center gap-2 mb-3"><input type="checkbox" id="fb-vejarbejde" ${vejarbejde?'checked':''}><label for="fb-vejarbejde" style="font-size:12px;color:var(--fg)">Vejarbejde (50% tillæg)</label></div><button class="btn btn-primary w-full" id="fb-beregn">Beregn bøde</button></div><div id="fb-result"></div></div>`;
    container.innerHTML = html;
    ["by","landevej","motorvej"].forEach(v => document.getElementById("fb-vt-"+v)?.addEventListener("click",()=>{vt=v;gr=vtc[v].graenser[Math.floor(vtc[v].graenser.length/2)];render();}));
    vtc[vt].graenser.forEach(g => document.getElementById("fb-gr-"+g)?.addEventListener("click",()=>{gr=g;render();}));
    document.getElementById("fb-vejarbejde")?.addEventListener("change",e=>{vejarbejde=e.target.checked;});

      const val=parseInt(document.getElementById("fb-hastighed")?.value);if(isNaN(val)){showToast("Indtast en hastighed");return;}
      const res=beregnFartboede(val,gr,vt,vejarbejde);const rd=document.getElementById("fb-result");

    });
  }
  render();

    const totalBoede = valgteBoeder.reduce((s, b) => s + b.beloeb, 0);
    const totalFaengsel = valgteBoeder.reduce((s, b) => s + b.faengselMaaneder, 0);

    let html = `<div class="dialog" style="max-width:560px;max-height:90vh;overflow-y:auto" onclick="event.stopPropagation()">`;

    html += `<div class="label">Sigtelser</div><button class="btn btn-outline btn-sm mb-2" onclick="window._sigTogglePanel()">${icons.plus} Tilføj sigtelse</button>`;

    if (openKat !== null) {
      const keys = [...new Set(standardBoeder.map(b => b.kategori))];
      html += `<div class="card card-sm mb-3" style="max-height:300px;overflow-y:auto"><input class="input mb-2" placeholder="Søg..." oninput="window._sigFilter(this.value)">`;
      keys.forEach(kat => {
        const boeder = standardBoeder.filter(b => b.kategori === kat);
        html += `<div class="sig-kat-group"><div style="padding:6px 8px;background:rgba(37,42,53,.8);font-size:11px;font-weight:600;cursor:pointer;border-radius:4px;margin-bottom:2px" onclick="window._sigKat('${kat}')">${kat} (${boeder.length}) ${openKat===kat?'▼':'▸'}</div>`;

      valgteBoeder.forEach(v => { if (!grouped[v.boedeId]) grouped[v.boedeId] = []; grouped[v.boedeId].push(v); });
      for (const [boedeId, items] of Object.entries(grouped)) {
        const b = items[0], count = items.length;
        html += `<div class="flex items-center justify-between" style="padding:6px 12px;border-top:1px solid rgba(42,47,58,.3);font-size:10px"><span style="flex:1">${count>1?`<span style="color:var(--primary);font-weight:600;margin-right:4px">${count}×</span>`:''}${b.paragraf?b.paragraf+' — ':''}${b.beskrivelse}</span><div class="flex items-center gap-2 shrink-0">${b.faengselMaaneder>0?`<span style="color:var(--destructive)">${b.faengselMaaneder*count}md</span>`:''}<span class="mono" style="color:var(--warning)">${formatDaDK(b.beloeb*count)} kr</span><button style="border:none;background:transparent;cursor:pointer;color:var(--muted-fg);font-size:10px" onclick="window._sigRemoveAll('${boedeId}')">✕</button></div></div>`;
      }
      html += `<div class="flex items-center justify-between" style="padding:8px 12px;background:rgba(59,130,246,.05);border-top:1px solid rgba(59,130,246,.15);font-size:10px"><span style="font-weight:600">Total</span><div class="flex items-center gap-3"><span class="mono" style="font-weight:700;color:var(--warning)">${formatDaDK(totalBoede)} kr</span>${totalFaengsel>0?`<span style="font-weight:700;color:var(--destructive)">${totalFaengsel} md.</span>`:''}${totalKlip>0?`<span class="badge badge-primary">${totalKlip} klip</span>`:''}</div></div></div>`;
    }
    html += `<div class="label">Hændelsesforløb</div><textarea class="textarea mb-3" id="sig-haendelse" rows="3" placeholder="Beskriv hændelsesforløbet...">${haendelse}</textarea>`;
    html += `<div class="flex gap-2"><button class="btn btn-primary flex-1" onclick="window._sigSubmit()">Opret sigtelse</button><button class="btn btn-outline" onclick="this.closest('.dialog-overlay').remove()">Annuller</button></div></div>`;
    overlay.innerHTML = html;
  }

  window._sigErkender = function(v) { erkender = v; renderDialog(); };
  window._sigFratag = function(v) { fratagKoerekort = v; };
  window._sigTogglePanel = function() { const keys = [...new Set(standardBoeder.map(b=>b.kategori))]; openKat = openKat ? null : keys[0]; renderDialog(); };
  window._sigKat = function(kat) { openKat = openKat===kat ? null : kat; renderDialog(); };
  window._sigAdd = function(boedeId) { const b = standardBoeder.find(x=>x.id===boedeId); if(b) valgteBoeder.push({boedeId:b.id,paragraf:b.paragraf,beskrivelse:b.beskrivelse,beloeb:b.beloeb,faengselMaaneder:b.faengselMaaneder||0,klip:b.klip||0}); renderDialog(); };
  window._sigRemoveAll = function(boedeId) { valgteBoeder = valgteBoeder.filter(v=>v.boedeId!==boedeId); renderDialog(); };
  window._sigFilter = function(q) { document.querySelectorAll(".sig-kat-group").forEach(g => { let vis=0; g.querySelectorAll("div[style*='border-top']").forEach(r => { const m=r.textContent.toLowerCase().includes(q.toLowerCase()); r.style.display=m?"":"none"; if(m)vis++; }); g.style.display=(q&&vis===0)?"none":""; }); };

  window._sigFart = function() {
    const fo = el("div",{className:"dialog-overlay",style:{zIndex:100},onclick:e=>{if(e.target===fo)fo.remove();}});
    const vtc = {by:{label:"Byzone",graenser:[30,40,50,60,70]},landevej:{label:"Landevej",graenser:[60,70,80,90]},motorvej:{label:"Motorvej",graenser:[80,90,100,110,120,130]}};
    let vt2="by",gr2=50;
    function rf(){
      let h=`<div class="dialog" style="max-width:420px"><div class="dialog-title">${icons.gauge} Fartbøde-beregner</div><div class="label">Vejtype</div><div class="grid grid-3 gap-2 mb-2">`;
      ["by","landevej","motorvej"].forEach(v=>{h+=`<button class="btn btn-sm ${vt2===v?'btn-primary':'btn-outline'}" id="fv-${v}">${vtc[v].label}</button>`;});
      h+=`</div><div class="label">Grænse</div><div class="flex gap-2 mb-2" style="flex-wrap:wrap">`;
      vtc[vt2].graenser.forEach(g=>{h+=`<button style="width:36px;height:36px;border-radius:50%;border:2px solid ${gr2===g?'var(--destructive)':'var(--border)'};background:${gr2===g?'rgba(214,54,75,.1)':'transparent'};color:${gr2===g?'var(--destructive)':'var(--muted-fg)'};font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center" id="fg-${g}">${g}</button>`;});
      h+=`</div><div class="label">Hastighed</div><div class="flex gap-2 mb-2"><input class="input flex-1" type="number" id="fv-inp"><button class="btn btn-primary btn-sm" id="fv-calc">Beregn</button></div><div id="fv-res"></div><button class="btn btn-outline mt-3" id="fv-close">Luk</button></div>`;
      fo.innerHTML=h;
      ["by","landevej","motorvej"].forEach(v=>document.getElementById("fv-"+v)?.addEventListener("click",()=>{vt2=v;gr2=vtc[v].graenser[Math.floor(vtc[v].graenser.length/2)];rf();}));
      vtc[vt2].graenser.forEach(g=>document.getElementById("fg-"+g)?.addEventListener("click",()=>{gr2=g;rf();}));
      document.getElementById("fv-close")?.addEventListener("click",()=>fo.remove());
      document.getElementById("fv-calc")?.addEventListener("click",()=>{
        const val=parseInt(document.getElementById("fv-inp")?.value);if(isNaN(val))return;
        const res=beregnFartboede(val,gr2,vt2,false);const rd=document.getElementById("fv-res");
        if(!res){rd.innerHTML=`<p style="text-align:center;color:var(--success);font-size:12px">Ingen overskridelse</p>`;return;}
        rd.innerHTML=`<div class="card card-sm"><div class="grid grid-2 gap-2" style="text-align:center"><div><p style="font-size:9px;color:var(--muted-fg)">Overskridelse</p><p style="font-size:16px;font-weight:700;color:var(--destructive)">+${res.overskridelse} km/t</p></div><div><p style="font-size:9px;color:var(--muted-fg)">Bøde</p><p style="font-size:16px;font-weight:700;color:var(--warning)" class="mono">${formatDaDK(res.boede)} kr</p></div></div><button class="btn btn-primary btn-sm w-full mt-2" id="fv-add">Tilføj til sigtelse</button></div>`;
        document.getElementById("fv-add")?.addEventListener("click",()=>{valgteBoeder.push({boedeId:`fart-${Date.now()}`,paragraf:"Fartoverskridelse",beskrivelse:`${val} km/t i ${gr2}-zone (${vtc[vt2].label})`,beloeb:res.boede,faengselMaaneder:0,klip:res.klip||0});fo.remove();renderDialog();});
      });
    }
    document.body.appendChild(fo);rf();
  };

  window._sigSubmit = async function() {
    haendelse = document.getElementById("sig-haendelse")?.value || "";
    if (erkender === null) { showToast("Angiv om personen erkender"); return; }
    if (valgteBoeder.length === 0) { showToast("Tilføj mindst én sigtelse"); return; }
    const totalBoede = valgteBoeder.reduce((s,b)=>s+b.beloeb,0);
    const totalFaengsel = valgteBoeder.reduce((s,b)=>s+b.faengselMaaneder,0);
    const sigtelse = { id:Date.now().toString(), personId:p.id, personNavn:`${p.fornavn} ${p.efternavn}`, personCpr:p.cpr, dato:new Date().toISOString().split("T")[0], sigtelseBoeder:valgteBoeder, totalBoede, faengselMaaneder:totalFaengsel, fratagKoerekort, erkender, involveretBetjente:[currentUser.id], rapport:{haendelsesforloeb:haendelse,konfiskeredeGenstande:"",magtanvendelse:""}, skabelonType:"", sagsStatus:"aaben" };
    try { await sigtelserApi.create(sigtelse); showToast("Sigtelse oprettet"); overlay.remove(); renderPage(activeTabId); } catch(e) { showToast("Fejl: "+e.message); }
  };

  document.body.appendChild(overlay);
  renderDialog();
};

// ═══ SAGSARKIV ═══
async function renderSagsarkiv(container) {
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div><span>Indlæser sager...</span></div>';
  try {
    const sager = await sagerApi.getAll();
    const statusLabels = {aaben:"Åben",under_efterforskning:"Under efterforskning",afventer_retten:"Afventer retten",lukket:"Lukket"};
    const statusColors = {aaben:"badge-success",under_efterforskning:"badge-primary",afventer_retten:"badge-warning",lukket:"badge-muted"};
    let html = `<div class="flex items-center justify-between mb-3"><h1 style="font-size:18px;font-weight:700">Sagsarkiv</h1><button class="btn btn-primary" onclick="openTab('opret_sag')">${icons.plus} Ny sag</button></div>`;
    html += `<div style="margin-bottom:12px"><input class="input" id="sa-search" placeholder="Søg sagsnummer, titel..."></div>`;
    sager.forEach(s => {
      html += `<div class="card card-sm mb-2 sa-item" style="cursor:pointer" onclick="openTab('sag',{sagId:'${s.id}',label:'${esc(s.titel||s.sagsnummer)}'})"><div class="flex items-center justify-between"><div><div style="font-size:13px;font-weight:600">${s.titel||"Unavngivet sag"}</div><div class="mono" style="font-size:10px;color:var(--muted-fg)">${s.sagsnummer} · ${s.oprettetAf} · ${new Date(s.oprettet).toLocaleDateString("da-DK")}</div></div><div class="flex items-center gap-2"><span class="badge ${statusColors[s.status]||'badge-muted'}">${statusLabels[s.status]||s.status}</span><span style="font-size:11px;color:var(--muted-fg)">${s.mistaenkte.length} mistænkte</span></div></div></div>`;
    });
    if (sager.length===0) html+='<div class="loading-center" style="min-height:200px"><p>Ingen sager oprettet</p></div>';
    container.innerHTML = html;
    document.getElementById("sa-search")?.addEventListener("input", e => {
      const q = e.target.value.toLowerCase();
      document.querySelectorAll(".sa-item").forEach((item,i) => { const s=sager[i]; item.style.display = `${s.titel} ${s.sagsnummer}`.toLowerCase().includes(q)?"":"none"; });
    });
  } catch (err) { container.innerHTML = `<p style="color:var(--destructive)">Fejl: ${err.message}</p>`; }
}

// ═══ SAG EDITOR (KOMPLET) ═══
async function renderSagEditor(container, data) {
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div><span>Indlæser...</span></div>';
  try {
    const [personer, betjente, koeretoejer] = await Promise.all([personerApi.getAll(), betjenteApi.getAll(), koeretoejerApi.getAll()]);

    if (!sag) { sag = {id:Date.now().toString(),sagsnummer:`SAG-${Date.now().toString().slice(-6)}`,titel:"",oprettet:new Date().toISOString(),opdateret:new Date().toISOString(),status:"aaben",oprettetAf:`${currentUser.fornavn} ${currentUser.efternavn}`,mistaenkte:[],involveretBetjente:[],involveretBorgere:[],koeretoejer:[],referencer:[],tags:[],beviser:[],rapport:{haendelsesforloeb:"",konfiskeredeGenstande:[],magtanvendelse:[]},noter:[],aktivitetslog:[]}; }

      <div class="card mb-3"><div class="label">Sagstitel</div><input class="input mb-2" id="sag-titel" value="${esc(sag.titel)}" placeholder="Skriv en titel..."><div class="label">Hændelsesforløb</div><textarea class="textarea" id="sag-rapport" rows="5" placeholder="Beskriv hændelsesforløbet...">${sag.rapport.haendelsesforloeb||""}</textarea></div>
      
      <!-- Mistænkte -->
      <div class="card mb-3"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">${icons.alert} Mistænkte (${sag.mistaenkte.length})</h3><div id="sag-mistaenkte">`;
    sag.mistaenkte.forEach((m,i) => { html += `<div class="card card-sm mb-2" style="border-left:2px solid var(--warning)"><div class="flex items-center justify-between"><div><span style="font-size:12px;font-weight:500">${m.personNavn}</span> <span class="mono" style="font-size:10px;color:var(--muted-fg)">${m.personCpr}</span></div><div class="flex items-center gap-2"><span style="font-size:10px;color:var(--muted-fg)">${m.sigtelser?.length||0} sigtelser</span><button class="btn btn-ghost btn-sm" style="color:var(--destructive)" onclick="removeMistaenkt(${i})">✕</button></div></div></div>`; });
    html += `</div><div style="margin-top:8px"><input class="input" id="sag-person-search" placeholder="Søg person at tilføje..."></div><div id="sag-person-results" style="max-height:150px;overflow-y:auto;margin-top:4px"></div></div>
      
      <!-- Involverede betjente -->
      <div class="card mb-3"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">${icons.shield} Involverede betjente (${sag.involveretBetjente.length})</h3><div id="sag-betjente">`;
    sag.involveretBetjente.forEach((b,i) => { html += `<div class="flex items-center justify-between" style="padding:6px 0;border-bottom:1px solid rgba(42,47,58,.3)"><span style="font-size:12px">${b.navn||b} <span class="mono" style="font-size:10px;color:var(--muted-fg)">${b.badgeNr||""}</span></span><button class="btn btn-ghost btn-sm" style="color:var(--destructive)" onclick="removeSagBetjent(${i})">✕</button></div>`; });
    html += `</div><div style="margin-top:8px"><input class="input" id="sag-betjent-search" placeholder="Søg betjent at tilføje..."></div><div id="sag-betjent-results" style="max-height:120px;overflow-y:auto;margin-top:4px"></div></div>
      
      <!-- Involverede borgere -->
      <div class="card mb-3"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">${icons.users} Involverede borgere (${sag.involveretBorgere.length})</h3><div id="sag-borgere">`;
    sag.involveretBorgere.forEach((b,i) => { html += `<div class="flex items-center justify-between" style="padding:6px 0;border-bottom:1px solid rgba(42,47,58,.3)"><span style="font-size:12px">${b.navn||b} <span class="mono" style="font-size:10px;color:var(--muted-fg)">${b.cpr||""}</span></span><button class="btn btn-ghost btn-sm" style="color:var(--destructive)" onclick="removeSagBorger(${i})">✕</button></div>`; });
    html += `</div><div style="margin-top:8px"><input class="input" id="sag-borger-search" placeholder="Søg borger at tilføje..."></div><div id="sag-borger-results" style="max-height:120px;overflow-y:auto;margin-top:4px"></div></div>
      
      <!-- Køretøjer -->
      <div class="card mb-3"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">${icons.car} Køretøjer (${sag.koeretoejer.length})</h3><div id="sag-koeretoejer">`;
    sag.koeretoejer.forEach((k,i) => { html += `<div class="flex items-center justify-between" style="padding:6px 0;border-bottom:1px solid rgba(42,47,58,.3)"><span style="font-size:12px">${k.nummerplade||k} — ${k.maerke||""} ${k.model||""}</span><button class="btn btn-ghost btn-sm" style="color:var(--destructive)" onclick="removeSagKoeretoej(${i})">✕</button></div>`; });
    html += `</div><div style="margin-top:8px"><input class="input" id="sag-kt-search" placeholder="Søg køretøj..."></div><div id="sag-kt-results" style="max-height:120px;overflow-y:auto;margin-top:4px"></div></div>
      
      <!-- Tags -->
      <div class="card mb-3"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">Tags</h3><div class="flex gap-2" style="flex-wrap:wrap" id="sag-tags">`;
    sag.tags.forEach((t,i) => { html += `<span class="badge badge-primary" style="cursor:pointer" onclick="removeSagTag(${i})">${t} ✕</span>`; });
    html += `</div><div class="flex gap-2 mt-2"><input class="input flex-1" id="sag-tag-input" placeholder="Tilføj tag..."><button class="btn btn-outline btn-sm" onclick="addSagTag()">+</button></div></div>
      
      <!-- Referencer -->
      <div class="card mb-3"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">Referencer</h3><div id="sag-referencer">`;
    sag.referencer.forEach((r,i) => { html += `<div class="flex items-center justify-between" style="padding:4px 0;font-size:12px"><span>${r}</span><button class="btn btn-ghost btn-sm" style="color:var(--destructive)" onclick="removeSagRef(${i})">✕</button></div>`; });
    html += `</div><div class="flex gap-2 mt-2"><input class="input flex-1" id="sag-ref-input" placeholder="Tilføj reference..."><button class="btn btn-outline btn-sm" onclick="addSagRef()">+</button></div></div>
      
      <!-- Beviser -->
      <div class="card mb-3"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">${icons.camera} Beviser (${sag.beviser.length})</h3><div id="sag-beviser">`;
    sag.beviser.forEach((b,i) => { html += `<div class="card card-sm mb-2"><div class="flex items-center justify-between"><div><span style="font-size:12px;font-weight:500">${b.beskrivelse||"Bevis"}</span><div style="font-size:10px;color:var(--muted-fg)">${b.oprettetAf||""} — ${b.timestamp||""}</div>${b.billedLink?`<a href="${b.billedLink}" target="_blank" style="font-size:10px;color:var(--primary)">🔗 Billede</a>`:''}</div><button class="btn btn-ghost btn-sm" style="color:var(--destructive)" onclick="removeSagBevis(${i})">✕</button></div></div>`; });
    html += `</div><button class="btn btn-outline btn-sm" onclick="showBevisForm()">+ Tilføj bevis</button></div>
      
      <!-- Noter -->
      <div class="card mb-3"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">Betjent-noter</h3>`;
    sag.noter.forEach(n => { html += `<div style="padding:8px;background:var(--muted);border-radius:8px;margin-bottom:6px;font-size:12px"><p>${n.tekst}</p><div style="font-size:10px;color:var(--muted-fg);margin-top:4px">${n.oprettetAf} — ${new Date(n.oprettetDato).toLocaleDateString("da-DK")}</div></div>`; });
    html += `<div class="flex gap-2 mt-2"><input class="input flex-1" id="sag-note-input" placeholder="Tilføj note..."><button class="btn btn-outline btn-sm" onclick="addSagNote()">Tilføj</button></div></div>

      <div class="card mb-3"><h3 style="font-size:14px;font-weight:600;margin-bottom:12px">Aktivitetslog</h3>`;
    if (sag.aktivitetslog.length===0) html+='<p style="font-size:12px;color:var(--muted-fg);font-style:italic">Ingen aktivitet logget</p>';
    sag.aktivitetslog.forEach(a => { html += `<div style="padding:4px 0;font-size:11px;border-bottom:1px solid rgba(42,47,58,.3)"><span style="color:var(--muted-fg)">${new Date(a.dato).toLocaleString("da-DK")}</span> — ${a.handling} <span style="color:var(--muted-fg)">af ${a.bruger}</span></div>`; });
    html += `</div></div>`;
    container.innerHTML = html;

    // Setup search handlers
    setupSagSearch("sag-person-search","sag-person-results",personer,p=>`${p.fornavn} ${p.efternavn}`,p=>p.cpr,"addMistaenkt");
    setupSagSearch("sag-betjent-search","sag-betjent-results",betjente,b=>`${b.fornavn} ${b.efternavn}`,b=>b.badgeNr,"addSagBetjent");
    setupSagSearch("sag-borger-search","sag-borger-results",personer,p=>`${p.fornavn} ${p.efternavn}`,p=>p.cpr,"addSagBorger");
    setupSagSearch("sag-kt-search","sag-kt-results",koeretoejer,k=>k.nummerplade||"",k=>`${k.maerke||""} ${k.model||""}`,"addSagKoeretoej");
  } catch (err) { container.innerHTML = `<p style="color:var(--destructive)">Fejl: ${err.message}</p>`; }
}

function setupSagSearch(inputId, resultsId, items, nameGetter, subGetter, addFn) {
  const input = document.getElementById(inputId);
  if (!input) return;
  input.addEventListener("input", () => {
    const q = input.value.toLowerCase();
    const results = document.getElementById(resultsId);
    if (q.length < 2) { results.innerHTML = ""; return; }
    const matches = items.filter(i => `${nameGetter(i)} ${subGetter(i)}`.toLowerCase().includes(q)).slice(0, 8);
    results.innerHTML = matches.map(i => `<div class="list-item" style="padding:6px 8px;cursor:pointer" onclick="${addFn}('${i.id}')"><span style="font-size:12px">${nameGetter(i)}</span> <span class="mono" style="font-size:10px;color:var(--muted-fg)">${subGetter(i)}</span></div>`).join("");
  });
}

window.addMistaenkt = function(personId) {
  const p = window._sagPersoner.find(pp=>pp.id===personId);
  if (!p) return;
  const sag = window._currentSag;
  if (sag.mistaenkte.find(m=>m.personId===personId)) { showToast("Allerede tilføjet"); return; }
  sag.mistaenkte.push({id:Date.now().toString(),personId:p.id,personNavn:`${p.fornavn} ${p.efternavn}`,personCpr:p.cpr,sigtelser:[],totalBoede:0,totalFaengsel:0,erkender:null,behandlet:false,tilkendegivelseAfgivet:false,fratagKoerekort:false});
  addAktivitetslog("Tilføjede mistænkt: "+p.fornavn+" "+p.efternavn);
  renderPage(activeTabId);
};
window.removeMistaenkt = function(i) { window._currentSag.mistaenkte.splice(i,1); renderPage(activeTabId); };
window.addSagBetjent = function(id) {
  const b = window._sagBetjente.find(bb=>bb.id===id);

async function renderFlaade(container) {
  container.innerHTML = '<div class="loading-center"><div class="spinner"></div><span>Indlæser patruljer...</span></div>';
  try {
    const patrols = await patruljerApi.getAll();
    let html = `<div class="flex items-center justify-between mb-3"><h2 style="font-size:16px;font-weight:600">Patrulje Skema</h2><div class="flex gap-2"><span class="badge badge-primary">Bemandede: ${patrols.filter(p=>p.medlemmer.length>0).length}</span><span class="badge badge-success">Ledige: ${patrols.filter(p=>p.status==="ledig").length}</span></div></div>`;
    const statusColors = {ledig:"badge-success",i_brug:"badge-primary",optaget:"badge-warning",ude_af_drift:"badge-destructive"};
    const statusLabels = {ledig:"Ledig",i_brug:"I brug",optaget:"Optaget",ude_af_drift:"Ude af drift"};
    patrols.forEach(p => {
      html += `<div class="card card-sm mb-2"><div class="flex items-center justify-between"><div><span style="font-size:13px;font-weight:600">${p.navn}</span> <span class="badge ${statusColors[p.status]}">${statusLabels[p.status]}</span></div><span style="font-size:11px;color:var(--muted-fg)">${p.medlemmer.length}/${p.pladser} pladser</span></div>`;
      if (p.medlemmer.length > 0) { html += '<div style="margin-top:6px;font-size:11px;color:var(--muted-fg)">'; p.medlemmer.forEach(m => { html += `<span style="margin-right:12px">🛡️ ${m.navn} (${m.badgeNr})</span>`; }); html += '</div>'; }
      html += '</div>';
    });
    if (patrols.length === 0) html += '<div class="loading-center" style="min-height:200px"><p>Ingen patruljer oprettet</p></div>';
    container.innerHTML = html;
  } catch (err) { container.innerHTML = `<p style="color:var(--destructive)">Fejl: ${err.message}</p>`; }
}

window.joinPatrulje = async function(id) {
  try { const ps = window._kortPatruljer||await patruljerApi.getAll(); const p=ps.find(pp=>pp.id===id); if(!p)return;
  if(p.medlemmer.find(m=>m.badgeNr===currentUser.badgeNr)){showToast("Allerede tilmeldt");return;}
  if(p.medlemmer.length>=p.pladser){showToast("Fuld");return;}
  p.medlemmer.push({badgeNr:currentUser.badgeNr,navn:`${currentUser.fornavn} ${currentUser.efternavn}`});
  await patruljerApi.update(id,p);showToast("Tilmeldt");renderPage(activeTabId);
  } catch(e){showToast("Fejl: "+e.message);}
};
window.leavePatrulje = async function(id) {
  try { const ps = window._kortPatruljer||await patruljerApi.getAll(); const p=ps.find(pp=>pp.id===id); if(!p)return;
  p.medlemmer=p.medlemmer.filter(m=>m.badgeNr!==currentUser.badgeNr);
  await patruljerApi.update(id,p);showToast("Forladt");renderPage(activeTabId);
  } catch(e){showToast("Fejl: "+e.message);}
};
window.updatePatruljeStatus = async function(id, status) {
  try { const ps = window._kortPatruljer||await patruljerApi.getAll(); const p=ps.find(pp=>pp.id===id); if(!p)return;
  p.status=status; await patruljerApi.update(id,p);showToast("Status opdateret");
  } catch(e){showToast("Fejl: "+e.message);}
};

window.showAddUddDialog = function(id) {
  const b = window._ansatte.find(bb=>bb.id===id);
  if (!b) return;
  const overlay = el("div",{className:"dialog-overlay",onclick:e=>{if(e.target===overlay)overlay.remove();}});
  let selected = [...b.uddannelser];
  function renderUddDialog() {
    let html = `<div class="dialog" style="max-width:500px;max-height:85vh;overflow-y:auto"><div class="dialog-title">Uddannelser — ${b.fornavn} ${b.efternavn}</div>`;
    html += `<div class="label">Nuværende (${selected.length})</div><div style="margin-bottom:12px;display:flex;flex-wrap:wrap;gap:4px">`;
    selected.forEach((u,i) => { html += `<span class="badge badge-primary" style="cursor:pointer" onclick="window._uddRemove(${i})">${u} ✕</span>`; });
    if (selected.length===0) html+='<span style="font-size:11px;color:var(--muted-fg)">Ingen uddannelser</span>';
    html += `</div><div class="label">Tilgængelige uddannelser</div><input class="input mb-2" id="udd-search" placeholder="Søg..."><div style="max-height:300px;overflow-y:auto">`;
    alleUddannelser.forEach(u => {
      const has = selected.includes(u);
      html += `<div style="padding:4px 8px;border-bottom:1px solid rgba(42,47,58,.3);display:flex;justify-content:space-between;align-items:center;font-size:11px" class="udd-option"><span>${u}</span>${has?`<span class="badge badge-success">✓</span>`:`<button class="btn btn-primary" style="padding:1px 6px;font-size:9px" onclick="window._uddAdd('${esc(u)}')">+</button>`}</div>`;
    });
    html += `</div><div class="flex gap-2 mt-3"><button class="btn btn-primary" onclick="window._uddSave()">Gem</button><button class="btn btn-outline" onclick="this.closest('.dialog-overlay').remove()">Annuller</button></div></div>`;
    overlay.innerHTML = html;
    document.getElementById("udd-search")?.addEventListener("input", e => {
      const q = e.target.value.toLowerCase();
      document.querySelectorAll(".udd-option").forEach(opt => { opt.style.display = opt.textContent.toLowerCase().includes(q)?"":"none"; });
    });
  }
  window._uddAdd = function(u) { if(!selected.includes(u))selected.push(u); renderUddDialog(); };
  window._uddRemove = function(i) { selected.splice(i,1); renderUddDialog(); };
  window._uddSave = async function() {
    try{await betjenteApi.update(id,{uddannelser:selected});showToast("Uddannelser opdateret");overlay.remove();renderPage(activeTabId);}catch(e){showToast("Fejl: "+e.message);}
  };
  document.body.appendChild(overlay);
  renderUddDialog();
};

window.fireAnsatDialog = function(id) {
  const b = window._ansatte.find(bb=>bb.id===id);
  if (!b||!confirm(`Er du sikker på at du vil afskedige ${b.fornavn} ${b.efternavn}?`)) return;
  (async ()=>{
    try{
      await fyredeApi.create({id:String(Date.now()),badgeNr:b.badgeNr,fornavn:b.fornavn,efternavn:b.efternavn,rang:b.rang,fyretDato:new Date().toISOString().split("T")[0],fyretAf:`${currentUser.fornavn} ${currentUser.efternavn}`});
      await betjenteApi.remove(id);
      showToast("Betjent afskediget");renderPage(activeTabId);
    }catch(e){showToast("Fejl: "+e.message);}
  })();
};

window.changePassword = async function() {
  const oldP=document.getElementById("prof-old").value,newP=document.getElementById("prof-new").value,confP=document.getElementById("prof-confirm").value,errDiv=document.getElementById("prof-error");
  if(oldP!==currentUser.kodeord){errDiv.textContent="Forkert nuværende kodeord";return;}

  try{await betjenteApi.update(currentUser.id,{kodeord:newP});currentUser.kodeord=newP;showToast("Kodeord ændret");errDiv.textContent="";}catch(e){errDiv.textContent="Fejl: "+e.message;}
};
