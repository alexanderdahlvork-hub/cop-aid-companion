<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVLD Systems – Politi MDT</title>
  <meta name="description" content="AVLD Systems – Politi Tablet til det danske politi">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ═══ LOGIN PAGE ═══ -->
<div id="login-page">
  <div class="bg-img"></div>
  <div class="overlay"></div>
  <div class="login-card">
    <div class="login-logo" id="login-logo-tap">
      <img src="images/logo.png" alt="AVLD Systems">
    </div>
    <h1 class="login-title">POLITI MDT</h1>
    <p class="login-sub mono">MOBILE DATA TERMINAL</p>
    <div id="login-matched" class="login-matched hidden"></div>
    <div style="margin-top:24px">
      <div class="login-field">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.77 4 4 0 0 1 0 6.76 4 4 0 0 1-4.78 4.77 4 4 0 0 1-6.74 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/><path d="m9 12 2 2 4-4"/></svg>
        <input id="login-badge" placeholder="BADGE NUMMER" autocomplete="off">
      </div>
      <div class="login-field">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input id="login-password" type="password" placeholder="ADGANGSKODE">
      </div>
    </div>
    <div id="login-error" class="login-error hidden"></div>
    <button id="login-btn" class="login-btn">LOG IND</button>
    <p class="login-footer mono">AVLD SYSTEMS — SIKRET FORBINDELSE</p>
  </div>
</div>

<!-- ═══ MAIN APP ═══ -->
<div id="app" class="hidden">
  <div class="app-shell">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <div class="sidebar-logo-text">POLITI MDT<small class="mono">COMMAND v2.0</small></div>
      </div>

      <nav class="sidebar-nav" id="sidebar-nav"></nav>

      <div class="sidebar-bottom" id="sidebar-bottom">
        <div class="sidebar-user" id="sidebar-user-btn">
          <div class="sidebar-user-avatar" id="sidebar-avatar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name" id="sidebar-username"></div>
            <div class="sidebar-user-rank mono" id="sidebar-userrole"></div>
          </div>
          <div class="sidebar-user-dot"></div>
        </div>
        <div class="sidebar-popup hidden" id="sidebar-popup">
          <button class="sidebar-popup-item" onclick="openTab('profil')">👤 Min Profil</button>
          <button class="sidebar-popup-item" onclick="openTab('ansoegninger')">📋 Ansøgninger</button>
          <hr class="sidebar-popup-divider">
          <button class="sidebar-popup-item logout" onclick="handleLogout()">🚪 Log ud</button>
        </div>
      </div>
    </div>

    <!-- Main area -->
    <div class="main-area">
      <div class="top-header">
        <span class="top-header-title" id="top-title">AVLD-Systems.dk — Politi MDT</span>
        <span class="top-header-badge mono" id="top-badge"></span>
      </div>
      <div class="tabs-bar" id="tabs-bar"></div>
      <div class="content-area" id="content-area">
        <!-- Pages are rendered dynamically -->
      </div>
    </div>

  </div>
</div>

<!-- Scripts -->
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
